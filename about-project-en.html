<h2>A few words about this project</h2>
<p>Sometimes books do not begin on paper. They are born much earlier: in conversations by a fire, on the road, in accidental meetings, in other people’s lives that briefly cross your own. Over time, there are more and more of these stories. At first they are only memories. Then notes. And then, suddenly, you understand that they have begun to live a life of their own.</p>
<p>That is how this project appeared.</p>
<p>It is not quite a book in the usual sense. It is closer to a collection of living stories that slowly gather into one road.</p>
<p>Some of them truly happened. Some almost truly happened. And some were born simply from watching people and life.</p>
<p>I decided to publish them here, on the internet, as they return to memory or happen anew.</p>
<p>Without haste. Without a strict plan. Exactly as life itself usually works.</p>
<p>If you have found yourself on this website by accident, then one of these stories has already found its reader.</p>
<p>And if you ever feel like coming back to read something new, then Roy is still alive.</p>
<p>Welcome.</p>
<h2>Why Roy?</h2>
<p>Every person, sooner or later, passes through difficult seasons. Naturally, everyone has their own measure of tragedy. For one person it may be a house burned to the ground; for another, the absence of parmesan on a pizza.</p>
<p>For me, it was a season of rethinking.</p>
<p>At the time, I was working for an insurance company. Everything I owned fit into the trunk of my car. It was a cherry-colored almost-jeep named Opel Frontera.</p>
<p>In the trunk there was a sleeping bag, which has its own separate story. Two cans of stewed meat. A folding camping shovel. A small gas stove. And one more thing that did not quite belong to that survival kit: a piece of very good gabardine for a coat. My grandfather had bought it once, back in the postwar years. He had intended to replace his officer’s greatcoat with something more respectable. But the coat was never made. The fabric remained. Then, in some natural family way, it came to me. And so it traveled with me.</p>
<p>I did my work at the company rather quickly. I had no home of my own. No family then either. There was nowhere to hurry back to. So in the evenings I simply looked for something to occupy myself with.</p>
<p>One evening I opened Google and typed a simple search:</p>
<p><strong>“off-road enthusiasts club.”</strong></p>
<p>Among the results I found a website with a lively, noisy forum. It was called Offroadmaster.</p>
<p>Since my Opel was, after all, almost a jeep, I immediately felt like almost a jeeper.</p>
<p>To register, I had to choose a nickname. A call sign. A name under which I would exist on that forum. I thought for a moment and suddenly remembered a scene from Die Hard, the one where Bruce Willis runs barefoot through a skyscraper, fighting terrorists, and introduces himself:</p>
<p><strong>Roy.</strong></p>
<p>Something in me felt strangely close to him at that moment. So that is what I wrote.</p>
<p><strong>ROY.</strong></p>
<p>The name stuck.</p>
<p>At first it was only a forum name. Then a nickname among acquaintances. Then a pseudonym.</p>
<p>Only years later did I understand how unexpectedly accurate that word had become.</p>
<p>A swarm, in our understanding, is not simply a heap of bees. It is a state.</p>
<p>A swarm has no single visible command center. And yet it moves as one organism. Each bee does its own work, and together they become a system.</p>
<p>A human life is built in a similar way. Thoughts, memories, conversations, chance meetings, books, roads, friends, hunts, mistakes, discoveries; all of it slowly gathers into a swarm of stories.</p>
<p>Sometimes that swarm hums quietly and calmly. Sometimes anxiously and loudly. But it is from that hum that the texts are born. Each story is like a separate bee. The whole book is like a hive. And if you listen closely, you can always hear the same sound inside it.</p>
<p><strong>The hum of life.</strong></p>
<p>So now “Roy” is no longer just an old internet nickname. It is a way of looking at the world.</p>
<h2>The story of one sleeping bag</h2>
<p>In the trunk of my cherry Opel Frontera there was a sleeping bag. I bought it in Odesa, at the Seventh Kilometer market. Camouflage, sturdy, practical. Its main virtue was that it could easily turn into a double blanket. It had been bought for perfectly understandable purposes: hunting, fishing, damp autumn nights by a campfire.</p>
<p>It was not especially thick or heavy, but it did its job honestly.</p>
<p>Then, one day, my life took a rather serious turn. I was offered the chance to build an MRI center in Kyiv from scratch. When a person faces a task like that, the first thing he thinks about is not walls and not machines. He thinks about people.</p>
<p>And I immediately remembered Iryna Leonidivna Voronina. At the time, she supervised the Kherson branch of the insurance company where we worked together. Every time we met, she would tell me almost the same words:</p>
<p><strong>“Take me to Kyiv. Any position. Any work.”</strong></p>
<p>Her story was, to put it mildly, unusual. She was a priest’s wife. A real one.</p>
<p>Her husband was a priest, with a small parish somewhere near Kherson. Alongside his ministry, he also caught fish and salted it rather successfully.</p>
<p>They lived very modestly. Money was scarce. The insurance company did not spoil anyone with generous salaries either. So Iryna Leonidivna was ready for any extra work. When I was asked to launch the MRI center, I remembered her immediately.</p>
<p>She came to Kyiv on the very first train. I met her at the station. The first thing we did was buy her a folding cot.</p>
<p>She settled right inside the future center. The renovation had only just ended; the rooms still smelled of fresh paint and plaster. Iryna Leonidivna occupied the office where the ultrasound room would later be. There, she created a tiny cell for herself. A small icon corner on the wall. A neatly made cot in the corner. A kettle and a few mugs on the windowsill. And a candle.</p>
<p>Everything there was astonishingly clean, peaceful and somehow immediately right.</p>
<p>She was the best employee I have ever met. I have never again seen a person with such a bright and pure soul. She quite literally radiated good spirits. She worked for three people: as administrator before we had hired one, as my assistant, as a guard, and even as a cook. And, by the way, she cooked wonderfully.</p>
<p>After some time, the priest came to Kyiv as well. And then a small domestic problem appeared. The two of them could no longer fit on one folding cot.</p>
<p>One day Iryna Leonidivna approached me very carefully and said:</p>
<p><strong>“Perhaps you might have something… double?”</strong></p>
<p>And of course, I remembered my sleeping bag.</p>
<p>That very one. From Odesa. Camouflage. The one that easily turned into a double blanket.</p>
<p>So it moved from the trunk of my Frontera into the little cell inside the future ultrasound office.</p>
<p>Sometimes I think my sleeping bag lived a rather interesting life.</p>
<p>At first, it was supposed to keep me warm by campfires during hunting and fishing trips. In the end, it became the family bed of a priest.</p>
<p>So now, one might say, that sleeping bag is almost holy.</p>
<p>Almost like a shroud. And every time I see it now, I think: some things become sacred quite unexpectedly.</p>
<h2>On things and stories</h2>
<p>Sometimes the most ordinary objects live an entire life alongside a person. At first they appear by chance: bought at a market, given by friends, or simply found at hand at the right moment.</p>
<p>At first, it is only a thing. But time passes, and it begins to absorb events, people, roads, conversations and memories.</p>
<p>And so a simple camouflage sleeping bag, once bought at Odesa’s Seventh Kilometer market for hunting and fishing, may suddenly become the family bed of a priest.</p>
<p>And then you understand that some objects become almost holy not because anyone planned it that way, but because life has passed through them.</p>
<p>Over time, I began to notice that objects are not the only things with such a fate. Sometimes the same happens to stories. At first it is only a random episode from life. Then a memory. Then a story you once retell to friends. And after a while there are many such stories. They begin to gather together, like bees into a hive.</p>
<p>That is how this project appeared.</p>
<p>Here are simple life stories: sometimes funny, sometimes strange, sometimes very quiet. But all of them share one quality: they have been truly lived.</p>
<p>And if, with time, one of these stories becomes for someone as warm and real a memory as my old sleeping bag is for me, then this Roy appeared for a reason.</p>
