<p><strong>Чистое небо.</strong></p>

<p>Что наша жизнь? Игра?</p>

<h2>Пролог.</h2>

<p>Я редко играл в компьютерные игры.</p>

<p>Наверное, моё первое знакомство с этим чудом технического прогресса не вызвало тогда у меня бурю восторга.</p>

<p>Впервые я увидел и дотронулся до компьютеров на уроке информатики.</p>

<p>Допуск к ним мы получили только в последний год обучения в школе.</p>

<p>Нас завели в пахнущий свежей краской класс, как зевак из глухой деревни в городской планетарий.</p>

<p>На цыпочках, со сменной обувью и строго по одному, мы словно перенеслись в центр управления полётами NASA.</p>

<p>Осторожно рассаживаясь на мягкие стулья с высокими спинками, видимо, купленные в придачу к огромным системным блокам, мониторам и снежно-белым клавиатурам, мы не дышали, а вслушивались в незнакомые звуки, издаваемые этими спящими монстрами.</p>

<p>На каждом из них аккуратным почерком был выведен инвентарный номер - шесть или семь цифр, и тогда нам казалось, что это коды запуска баллистических ракет.</p>

<p>Цифры на мониторах совпадали с номерами на спинках стульев, что придавало каждому рабочему месту свою индивидуальность.</p>

<p>Язык, на котором нас учили разговаривать с этими кибермашинами, носил смешное название Бейсик.</p>

<p>Он бесил всех без исключения, и нас, и, наверное, даже нашу учительницу информатики, Нину Акимовну Голобородько.</p>

<p>Молодая, нервная, с вечно недоверчивым взглядом, она охраняла этот кабинет, как святыню:</p>

<p>— Никаких кнопок без моего ведома не нажимать и глупых вопросов не задавать! Рассаживайтесь и ждите. Никто ничего без разрешения не включает!</p>

<p>Мне же хотелось поскорее набрать на клавиатуре вопрос: «Как получить взрывчатку?»</p>

<p>Но, как вскоре оказалось, ответ на него нужно было тоже вписать в программу на Бейсике и указать, при каких параметрах он должен быть выведен на экран.</p>

<p>Ну разве это не чушь?</p>

<p>Зачем нужен компьютер, если я сам должен прописывать все варианты ответов?</p>

<p>Ни о каких «окнах» Билла Гейтса или поисковых системах тогда даже не слышали.</p>

<p>Что там уж говорит за искусственный интернет?</p>

<p>Чёрные кинескопы с мигающим курсором - вот и всё, чем мы, школьники того времени, могли довольствоваться.</p>

<p>К моему удивлению, в мединституте компьютерный класс был куда скромнее.</p>

<p>Мягких стульев там не водилось.</p>

<p>А только деревянные сидушки, больно давившие на одно место.</p>

<p>Белый халат и вечно мятая шапочка студента медвуза нелепо контрастировали с этими пыльными мониторами.</p>

<p>Нас учили, как из операционной системы DOS вытянуть хоть какую-то пользу.</p>

<p>А еще, нас учили печатать.</p>

<p>Это было скучно, долго и однообразно.</p>

<p>Клавиатура напоминала пазл, где мы всей группой выискивали нужную букву медленно и методично, как золотоискатели во времена лихорадки.</p>

<p>В тот день у нас был зачёт по скорости набора текста.</p>

<p>— Почему буквы не стоят в алфавитном порядке? Что за дурацкое расположение кнопок? — возмущалась Светка с редкой фамилией Русалкина, кокетливо сдувая со лба упавший локон и стреляя взглядом в сторону препода.</p>

<p>Кто-то дернулся её поддержать, но вспомнил, что физика на первом курсе шла экзаменом, и двойка по ней на тридцать процентов увеличивала шанс вылететь из института.</p>

<p>Физик был высокий, худощавый, смуглый мужчина средних лет, в застёгнутом на все пуговицы накрахмаленном халате.</p>

<p>Скорее он напоминал доцента какого-то НИИ по внедрению аргонной сварки в производство бытовых инкубаторов.</p>

<p>Но при этом всем своим видом наводил на нас панический ужас своим тихим, монотонным голосом:</p>

<p>— Так удобнее. Буквы расположены по частоте встречаемости в тексте. Поймёте со временем, когда будете печатать истории болезни не от руки, а на компьютере.</p>

<p>Он то и дело поглядывал на свои часы, но взгляд его неизменно возвращался к Светкиному бюсту, удерживаемому от всеобщего обозрения ее настоящих прелестей лишь одной-единственной пуговицей.</p>

<p>Золотой кулончик-змейка на её шее указывал точно туда, где серая клавиатура компа никак не гармонировала с её характером.</p>

<p>Пройдёт несколько лет, и чёрный фон мониторов DOS сменит голубая заставка Windows 95, рождая один за другим ярлычки и иконки на рабочем столе, а магия успешной загрузки системы будет сравнима разве что с тем напряжением, с которым пуговка на Светкином халате держала изо всех сил оборону под взглядом физика.</p>

<p>Уже через десять лет, на встрече выпускников, мы с удивлением узнали, что Света вышла замуж за доцента с кафедры военно-морской подготовки.</p>

<p>И тогда мне пришла мысль: морской кортик в руках у офицера ВМС ЗСУ всегда тверже по шкале роквелла, чем даже самые острые взгляды доцента-физика.</p>

<p>А потом появился DOOM.</p>

<p>Это была первая компьютерная игра с трёхмерной графикой.</p>

<p>И вместо того чтобы по ночам летать по вызовам в «неотложке» или дежурить в пропахшей гнилыми ранами больнице, я вместе с другом Владиком уходил в новый и неизведанный нам мир.</p>

<p>Его родители, известные бизнесмены одной малоизвестной фармфирмы, не возражали, что мы ночами занимали удобные кожаные кресла в кабинете коммерческого директора, и с головой уходили во власть мониторов.</p>

<p>Мы, как космические пехотинцы, сражались против полчищ демонов, чтобы выжить самим и спасти Землю.</p>

<p>В конце шестого курса Владик признался: именно такой компьютер был передан в пожизненное пользование ректору нашего института и это, собственно, и стало его пропуском на первый курс.</p>

<p>Шесть лет мы прошли плечом к плечу все кафедры, но след его оборвался где-то в Канаде, после интернатуры и его стремительной женитьбы.</p>

<p>Я часто задавался вопросом: почему нам, студентам, никто даже не намекнул тогда, что будет потом, после окончания вуза?</p>

<p>Какие испытания приготовит нам жизнь, какие сюрпризы подбросит нам судьба?</p>

<p>Нас учили лечить людей.</p>

<p>На живых мы изучали симптомы болезни, а на мёртвых её внутренние проявления.</p>

<p>Нам толково объясняли на пальцах, гистологических препаратах и обезглавленных лягушках, как устроено человеческое тело.</p>

<p>Нас учили разговаривать с пациентом, собирать жалобы, назначать лечение и контролировать его эффективность.</p>

<p>Но ни в одном учебнике и ни с одной кафедры не было сказано ни слова о взаимоотношениях между врачом и родственниками пациента, между старшей операционной сестрой и проверяющим из КРУ, между дежурным по отделению и прокурором, работодателем и наёмным сотрудником.</p>

<p>Нас готовили как автомехаников шестого разряда: безупречно и в любую погоду определять причину поломки и устранять её подручными средствами.</p>

<p>Нас учили не думать шаблонно.</p>

<p>Мы, как роботизированная рука, но и не давали советов, как вести себя в нештатных жизненных ситуациях.</p>

<p>Шесть лет все мы были одинаковы. но, сойдя со студенческой скамьи, сильно разделились во мнениях и в отношении к жизни.</p>

<p>Говорят, что человеку в жизни должно повезти трижды.</p>

<p>От кого родиться, у кого учиться и на ком жениться.</p>

<p>С учителями, которые должны были после окончания вуза поставить молодого доктора на ноги, везло далеко не каждому.</p>

<p>Кому-то из нас судьба улыбнулась, кому-то нет.</p>

<p>А кому-то не везёт и поныне.</p>

<p>Прошло более десяти лет, когда новая компьютерная игра овладела мной безраздельно.</p>

<p>Её сюжет основывался на реальных событиях, произошедших в Украине в 1986 году, после взрыва атомного реактора на Чернобыльской АЭС.</p>

<p>Безупречная графика, выверенная звуковая дорожка и продуманная до мелочей сюжетная линия делали её уникальной и пугающе правдоподобной.</p>

<p>За два игровых дня перед глазами проходила целая эпоха жизни главного героя.</p>

<p>А это цепь событий, решений, потерь и неожиданных открытий.</p>

<p>Но главное, эта игра учила думать.</p>

<p>Не шаблонно, не по инструкции, а через анализ, внимание к деталям, наблюдательность, способность вычленить суть из хаоса.</p>

<p>Нужно было уметь слушать даже случайные фразы второстепенных персонажей, сопоставлять факты, включать интуицию.</p>

<p>Временами становилось страшно, но жутко интересно.</p>

<p>Каждый новый уровень требовал не просто реакции, а опыта и стратегии.</p>

<p>Финал был предопределён.</p>

<p>Когда медленно вверх поползли титры, стало по-настоящему грустно.</p>

<p>Ни ультрасовременное оружие, ни артефакты, ни накопленные ресурсы нельзя было унести с собой.</p>

<p>Все достижения, победы, ошибки навсегда оставались в памяти машины.</p>
<p>С собой ты уносил лишь одно: эмоции и странное чувство обнуления, как будто кто-то нажал F5 внутри твоей головы.</p>

<p>Телефонный звонок раздался около четырёх часов утра.</p>

<p>— Алло. Алексей? Это Радислав.</p>

<p>Прошу прощения, что звоню так рано, но ситуация того требует.</p>

<p>— Доброе утро… Что случилось? — пробормотал я, жалея, что не поставил телефон на беззвучный режим.</p>

<p>— Мы сейчас с женой гостим у друзей под Киевом. Аня беременна, у неё начались схватки.</p>

<p>Роды под восходящее солнце всегда вызывали у меня приятные воспоминания: старший сын родился ранним утром и целый день я принимал поздравления.</p>

<p>Пытаясь прогнать сон, я спросил на автопилоте, ещё до конца не осознавая ситуацию:</p>

<p>— Будем думать, где рожать?</p>

<p>— Нет, — резко оборвал он. — Она на пятом месяце беременности.</p>

<p>Опа! — подумал я, и сон окончательно выдуло из меня, как утренний туман ветром.</p>

<p>Да уж… рожать на таком сроке нельзя.</p>

<p>Полноценный ребёнок не получится, и даже не факт, что он родится живым.</p>

<p>Тут нужна спецпомощь и срочное вмешательство опытных гинекологов.</p>

<p>— Мы выезжаем в Киев, — голос Радислава был настолько спокоен, что я даже на секунду усомнился, правильно ли расслышал срок беременности.</p>

<p>— Алексей, в какую клинику нам лучше подъехать?</p>

<p>Моё мнение о врачах и местах их работы у людей, знакомых с медициной исключительно как потребители медуслуг (ненавижу это слово), всегда вызывало доверие.</p>

<p>И мой совет в таких случаях имел вес.</p>

<p>— Радислав, дайте мне немного времени подумать. Вы как далеко от Киева?</p>

<p>— Мы за Вышгородом.</p>

<p>Я взглянул на зелёный циферблат настенных часов.</p>

<p>Они дежурили по ночам в роли ночника и часового.</p>

<p>Я сверил время с телефоном.</p>

<p>4:18.</p>

<p>Ну и рань, подумал я.</p>

<p>— Что случилось? — жена потянулась, приподнявшись на локте. — Господи, четыре утра… кто звонит в такую рань?</p>

<p>— Радислав. У него жена рожать надумала.</p>

<p>— О, здорово… а поделиться этой новостью он не мог хотя бы после девяти?</p>

<p>— Она на пятом месяце, — сказал я, опуская телефон и пытаясь в памяти отыскать, кому бы направить их машину.</p>

<p>— Спрашивает, куда ехать.</p>

<p>— Говсеев. Тут и думать нечего. Ему звони, — сонно сказала Алена, поправляя подушку.</p>

<p>Я пролистывал список контактов.</p>

<p>Часы-дозорные добавили две минуты.</p>

<p>4:20.</p>

<p>Как-то рано будить такого человека.</p>

<p>Сомнение мелькнуло словно кто-то из прошлого тихо откатил чёрный «воронок» под окна.</p>

<p>Дмитрий Александрович Говсеев был начмедом в роддоме, где меньше месяца назад родился наш младший сын.</p>

<p>Уникальный человек, оставивший о себе самые приятные воспоминания.</p>

<p>Он всегда обращался к нам приветственно — «Коллеги».</p>

<p>Кесарево, на которое планово шла моя жена из-за тазового предлежания Артёма, он рассматривал лишь как возможный вариант родовспоможения.</p>

<p>— Перевернётся ещё боец, — говорил он при каждом осмотре. — Как надумает на свет родиться — так и станет как надо!</p>

<p>Доктора любят перестраховаться.</p>

<p>— Может, кровь нужна? Плазма? Какие-то препараты? — спрашивал я, прекрасно понимая серьёзность предстоящей операции.</p>

<p>— Коллега! Всё есть. И кровь, и наркотики. Не переживайте, — улыбался он спокойно.</p>

<p>Когда я собирал Алену в роддом, я сунул ей в сумку громкий спортивный свисток.</p>

<p>— Если что — свисти, — сказал я, — услышат и придут на помощь.</p>

<p>О свистке, конечно, она забыла, но роды прошли благополучно, естественным путём, как и предрекал начмед.</p>

<p>Он ждал, готовый вмешаться в любую секунду, но его помощь не понадобилась.</p>

<p>Наш боец действительно «перевернулся» в последний момент и родился под покровом ночи.</p>

<p>Замечать то, что происходит за кулисами родзала, способен лишь тот, кто сам врач и доверяет коллегам две жизни сразу.</p>

<p>Когда я пришёл к нему с конвертом при выписке, мне стало неловко и даже стыдно.</p>

<p>— Да что вы, побойтесь Бога! — махнул рукой Говсеев.</p>

<p>— С коллег брать — руки отсохнут.</p>

<p>«Да! Среди профессионалов жлобья не водится», — вспомнилась цитата из фильма «Классик».</p>

<p>— Давай звони, — сказала жена. — Ситуация того требует.</p>

<p>Я уже разблокировал телефон, когда пришёл новый входящий вызов.</p>

<p>И снова Радислав.</p>

<p>— Алексей, всё нормально. Мы уже едем в частный роддом. Нас ждут.</p>

<p>Голос его был уверенный, почти радостный, как у человека, которому наконец объявили посадку на рейс, задержанный на шесть часов.</p>

<p>— В «Исиду» едет, — сказал я.</p>

<p>— А толку? Они же не возьмут…</p>

<p>Радислав всегда любил шик и пафос.</p>

<p>В отличие от аскетов, которые спокойно селились бы в трёхзвёздочном отеле, Радислав выбирал только «Хайят», «Интерконтиненталь», «Хилтон».</p>

<p>Наверное, и здесь сработал тот же стереотип, где дороже, там лучше.</p>

<p>Но в медицине такой принцип не работает.</p>

<p>— Ну, дай Бог, чтобы всё хорошо сложилось, сказал я и попытался снова заснуть.</p>

<p>Майские праздники в Киеве были особым временем, и все жители, как и мы, любили этот период.</p>

<p>Мангалы вдоль Днепра и Десенки источали немыслимые ароматы жареной свинины, колбасок и куриных крылышек.</p>

<p>Дым стелился над водой, а гусиный поплавок подпрыгивал от поклёвок плотвы и верховодки.</p>

<p>Вчера мы весь день провели на природе, и мне казалось, что даже в спальне ещё чувствуется этот волшебный аромат шашлыка.</p>

<p>Закрывая глаза, я снова видел поплавок, который жил своей жизнью и безудержно нырял в блестящие от солнца волны.</p>

<p>Я представил, что и Радислав с молодой женой, москвичкой, где-то в гостях у друзей, точно так же сидит вечером у барбекю на террасе из ореха и ясеня, у уютного домика с лакеем, бассейном и небольшим полем для гольфа.</p>

<p>Такие дома под Киевом всегда обносят высоченным забором, с въездом только через шлагбаум.</p>

<p>И вот начались схватки.</p>

<p>Я так отчётливо увидел эту картину, будто оказался рядом.</p>

<p>Мне совсем не хотелось быть на его месте даже в мыслях.</p>

<p>Представить себе тот ужас предстоящей поездки ранним весенним утром, пусть даже в самый дорогой медицинский центр города.</p>

<p>Интересно, снесли они шлагбаум или всё-таки открыли?</p>

<p>Если бы снесли… — мысли путались, и, погружаясь в мягкое одеяло, я начал проваливаться в сон.</p>

<p>— Отважные они ребята, — сказал я, почти засыпая, жене.</p>

<p>— Да, — согласилась Алена, она, будто только и ждала моего комментария.</p>

<p>— Я бы, наверное, не рискнула ехать в таком сроке в другую страну, даже в самые-самые тепличные условия. Дома лучше.</p>

<p>Полусонным глазом я взглянул на часы: зелёные цифры показывали пять утра.</p>

<p>Телефон зазвонил ровно через секунду.</p>

<p>«Радислав» — высветилось на экране.</p>

<p>— Алло, Алексей! — голос его был взволнован. Это чувствовалось сразу.</p>

<p>— Нас не принимает клиника. Мы и деньги предлагали. Вышел дежурный врач, посмотрел на Аню — и, узнав о сроке беременности, сразу отказал в госпитализации!</p>

<p>Он говорил без остановки, на одном дыхании, будто хотел выговориться.</p>

<p>Алена повернулась ко мне:</p>

<p>— Что, не взяли? Понятное дело. Звони Гофсееву.</p>

<p>— Радислав, я понял. Наберу вас через некоторое время, попробую дозвониться доктору.</p>

<p>— Да, спасибо. Набирай сразу. Я на связи, жду.</p>

<p>Дмитрий Александрович ответил после второго гудка.</p>

<p>— Простите за столь ранний звонок, но ситуация тревожная.</p>

<p>— Коллега, что случилось?</p>

<p>Я не стал тратить время на объяснения и перешёл к коротким, чётким фразам.</p>

<p>В медицине, когда случается ЧП, нужно говорить быстро и внятно.</p>

<p>— Жена моего инвестора на пятом месяце рожать надумала.</p>

<p>Я не уточнял, что он самый титулованный бизнес тренер стран СНГ.</p>

<p>С этого момента Радислав стал моим земляком, живущим не на Рублёвке, а на соседней улице в Одессе.</p>

<p>Хотя, впрочем, именно она и была указана в его паспорте.</p>

<p>— Схватки начались. Они поехали в «Исиду», но их не приняли.</p>

<p>— Правильно сделали, нечего им статистику портить. Они репутацией дорожат.</p>

<p>— Да, они ребята состоятельные. Я не о клинике, а о приятелях — не местные, с Москвы приехали погостить. А тут вот такое дело.</p>

<p>— Так… Мы их не возьмём, у нас нет таких возможностей. Надо на Предславинскую. Там специализируются на таких случаях. Попробуют остановить родовую деятельность, затолкнут плод обратно. Я сейчас состыкуюсь с их главной. Наберите меня минут через десять.</p>

<p>Уже через пятнадцать минут Радислав с супругой, получив от меня заветный номер заведующей отделением патологии беременности, ехали в центр Киева — в роддом на улице Предславинской, прямо за Дворцом «Украина».</p>

<p>Два последних нуля на часах сменились на цифру 16.</p>
<p>Два солнечных лучика, как два бездельника, пробивались сквозь плотную штору и всем своим видом намекали на хорошую погоду за окном.</p>

<p>От ночи не осталось и следа.</p>

<p>Почему-то вспомнилась Одесса.</p>

<p>Когда после битвы с космическими пришельцами мы с Владиком, полусонные, садились в его «копейку» и в окружении таких же солнечных лучей летели в сторону института — к будням студенческой жизни.</p>

<p>Эх, беззаботное время…</p>

<p>Самой большой нашей проблемой был бензонасос в его жигулёнке.</p>

<p>На новый денег не хватало, а ремкомплект из прокладок и пружинок вырабатывал свой ресурс меньше чем за неделю.</p>

<p>Часто из-за этого мы опаздывали на лекции.</p>

<p>Если нас всё-таки пускали, то как два автослесаря с бензиновым амбре за собой — под хихиканье девчонок и завистливые взгляды пацанов, мы поднимались вверх по лекционному залу к свободным местам.</p>

<p>Опоздание свыше десяти минут приравнивалось к хулиганству средней степени тяжести, а пятнадцатиминутное перекрывало любую возможность входа в аудиторию.</p>

<p>Всем опоздавшим грозила каторга и ссылка в библиотеку, с последующей отработкой пропущенной лекции во внеурочное время.</p>

<p>У Радислава был Range Rover Vogue.</p>

<p>Ух, аппарат!</p>

<p>Не то что наша «копейка».</p>

<p>Когда он подъезжал на таком к своим клиентам, вопросы о возможных скидках отпадали сами собой.</p>

<p>Если человек приезжал на переговоры на такой машине, то, скорее, ему ещё придётся доплатить лишь за сам факт общения.</p>

<p>Торговаться с ним было бессмысленно.</p>

<p>Статусная машина бизнесмена в годах, знающего, чего хочет от жизни, планирующего дела на год вперёд и ночующего в отелях не ниже «Hilton», стоила целое состояние.</p>

<p>Но вряд ли он приехал в Киев на ней.</p>

<p>В таких случаях Радислав предпочитал самолёт.</p>

<p>Какая именно машина подвозила его к отделению патологии беременных городского роддома Киева было уже не важно.</p>

<p>Главное, чтобы вовремя.</p>

<p>Чтобы успели.</p>

<p>Тут второго шанса не будет: отойдут околоплодные воды и финал истории.</p>

<p>Но майским ранним утром в Киеве нет пробок.</p>

<p>Город пуст.</p>

<p>Доедут быстро, подумал я и закрыл глаза.</p>

<p>Вставать совсем не хотелось.</p>

<p>Звонок от Радислава раздался дня через три–четыре, около полудня.</p>

<p>Как раз во время моей консультации одной пациентки о возможности проведения сеанса лучевой хирургии по поводу метастазов в её головном мозге.</p>

<p>Обычно я не беру телефон, когда консультирую, но, учитывая анамнез этой молодой семейной пары Радислава и Анны, звонок я принял.</p>

<p>— Да, слушаю.</p>

<p>— Алексей, голос Радислава из трубки был ровным и спокойным, как обычно.</p>

<p>И тут я понял: именно таким голосом учитель в школе объявляет классу результаты годовой контрольной работы.</p>

<p>— У Ани всё хорошо.</p>

<p>Родовую деятельность остановили, и её сегодня выписали из отделения.</p>

<p>— О, приятно слышать, поздравляю вас.</p>

<p>— Мы хотим с Аней отблагодарить тебя за помощь, которую ты оперативно нам оказал.</p>

<p>И приглашаем тебя в ресторан 5ОК.</p>

<p>Ты знаешь, где он находится?</p>

<p>— Нет, я даже понятия не имел о существовании такого ресторана.</p>

<p>— Это… сейчас…, — слышно было, как Радислав уточняет у кого-то адрес и похоже, это был официант.</p>

<p>— Это угол Большой Васильковской и Федорова.</p>

<p>Мы уже тут.</p>

<p>Подъезжай.</p>

<p>Сегодня выходной, отметим наше выздоровление… — он на секунду осекся и поправил себя сам, — выписку из больницы.</p>

<p>— Да, я пока в центре, тут консультация.</p>

<p>Пока немного занят.</p>

<p>Ехать мне минут сорок.</p>

<p>— Ничего, мы подождём.</p>

<p>— Приезжайте.</p>

<p>Настойчивость Радислава была феноменальной.</p>

<p>Я отложил телефон и ещё раз извинился перед пациенткой.</p>

<p>— Тяжёлый случай, преждевременные роды.</p>

<p>Не вникая в подробности, я объяснил необходимость отвлечься от пациента в пользу телефонного звонка.</p>

<p>Вроде мелочь, но, как песчинка, попавшая в чувствительный прибор, это царапало где-то внутри меня несоответствие:</p>

<p>«Мы тут, мы подождём… а она уже выписалась.</p>

<p>Почему она, а не мы?</p>

<p>Ведь вас трое?»</p>

<p>Ну да ладно, заработался я, и мерещится всякая ерунда.</p>

<p>Я старался консультировать пациентов у себя в кабинете, хоть под эти цели было отведено целое специальное место с дипломами и сертификатами врачей-онкологов и радиологов Санкт-Петербурга на всю стенку.</p>

<p>Тут же была какая-то домашняя обстановка, располагающая к доверительной беседе.</p>

<p>Верхняя одежда пациента и часто сопровождающих родственников размещалась в общем шкафу с моей курткой, и даже такая мелочь сближала меня с ними.</p>

<p>В этот раз, закрывая дверь кабинета, я на минутку задержался.</p>

<p>Муж бережно и, как-то очень заботливо и тепло, помогал своей несчастной жене надеть пальто.</p>

<p>Он делал это незаметно для всех, но при этом слегка обнимал её плечи.</p>

<p>Уходя, он промолвил:</p>

<p>— Мы не теряем надежду, доктор?</p>

<p>Она ничего не сказала.</p>

<p>Лишь посмотрела на меня, моргнула и слегка кивнула, рождая при этом лёгкую улыбку в уголках губ.</p>

<p>— Всё будет хорошо, обещаю вам.</p>

<p>Я закрыл кабинет и по дороге к машине набрал в навигаторе телефона адрес ресторана 5ОК.</p>

<p>Место, в котором мы договорились встретиться с Радиславом, не очень-то походило на ресторан.</p>

<p>Торец жилого дома с летней верандой, выходящей на тротуар, можно было проехать и не заметить, если бы я заранее не установил точку в навигаторе.</p>

<p>Официанты, молодые ребята в длинных до земли фартуках, шустро бегали вокруг столиков с клиентами, а две девчушки развешивали в подвесных горшочках ещё совсем не окрепшие петуньи.</p>

<p>Неоспоримым плюсом этого места было то, что припарковать автомобиль здесь не составляло ни малейшего труда.</p>

<p>Не люблю я приходить в ресторан среди бела дня, особенно когда тебя там уже ждут.</p>

<p>Администратор на входе всегда заискивающе улыбается и предлагает пройти внутрь, в надежде, что ты не ел шесть дней, но потом быстро теряет всякий интерес, когда понимает, что тебе тут назначено.</p>

<p>Холл Премьер палаца и моё собеседование там два года назад накатили на меня волной воспоминаний.</p>

<p>И ведь тоже была весна, подумал я, поднимаясь по ступенькам к входу.</p>

<p>В этот раз я увидел Радислава сразу.</p>

<p>Он сидел немного в глубине летней веранды, лицом ко мне, вместе со своей женой, и приветливо махнул рукой.</p>

<p>Своему стилю в одежде он не изменял.</p>

<p>Правда, в этот раз дорогой костюм был одет сверху не на футболку, а на рубашку.</p>

<p>В начале мая в Киеве бывает прохладно.</p>

<p>Его жена улыбнулась мне и протянула руку для приветствия, просто подав её в мою сторону.</p>

<p>— Алексей. Присаживайся.</p>

<p>Неожиданно было услышать именно это слово от учителя русского языка и литературы одесской школы, пусть даже в далёком прошлом.</p>

<p>Обычно говорят «садитесь, пожалуйста», но я не придал этому значения.</p>

<p>— Здравствуйте.</p>

<p>Улыбнулся я в ответ.</p>

<p>«Как общее самочувствие?» — обратился я к Ане и только потом понял, что забыл поздороваться с Радиславом.</p>

<p>Ах да, здравствуйте, Радислав.</p>

<p>Мы улыбнулись друг другу и пожали руки.</p>

<p>Вот меню.</p>

<p>Заказывайте, что хотите.</p>

<p>На столе стояло пару уже тронутых тарелок с едой и несколько бокалов с остатками белого вина.</p>

<p>Самой бутылки на столе не было.</p>

<p>Разойтись что ли не на шутку, подумал я, и выбрать пару-тройку фирменных блюд?</p>

<p>Балычок какой-то особенный фирменный или филейчик из рябчика заказать?</p>

<p>Эх, выпить ничего нельзя — за рулём.</p>

<p>Молодой парнишка суетился рядом с нами и раздувал по заказу Радислава кальян, пока я так пристально рассматривал меню.</p>

<p>Я не стал злоупотреблять гостеприимством моего работодателя с супругой и, захлопнув меню, заказал стаканчик свежевыжатого апельсинового сока.</p>

<p>Аня восторженно любовалась чем-то в смартфоне и говорила с Радиславом, параллельно общаясь со мной.</p>

<p>Со стороны это выглядело так, будто она что-то выбирает в интернет-магазине или просматривает кулинарные рецепты.</p>

<p>Примерно так реагирует болельщик на слова комментатора: «опасный момент, удар…», смотря в телефоне прямой матч сборной Манчестера и Мадрида, и каждый раз толкая локтем соседа и подсовывая ему гаджет.</p>

<p>Мы говорили обо всём: об их поездке к друзьям, которые, как оказалось, живут где-то недалеко от меня, но на другом берегу Киевского моря; о кальянах, москвичах, новом тренинге Радислава, пришедшем на смену его «Камасутре для оратора» — харизме лидера; об истории государства Российского, немного о работе нашего центра и наших финансовых результатах.</p>

<p>Как оказалось, несмотря на беременность Ани, они старались никогда не нарушать планы своих путешествий и всегда подстраивать бизнес под отдых, а не наоборот.</p>

<p>Правильную расстановку приоритетов в их жизни я отметил тогда самой высокой оценкой.</p>
<p>Из саквояжа Радислав достал свою книгу «Речи, которые изменили Россию», подписал её и вручил мне в подарок.</p>

<p>Прошло незаметно почти два часа.</p>

<p>Солнце стояло высоко, и жители Киева потихоньку стали появляться на улицах.</p>

<p>Народу вокруг нас становилось всё больше.</p>

<p>Литровый графин апельсинового фреша закончился полчаса назад.</p>

<p>Чай мы допили, а филейку из рябчика я так и не заказал.</p>

<p>Худощавый парнишка с бейджиком для вынесения приговора принёс банковский терминал.</p>

<p>Радислав оплатил счёт картой, а в сундучок из деревянной коробочки положил чаевые.</p>

<p>— Алексей, у нас с Аней есть к тебе небольшая просьба.</p>

<p>Мы присмотрели тут в Киеве коляску для ребёнка и уже даже её оплатили.</p>

<p>В Москве она стоит очень дорого, а тут — совершенно сносная цена, 18 тысяч гривен.</p>

<p>Нам ещё и скидку сделали.</p>

<p>А вот ты обаятельный.</p>

<p>Ты её нам проводником передай в Москву, я в тебя верю, у тебя однозначно получится его уговорить.</p>

<p>Вот держи адрес магазина и номер нашего заказа.</p>

<p>Радислав передал мне клочек бумаги.</p>

<p>— И да, вот ещё что.</p>

<p>Мы уже не будем возвращаться в роддом.</p>

<p>Это, пожалуй, стоит передать заведующей — небольшая, так сказать, благодарность от нас.</p>

<p>Из внутреннего кармана пиджака он достал белый конверт.</p>

<p>— Ты с ней договорись на встречу.</p>

<p>Мы сегодня уже улетим, а ты с ней встреться и передашь.</p>

<p>При этом он улыбнулся так, что внешне стал немного похож на Познера.</p>

<p>Я взял конверт и переложил его в сумку.</p>

<p>Худоват, подумал я про себя.</p>

<p>Мы распрощались.</p>

<p>И с тех пор лет пять не виделись ни разу.</p>

<p>Коляску я забрал через несколько дней по адресу, указанному на листочке.</p>

<p>Она была разобрана и состояла из двух частей, хорошо упакованных в картон и стрейчевую ленту.</p>

<p>Догадаться, что это детская коляска, было совсем не просто.</p>

<p>Загружая её в багажник перед отправкой на ЖД вокзал, небольшой лоскуток картона оторвался от кокона, в котором были тщательно замотаны колёса.</p>

<p>В спицах блестели кристаллы Сваровски.</p>

<p>Проводник с неохотой взялся за груз, ссылаясь на две таможни, хлопоты и немалые габариты коляски, но я, сославшись на то, что это символический подарок нашему земляку в честь рождения его дочери, появление которой они с женой ждали долгих 15 лет, вызвал его сострадание, и мой груз был принят за символическую плату.</p>

<p>Денег на транспортные расходы Радислав оставить забыл.</p>

<p>Перед кабинетом заведующей отделением я не удержался и заглянул в конверт.</p>

<p>Внутри лежала одна пятисотгривневая купюра.</p>

<p>Второй раз мне стало стыдно.</p>

<p>Только в кабинете начмеда Говсеева на выходе, а тут на входе.</p>

<p>Через четыре месяца на свет появилась Мария.</p>

<p>И вот она маленькая Мария, появившаяся на свет после всех этих волнений и забот.</p>

<p>Всё, что происходило до её рождения, казалось мне одновременно бесконечно важным и совершенно мимолётным.</p>

<p>Радислав и Аня пережили то, что для многих стало бы испытанием на прочность, а для них очередной, пусть и неожиданный, урок жизни.</p>

<h2>Эпилог.</h2>

<p>Говорят, человеку в жизни должно повезти трижды: от кого родиться, у кого учиться и на ком жениться.</p>

<p>Иногда, мы врачи еще добавляем — у кого лечиться.</p>

<p>Судьба распорядилась так, что эти три удачи пересеклись с разными людьми и событиями.</p>

<p>Учителя, друзья, случайные встречи, все они оставили свой след.</p>

<p>Но иногда, чтобы ощутить полноту жизни, достаточно быть рядом хотя бы на шаг, на мгновение.</p>

<p>И это мгновение может быть маленьким звонком в четыре утра, коротким визитом в ресторан или лишь конвертом с символической купюрой.</p>

<p>В этих мелочах и заключена сама суть: сила человеческих связей, доверие и умение поддержать друг друга.</p>

<p>Радислав и Аня доверились мне, я им, и мир, пусть ненадолго, стал чуть светлее, чуть теплее.</p>

<p>Маленькая Мария стала живым символом того, как прошлое, настоящее и будущие пересекаются в самых неожиданных точках.</p>

<p>Жизнь не даёт гарантий, но даёт шанс.</p>

<p>И важно его заметить.</p>

<p>Именно в этих шансах, в маленьких поступках и мгновениях радости и заботы, находится настоящая удача.</p>

<p>Не в деньгах, не в статусе, не в громких словах и титрах игр, а в возможности быть человеком, рядом с теми, кому можешь помочь, и теми, кто способен изменить твою жизнь.</p>

<p>И может быть, через годы, оглядываясь назад, понимаешь: всё, что казалось случайным, было частью одной большой, тонкой и удивительной игры, которую зовут жизнь.</p>

<p>А мы, как игроки, иногда видим только отдельные уровни, не догадываясь, что каждый шаг, каждый звонок и каждый жест складываются в нечто гораздо большее.</p>

<p>Я вспомнил все события последних лет, звонки в четыре утра, гонку по Киеву, коляску, перевозку её через полстраны, волнения и радость.</p>

<p>И в голове вдруг прозвучали слова Радислава, которые он теперь произносил на своих тренингах:</p>

<p>«Благодарность — это форма присутствия, она возвращает нас в точку «здесь и сейчас», где и происходит жизнь.</p>

<p>Учитесь быть благодарным:</p>

<p>себе за усилия, даже если результат ещё впереди;</p>

<p>людям за участие, за опыт, за уроки;</p>

<p>обстоятельствам, даже тем, что кажутся неудачными.»</p>

<p>Радислав, человек, который когда-то всегда считал каждую копейку, продумывал шаги наперёд и тщательно взвешивал каждое своё действие, возможно теперь понимал: не всё в этом мире измеряется деньгами.</p>

<p>Самые важные вещи - это внимание, забота, время, умение присутствовать и ценить момент.</p>

<p>И именно эта трансформация, это осознание благодарности и стало для него настоящей победой.</p>

<p>А может, он просто научился хорошо играть роль благодарного человека, продолжая зарабатывать деньги и контролировать жизнь.</p>

<p>Но нам этого не судить.</p>

<p>Главное, это не пропустить свою собственную жизнь, не упустить мгновения, где происходит настоящее, здесь и сейчас.</p>

<p>…И когда я вернулся домой после всех этих звонков, поездок и дел, посмотрел на пустую коляску в углу, понял одно:</p>

<p>жизнь это не то, что с тобой происходит, а то, что ты успел сделать, пока она шла мимо.</p>
