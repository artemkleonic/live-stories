    <h2>Эпилог</h2>

    <p>Мой хороший знакомый, кстати тоже одессит и как любой одессит - человек с прекрасным чувством юмора, очень эрудированный и приятный, как собеседник, прочитав мои рассказы, недавно сравнили меня с Сергеем Довлатовым.</p>

    <p>Я сначала даже обрадовался.</p>

    <p>Потом перечитал его несколько произведений и мне стало как-то не по себе. У него там есть один замечательный рассказ. Чемодан.</p>

    <p>Персонаж, о котором он повествует, вдруг вскакивает и говорит:</p>

    <p>— Ну хорошо. Съем я в жизни две тысячи котлет. Изношу двадцать пять темно-серых костюмов, перелистаю семьсот журналов «Огонек». Все. И что? И сдохну, не поцарапав земной коры?.. Уж лучше жить минуту, но по-человечески.</p>

    <p>Красиво звучит. Очень красиво. Даже слишком. Я сначала кивнул.</p>

    <p>Ну да. Конечно. Кто же хочет прожить жизнь как бухгалтер собственного существования. А потом поймал себя на мысли, что меня в этой фразе что-то, таки да, царапает. Нет, не мысль. А скорее, интонация. Как будто есть только два варианта. Либо ты считаешь котлеты… либо ты герой. И никакого третьего. Я попробовал разобраться.</p>

    <p>Что значит «по-человечески»?</p>

    <p>Это как? Сорваться и уехать? Сжечь мосты? Плюнуть на всё, потому что «надоело»? Я видел таких людей. Они живут ярко. Очень ярко. Так ярко, что через пару лет от них остаётся только выжженная траектория и пара красивых историй, которые удобно рассказывать за столом. А потом наступает тишина. Та самая, от которой многим хочется сбежать. И вот в какой-то момент мне пришла другая мысль. А что если дело вообще не в яркости? Что если всё это не про «минуту»?</p>

    <p>Допустим, что мы здесь не случайно. Я про Землю. Не в смысле высоких слов и религиозных лозунгов. А просто как рабочая гипотеза. Что если это место, ну что-то вроде испытания. Нет. Не не ради наказания, и не ради награды. А просто этап, который надо пройти. И пройти его нужно обязательно всем, ну почти, как ВЛК, для мужчин призывного возраста. И у каждого здесь есть выбор. Можно плыть. Можно наблюдать. Можно так аккуратно прожить, чтобы нигде не ошибиться. Это даже выглядит разумно. Ты совсем не рискуешь. Не страдаешь, и даже не особо теряешь  Но есть одна проблема. Ты ничего не выбираешь. А значит, по сути, уже выбрал. Я долго не мог это сформулировать, пока не наткнулся на простую вещь.</p>

    <p>КАМЕНЬ.</p>

    <p>Самая простая и безопасная форма существования материи, которую мы можем представить в своей голове. Камень не ошибается. Камень не переживает. Камень никуда не спешит. Он просто есть. И вот тут появляется интересная деталь.</p>

    <p>А ведь камень может быть разным. Обычный, серый, лежащий у дороги.</p>

    <p>А может быть и алмаз. Да да. Тот самый. Чистый. Идеальной формы.</p>

    <p>Дорогой. Но если этот алмаз лежит на необитаемом острове…</p>

    <p>он ведь ничего не стоит. От него нет пользы. Он не меняет мир. Он просто лежит в песке под пальмой.</p>

    <p>Такой красивый. Совершенный.</p>

    <p>И абсолютно бесполезный. Ящерица, которая пробежала с ним рядам может быть даже на него выкинула из себя свои отходы, а рыбам в океане он вообще не виден. Максимум, эти маленьким алмазом, которым можно резать стекло или гранит, а большим только любоваться.</p>

    <p>И всё.</p>

    <p>В какой-то момент я понял, что разница между людьми часто не в том, хорошие они или плохие. А в том, выбрали ли они движение или покой? Потому что можно быть идеальным. Правильным и аккуратным, но при этом неподвижным. Кристалл ведь тоже камень. Просто правильной формы. И, возможно, вся эта история вообще не про то, как прожить ярче.</p>

    <p>А про то, чтобы не застыть. Как говорят? Не засахариться.</p>

    <p>Потому что тот, кто ничего не делает, уже выбрал. Он выбрал форму, в которой ничего не меняется. И тогда всё становится на свои места. Это не про котлеты. И не про костюмы. И даже не про журналы огонек. Это про то, выдержишь ли ты свою жизнь целиком. С ошибками. С рисками. С последствиями. Или аккуратно проживёшь её так, чтобы не поцарапать ничего вокруг. И не измениться самому. Потому что прожить минуту по-человечески, да это легко. А вот прожить по-человечески всю жизнь, о,</p>

    <p>это уже совсем другой разговор.</p>

    <p>У меня есть соседка.</p>

    <p>Пожилая женщина. Пенсионерка.</p>

    <p>Человек очень своеобразный. Матерный язык дня нее более, чем родной. Как говорят, она на нем не ругается, она на нем разговаривает. Нет. Она на нем думает. С виду она добрая. Но внутри очень точная и расчётливая. Она как будто хочет сделать что-то хорошее, но при этом делает это так, что в итоге хорошо становится только ей. Я как-то имел неосторожность, и попал под её влияние. Был период, когда мне пришлось пожить у неё некоторое время.</p>

    <p>Всё начинается красиво. Очень красиво. Она принимает. Угощает.</p>

    <p>Предлагает лучшее место в доме.</p>

    <p>И ты думаешь — повезло. А потом начинается давление. Сначала лёгкое.</p>

    <p>— У меня тут кое-что сломалось… не посмотришь?</p>

    <p>Нормально. Конечно, посмотришь.</p>

    <p>Потом ещё. Потом больше. Потом уже огород и несколько соток целины.</p>

    <p>Надо вскопать. Лопатой. Мотоблок - дорого. И в какой-то момент ты понимаешь, что это уже не помощь.</p>

    <p>Ты просто стал удобным.</p>

    <p>Я ей тогда как-то прямо сказал:</p>

    <p>— У тебя люди превращаются в рабов, в крепостных.</p>

    <p>И что ведь интересно. Они не работают у неё за деньги.</p>

    <p>В лучшем случае за еду и крышу над головой, ну и конечно за водку.</p>

    <p>А еще, у неё есть сарай.</p>

    <p>Там тепло. Есть печка. Стол. Пара стульев. Электричество. Проточный нагреватель воды и телевизор.</p>

    <p>Рукомойник, как в детстве — «Мойдодыр». Глиняные стены. Деревянный пол со щелями для мышей и конечно яма под полом, видимо, для комбикорма. Когда-то это была кухня для разделки свиней.</p>

    <p>Зимой — тепло. Летом — прохладно.</p>

    <p>Можно резать тушу  Можно отстаивать мясо. Можно переночевать.</p>

    <p>Теперь там живут люди. Нет не военные. Им она стелит в доме. А те, что ниже по сословию.</p>

    <p>И иногда они падают в ту самую яму.</p>

    <p>А еще. Она варит самогон.</p>

    <p>Делает его плохо. Очень плохо. Нет не плохо, она делает его ужасно. Никакой технологии. Никакого разделения. Это даже не напиток.</p>

    <p>Это всё, что горит. Но она гордится крепостью.</p>

    <p>— Больше шестидесяти, — говорит.</p>

    <p>Пахнет он так, что пить можно только зажав нос. На следующий день голова раскалывается.</p>

    <p>Но тут это валюта. Ею платят за работу. Люди приходят. Работают.</p>

    <p>Получают свою «дозу». На несколько часов появляется энергия. Потом снова руки начинают трястись. Она наливает ещё. Вечером, уже неважно, где ты окажешься. На койке.</p>

    <p>В сарае или под забором.</p>

    <p>Если завтра ты снова придёшь,</p>

    <p>значит, круг замкнулся. И всё повторится.</p>

    <p>Она живёт… просто потому что живёт.</p>

    <p>Не создавая при этом ровным счетом ничего. Кроме углекислого газа. Который булькает из её аппарате. И выходит из неё самой, когда она дышит, спит или пукает.</p>

    <p>Недалеко от меня живёт ещё одна тетка. Похожая на нее. Только хуже. Но это для меня. Для своих детей, ведь она мама.</p>

    <p>Она не просто существует. Она вмешивается. Подслушивает.</p>

    <p>Искажает. Разносит.</p>

    <p>Если первая - камень,</p>

    <p>то эта уже бросает камни. Она делает движение. Но не туда.</p>

    <p>Будет нечестно, если я расскажу только о них. С другой стороны моего участка живут другие соседи. Муж и жена. Дети моего старого знакомого.</p>

    <p>Он был геолог. И когда он выбирал себе участок, он сказал вначале себе, а потом своей жене, ну а уж совсем потом мне:</p>

    <p>— Это моё место.</p>

    <p>Он посмотрел десятки вариантов в радиусе пятидесяти километров от Киева. И выбрал именно этот. У меня была такая же история. Мы с ним совпали с выбором места для жизни. Он первым подошёл знакомиться. И я рассказал ему о своей мечте. О доме. О балконе. О том, как зимой выходить на него и смотреть, как снег ложится на сосны.</p>

    <p>Он выслушал. И через время посадил у себя на участке около двадцати сосен. Прямо под моим на тот момент балконом, которого еще не было.</p>

    <p>Сам.</p>

    <p>Он сам привёз из леса маленькие саженцы. Сажал на коленках. Поливал. Что-то не прижилось.</p>

    <p>Что-то засохло. Но сейчас под моим балконом стоит посаженная им сосновая роща.</p>

    <p>Он сделал это у себя, на своем участке. Для меня. Он умер от ковида. Почти сразу за ним ушла и его жена. Мы с ним иногда встречались утром. Между участками у нас натянута сетка рабица. Я приносил немного своего напитка. Совсем чуть-чуть.</p>

    <p>Грамм тридцать. Он оглядывался по сторонам и , улыбался:</p>

    <p>— Давай.</p>

    <p>Мы выпивали.</p>

    <p>Без закуски.</p>

    <p>Она там не нужна была.</p>

    <p>В этом было что-то правильное.</p>

    <p>Не про алкоголь.</p>

    <p>Про момент. Про связь.</p>

    <p>А за несколько лет до этого муж моей той первой соседки приходил ко мне со своей пустой пол-литровой банкой и трясущимися руками.</p>

    <p>— Дай что-нибудь выпить. Она мне не даёт. Тоже утро, тоже солнце, только как-то неуклюже становится на душе.</p>

    <p>Хороший был мужик. Но это уже был не ритуал. Это было продление.</p>

    <p>На день. Может, на несколько часов. Я не наливал ему. Я не хотел ему сокращать жизнь. Кстати, Арарата у меня тогда не было, и все, чем я мог с ним поделиться, это лишь те запасы, которая его супруга мне тогда продала.</p>

    <p>Сын того соседа, который посадил сосны, когда началась война, был в Киеве. А я с семьей остался здесь.</p>

    <p>Он сказал:</p>

    <p>— Забирай всё, что тебе нужно. Дрова. Хочешь — разбирай сарай. Он тебя согреет.</p>

    <p>Я не разбирал. Но сам факт…</p>

    <p>Он даёт силу. У нас между участками общая калитка. Такая широкая, что можно там пройти вдвоём.</p>

    <p>Мы просто сделали её вместе. Потому что так проще. И потому что так правильно. Это человек, к которому можно прийти. И который придёт к тебе. Без расчёта. Просто потому что может.</p>

    <p>Будет нечестно, если я расскажу только о них.</p>

    <p>Ведь я тоже делаю напитки. И при этом я злостный противник алкоголя. Звучит как нонсенс. Но это правда.</p>

    <p>Я не хочу, чтобы люди пили. И это не бравада. И точно не реклама.</p>

    <p>Я физически не могу сделать столько, сколько мог бы продать.</p>

    <p>С каждым годом моих напитков становится меньше. Я не поднимаю цену. Хотя мог бы. И даже логично было бы.</p>

    <p>Солярка дорожает, а значит, дорожает всё. Транспорт. Хлеб. Электричество. У всех есть объяснение. У меня его нет. Мне хватает.</p>

    <p>Как говорил Холмс Ватсону</p>

    <p>— ну что мне нужно? Кусочек хлеба и чистый воротничок? Я не хочу зарабатывать на том, от чего люди деградируют.</p>

    <p>Но и врать не буду. Мои напитки не дрянь. Иногда человеку достаточно тридцати грамм, чтобы остановиться и услышать, что у него в голове.</p>

    <p>Я врач. И имею право говорить о дозе. В медицине это вообще ключевое слово. Даже в настойке боярышника есть польза, если понимать, что ты делаешь.</p>

    <p>Вопрос не в веществе. Вопрос количестве и в человеке. Сейчас мне больше пятидесяти. И я понимаю простую вещь. Важно не то, что ты производишь. Важно, что это потом делает с людьми. Я хочу, чтобы человек, получивший мою бутылку,</p>

    <p>растянул её на год. Чтобы это был не запой. А повод. Повод остановиться.</p>

    <p>Подумать и переосмыслить.</p>

    <p>Мне нравится то, что я делаю.</p>

    <p>Не потому что это напитки.</p>

    <p>А потому что это инструмент.</p>

    <p>Иногда это повод для разговора.</p>

    <p>Иногда для тишины. Иногда для того, чтобы человек впервые за долгое время задумался. Хотя бы начал думать. А это ведь уже движение.</p>

    <p>Это уже точно не камень.</p>

    <p>Я не хочу, чтобы меня читали и мной восхищались. Я хочу, чтобы после прочтения, человек сделал хоть что-то. Неважно что. Как сказал Воланд:</p>

    <p>— Да делайте уже, черт возьми.</p>

    <p>И, возможно, в этом моя разница с теми, кого я читаю.</p>

    <p>Они наблюдали.</p>

    <p>Я не хочу только наблюдать.</p>

    <p>Я хочу, чтобы после меня что-то менялось. Хотя бы в одном человеке.</p>

    <p>Потому что иначе мы очень быстро становимся формой. Аккуратной. Логичной. Безопасной и неподвижной. Камень ведь тоже идеален. Просто у него нет ни одного шанса.</p>

    <h2>Эпилог</h2>

    <p>В какой-то момент становится понятно: жизнь не спрашивает, кем ты хочешь быть. Она просто фиксирует выбор. И не словами. Не намерениями. А тем, что ты делаешь каждый день.</p>

    <p>Можно долго объяснять себе, почему не сейчас. Почему позже. Почему «ещё не время». И незаметно для себя превратиться в форму,</p>

    <p>в которой уже ничего не меняется.</p>

    <p>Аккуратную такую форму, удобную многим и главное, безопасную.</p>

    <p>Вот прямо, как камень.</p>

    <p>Можно быть даже красивым.</p>

    <p>Правильным и почти идеальным. Но это всё не имеет значения, если внутри нет движения.</p>

    <p>Потому что цена человека совсем</p>

    <p>не в том, как он выглядит со стороны. И не в том, что о нём говорят. А в том, оставляет ли он после себя что-то,</p>

    <p>кроме углекислого газа.</p>

    <p>Не обязательно великое.</p>

    <p>Не обязательно заметное.</p>

    <p>Иногда достаточно одного поступка.</p>

    <p>Одного решения. Одного действия, после которого чей-то мир становится чуть лучше.</p>

    <p>И, возможно, в этом всё и есть. Не в том, чтобы прожить ярче. И не в том, чтобы прожить правильно. А в том, чтобы не застыть и не засахариться.</p>

    <p>А все потому, что у человека всегда есть выбор. Даже если он делает вид, что это не так.</p>

    <p>И в тот момент, когда он начинает действовать, у него как раз и появляется шанс. Не стать лучше других, а стать другим собой.</p>
