    <template id="storyText">
      <p>У него дома жила мышь.</p>

      <p>
        Самая обычная, лабораторная, из тех, что живут в вивариях мединститутов.
        А потом на них ставят опыты. Белая. Маленькая. С красными глазками. Для
        неё был построен настоящий замок. Даже не замок, а дворец. Картонный, в
        несколько этажей, с комнатами и переходами. Он занимал почти весь стол.
        Где-то метр в высоту и почти квадратный метр в своем основании.
      </p>

      <p>
        Вполне приличные апартаменты. Не каждый человек может себе такие
        позволить.
      </p>

      <p>
        А тут - мышь. Он её любил. Даже не так, он её боготворил. Говорил, что
        она порой умнее некоторых людей. А я не спорил. Почему-то соглашался.
      </p>

      <p>
        Его звали Данил. Мой одноклассник по школе с первого до восьмого
        включительно.
      </p>

      <p>
        Жил он на первом этаже самой обычной одесской хрущёвки. Мы были почти
        соседями. Мой дом заканчивался и почти сразу, через гаражи, начинался
        его.
      </p>

      <p>
        Иногда было просто приятно проходя мимо, постучать в его окно, и пяти
        секунд не проходило, как он уже выглядывал. Я его баловал фразой, быть в
        Ватикане и не зайти к папе римскому? Он улыбался и всегда и приветливо
        качал головой.
      </p>

      <p>
        Мы могли подолгу так стоять и разговаривать: я с улицы, а он из окна
        своей комнаты. Хотя можно было зайти внутрь. Но почему-то это казалось
        лишним. Может быть, потому что в комнате стоял запах?
      </p>

      <p>
        Тот самый запах старых полов, щелей и амбарной пыли, а главное полного
        при этом отсутствия котов. Тот самы Мышиный запах?
      </p>

      <p>
        Но, наверно, нет. Нам он никогда не мешал. А зайти через дверь - это
        ведь было целое дело. Нужно снять обувь, помыть руки, ведь обязательно
        могли там чем то угостить по дороге через кухню и гостиную, потом все
        проделать снова, в обратном порядке. Тут под окном все было куда проще.
      </p>

      <p>С ним было интересно.</p>

      <p>Он казался самым обычным. И при этом совсем не обычным.</p>

      <p>
        Мы с ним делали всё, что делают мальчишки. Костры. Поездки.
        Бессмысленные авантюры.
      </p>

      <p>
        Самодельные штуки, которые сначала стреляли спичками, а потом уже чем-то
        более серьёзным. Мы улучшали наши велосипеды, цепляя на них фары и
        динамо-машины и конечно мечтали.
      </p>

      <p>
        Он был немногословен. Но начитан и эрудирован. Он сам начал изучать
        китайский язык и достиг в этом определенных успехов. Но при всем этом -
        совершенный аскет. С одной парой брюк, двумя-тремя футболками и одним
        простым брезентовым ремнем на поясе.
      </p>

      <p>
        Жилистый и сильный. В любую погоду ходил в летних тряпичных кроссовках.
        При этом совершенно не любил таскать что то в руках. Только рюкзак и
        только с самым необходимым. В школу нас заставляли брать с собой сменную
        обувь. Уборщиц было полно, на каждом этаже своя штатная единица, но,
        видимо, именно так нам прививали любовь к порядку и к чистоте школьного
        пола. Эту сменную обувь называли второй. Пустяковая ведь задача. Все что
        нужно было сделать, это притащить её с собой, но ведь это еще плюс одна
        сумка к портфелю. А забыть её дома или в школе не составляло вообще
        никакого труда. Конечно, никто и никогда не смотрел, менял ты её или
        нет, но сам факт наличия втрой обуви проверялся дежурными церберами на
        входе с особой строгостью. Так вот Данил нашел выход. Со старой огромной
        куклы, найденной им на помойке под домом, он снял белые пластиковые
        тапочки. Они были на новорожденного и занимали очень мало места. Каждый
        раз он предъявлял их как пропуск в мир школы.
      </p>

      <p>
        — Вот вам моя вторая обувь! Говорил он демонстративно доставая их из
        кармана своего рюкзака в пакете меньшем чем бутерброд.
      </p>

      <p>На него смотрели и всегда его пропускали.</p>

      <p>Внешне он был чем то немного похож на Арнольда Шварценеггера.</p>

      <p>
        Тем же взглядом. Тем же выражением лица. Что то определенно общее было у
        него с кумиром нашего времени. И вот это его немногословие. Казалось,
        что после сменной обуви он из за пояса вытащит винчестер и направит его
        точно между глаз любому, кто его еще раз об этом попросит.
      </p>

      <p>
        А еще у него был велосипед «Украина». Чёрный. Нет, вначале он был
        конечно классического зеленого цвета, но позже он его перекрасил в
        черный. И получилось лучше, чем с завода.
      </p>

      <p>Колёса накачаны до камня.</p>

      <p>
        И стоило ему сделать всего пару движений ногами и велосипед не ехал. Он
        плыл по асфальту или по проселочной дороге. Не важно. При этом он не
        издавал ни одного скрипа и не одного лишнего звука.
      </p>

      <p>А у меня была «Десна».</p>

      <p>
        С маленькими такими колёсиками. Мне приходилось крутить педали в два, а
        то и в три раза быстрее чем он. Чтобы хоть как то поддерживать такую же,
        как у него скорость.
      </p>

      <p>
        Я ехал рядом с ним, как маленький буксир рядом с фрегатом, наматывал
        круги и тихо ему завидовал. Пока у меня не появился велосипед побольше с
        рулем в виде бараньих рогов и надписью на раме старт - шоссе.
      </p>

      <p>
        Мы часто ездили с ним под аэропорт. В городе было скучно. А там. Там
        была свобода.
      </p>

      <p>
        Птицы. Пустые поля. Отсутствие людей. И огромные величественные
        воздушные суда, которые или садились или взлетали, но при этом, когда мы
        очарованные смотрели на них, замирали наши сердца.
      </p>

      <p>Конечно, у меня были и другие друзья.</p>

      <p>
        И, наверное, именно поэтому мне всё время хотелось его вытащить. Хоть
        ненадолго. Перетащить в мир с шумом, с беготнёй, с какими-то глупыми, но
        порой живыми вещами. Я звал его. И иногда очень настойчиво. Иногда почти
        уговаривал. Но у меня никогда не получалось. Он как будто жил в своем,
        но в другом месте. Не географически. И это чувствовалось.
      </p>

      <p>
        Дом у него был самый обычный. Хрущёвка. Первый этаж. Окно с решёткой.
        Все как у всех. Только Мышь в домике, иногда выглядывала из окна своего
        картонного замка. Но это была его мышь и его жизнь из которой он не
        хотел выходить.
      </p>

      <p>Родители.</p>

      <p>
        Отец у него был удивительный человек. Дядя Саша. Живой. Настоящий.
        Такой, про которого говорят - жизнь в нём бьёт через край. Байдарочник.
        Он всё время куда-то ходил и даже немножко бегом. По рекам, по
        маршрутам, по своим каким-то дорогам. По родительским собраниям.
      </p>

      <p>
        Рассказывал истории.Смеялся. Вечно в движении. Активный, шумный, и
        скаким-то правильным вкусом к жизни.
      </p>

      <p>
        Он участвовал в родительском комитете, вечно что-то организовывал и
        куда-то постоянно тянул детей. Настоящий «живчик».
      </p>

      <p>Мать была другой. Имя её я не запомнил.</p>

      <p>Журналистка.</p>

      <p>
        Работала в газете, связанной с мэром Одессы — Эдуардом Гурвицем. Писала
        о нём, с ним и просто так, но как то так, что не всё можно было потом
        напечатать. В ней было что-то… не до конца понятное. Неуловимое.
        Редакция у них находилась за оперным театром, в «Пале-Рояле». Место
        известное. С каким-то своим настроением. Но и со своими тайнами.
      </p>

      <p>
        Она всегда спокойно принимала всех друзей своего единственного сына,
        приветствовала и почти сразу уходила в свою комнату. Через минут
        тридцать она могла принести Данилу большую тарелку с фруктами, и при
        этом никогда не говорила - мальчики это вам. Это было ему, она при этом
        даже акцентировала. Данил - скушай это и снова уходила в свою комнатки.
        Ну а уже потом мы ее пилили. Особенного отношения у нее не было ни к
        кому. Я же был там желанным гостем. И иногда мне казалось, что она
        что-то чувствуют. Или знает. Но не говорит.
      </p>

      <p>
        С Данилом, мы разговаривали на любые темы. Бродили почти всегда где
        хотели и смотрели на жизнь, которой никто не мешает идти с нами по одной
        дороге.
      </p>

      <p>И, конечно, экспериментировали.</p>

      <p>Сначала безобидно.</p>

      <p>
        Потом уже не очень. Мы делали такие вещи, которыми, как нам казалось,
        когда-то искусно владели гусары. Они стреляли из них во врагов или
        стреляли сами в себя на дуэлях.
      </p>

      <p>
        Конструкции из дерева и металла, покрытые двенадцатью слоями мебельного
        лака, были нашими маленькими шедеврами. Пистоли ручной работы, которые
        заряжались через ствол, стреляли шумно и дымно, но при этом были они
        почти ювелирными произведениями искусства. И, что самое страшное - они
        работали. Мы уезжали подальше от города и проводили там наши полевые
        испытания. И всё шло хорошо.
      </p>

      <p>А потом…</p>

      <p>Сначала пострадал он.</p>

      <p>Потом я. Но не от них.</p>

      <p>А началось всё с того, что мы отпилили у самолёта колесо.</p>

      <p>
        Як-40. Переднее. Прямо под кабиной пилотов. Самолёт, конечно, был
        списанный. Стоял на кладбище техники недалеко от взлетно-посадочной
        полосы того самого Одесского аэропорта. В заборе там была дыра, как и
        положено. Мы пролезали туда и «пилили» магний.
      </p>

      <p>Тихо, с азартом и с пониманием, зачем он нам нужен.</p>

      <p>Колесо… Колесо было задачей посложнее.</p>

      <p>
        Но мы справились. Подложили покрышки под фюзеляж. Сделали подкоп.
        Аккуратно опустили самолёт «на брюхо». После этого колесо можно было
        провернуть. Мы не отпиливали его целиком. Нам это было не нужно. Нам
        нужен был диск.
      </p>

      <p>Один пропил. Потом второй, уже после того как провернули ступицу.</p>

      <p>
        И в руках оказался кусок драгоценного металла, ради которого всё это и
        затевалась.
      </p>

      <p>
        Для нас - пацанов - куда дороже золота. Мы точили его напильниками, как
        термиты пень. Медленно и упорно. Без всяких станков и шлифмашинок.
      </p>

      <p>
        А однажды он вспыхнул. Стружка. Прямо у него в руках. Резко. Ярко.
        Обожгло сильно руку.
      </p>

      <p>
        Через какое-то время, точно так же обожгло и меня. Как же это было
        больно. Но стиснув зубы, я стерпел. С руки слезла кожа и выросла новая.
        Никто ничего и не заметил. Но это нас не остановило.
      </p>

      <p>Наоборот.</p>

      <p>Мы стали осторожнее.</p>

      <p>Начали читать. Изучать. Разбираться.</p>

      <p>
        Перед тем как что-то сделать, уже пытались понять, как это работает.
      </p>

      <p>
        И в последствии мы достигли больших успехов. Мне это и сейчас помогает
        доводить начатое дело до конца.
      </p>

      <p>
        А еще, он очень хорошо рисовал. Настолько, что его работы сегодня
        спокойно могли бы висеть где-нибудь на выставке какого-нибудь
        европейского музея между работами Дело Круа и Матисса. Кто знает, какая
        бы у них сегодня могла быть стоимость.
      </p>

      <p>
        Рисовал он их всегда синей шариковой ручкой. Мельчайшие линии. Детали до
        совершенство и предела человеческих возможностей.
      </p>

      <p>И почти всегда это были бои.</p>

      <p>Где одни армии мышей сражаются с полчищами других.</p>

      <p>
        На всех его рисунках мыши были солдатами или офицерами или бригадными
        генералами. Спецназ. Танки. Самолёты. Ракеты.
      </p>

      <p>Целые поля сражений на развороте школьной тетрадки.</p>

      <p>Он так и называл себя сам — «Мыш».</p>

      <p>
        Но только без мягкого знака в конце слова. Говорил, что не любит это
        смягчение в конце.
      </p>

      <p>Что «Мышь» — это уже что-то другое.</p>

      <p>А «Мыш» — это просто три буквы. Но с твердым окончанием в конце.</p>

      <p>
        Так и прижилось среди всех наших пацанов это его прозвище. Данилом его
        называли теперь только учителя и родители.
      </p>

      <p>
        Если смотреть издалека, это был просто заштрихованный лист, но если
        подойти ближе - мир, прорисованный до последней линии. Тетради у него
        были исписаны полностью.
      </p>

      <p>На развороте всегда бой.</p>

      <p>Мыш запомнили не только мы. Его запомнили взрослые.</p>

      <p>На родительских собраниях нас всегда крепко ругали.</p>

      <p>За беготню. За шум. За то, что мы носимся по школе, как угорелые.</p>

      <p>Я особенно.</p>

      <p>Я влетал в класс красный, как после бани.</p>

      <p>От меня шёл жар, как от печки.</p>

      <p>А он…</p>

      <p>Он сидел на последней парте.</p>

      <p>
        И рисовал. На переменах тоже, иногда на уроках, когда ему было скучно.
      </p>

      <p>Ему не было когда бегать, он тихо творил свои шедевры.</p>

      <p>И однажды наша классная на родительском собрании сказала:</p>

      <p>
        — Единственный ученик среди юношей в нашем классе с примерным поведением
        -это Данил Яницкий.
      </p>

      <p>Тогда это прозвучало как похвала.</p>

      <p>Позже мне стало понятно, это было не совсем так.</p>

      <p>
        Так вышло, что я проводил с ним очень много времени. С ним было
        интересно. У него был свой взгляд на мир. Совсем не такой, как у всех.
      </p>

      <p>
        И это притягивало. А однажды он сказал, что хочет уехать. Не просто из
        города, а из страны.
      </p>

      <p>
        Куда-то в тайгу. Ближе к Байкалу. Жить там одному. Тогда меня это не
        настораживало.
      </p>

      <p>
        Я уже был не совсем ребёнок, старшие классы, девятый или десятый.
        Выпускные, нужно было готовится к вступительным в вуз.
      </p>

      <p>
        Но всё равно, я отнёсся к этому спокойно. Он говорил, что здесь нет
        перспектив. Что вокруг всё какое-то… нелепое, пустое и неуклюжее.
      </p>

      <p>
        И что лучше уйти подальше от людей.Он долго выбирал место. Смотрел
        карты. Рассуждал. В итоге выбрал какое-то совсем глухое место за
        Байкалом.
      </p>

      <p>Я даже его запомнил - Усть-Илимск.</p>

      <p>Причём он говорил об этом так, будто всё уже решено. Собирал вещи.</p>

      <p>
        Готовился. Мне даже показалось, что он купил билет на поез. И почти
        сразу он начал раздавать свои вещи.
      </p>

      <p>Те, которые для него что-то значили.</p>

      <p>
        Мне отдал свою штангу, которой он качал бицепсы так просто, как многие
        сегодня жуют жвачку. Вот разговариваем мы с ним о чем то, где нужно
        подумать, а он ее таскает. Небольшую, но увесистую, сделанную добротно.
        Килограмм сорок.
      </p>

      <p>Он занимался с ней постоянно.</p>

      <p>
        Она у него стала чем то вроде четок, которые просто так вертят на
        пальцах. Стояла рядом, как что-то… своё. Почти как живое.
      </p>

      <p>— Зачем она мне там, — сказал он. — Я её не повезу.</p>

      <p>Тогда это выглядело странно. Но не настолько, чтобы задуматься.</p>

      <p>Гораздо сложнее оказался другой вопрос.</p>

      <p>— А мышь? Что делать с ней?</p>

      <p>Мы оба посмотрели на её дом.</p>

      <p>
        Она выглядывала из своего картонного дворца. Иногда высовывалась в
        окошко.
      </p>

      <p>
        У неё в верхней комнате и в башне горел свет. Под вечер он включал его,
        и мышь жила своей тихой мышиной жизнью. Он смотрел на неё и говорил:
      </p>

      <p>— Наверное, выпущу. Пусть гуляет.</p>

      <p>
        Как будто речь шла не о лабораторной мыши, а о ком-то, кто способен
        выжить.
      </p>

      <p>
        Конечно, он никуда не уехал, и я этому очень обрадовался. Но штангу свою
        он мне оставил. Просто не стал забирать. Странно.
      </p>

      <p>
        У него вообще всё было странно, особенно в комнате. Кровать его была на
        шкафу. Старый, тяжёлый, трёхстворчатый шкаф, доставшийся, кажется, ещё
        от прабабушки.
      </p>

      <p>
        И сверху его лежбище. Он залезал туда по небольшой лестнице и спал там
        на тонком туристическом коврике.
      </p>

      <p>
        Внизу стоял стол со школьными учебниками и книжками, Жюль Верн, Джек
        Лондон, «451 градус по Фаренгейту» и Дом для мыши.
      </p>

      <p>И больше почти ничего.</p>

      <p>Ночью у мыши загорался свет.</p>

      <p>
        А он лежал наверху и рассказывал, как будет жить в тайге. Как будет
        охотиться. Как приручит лося и будет ездить на нём верхом.
      </p>

      <p>Я слушал. С интересом. С вниманием.</p>

      <p>
        Я тогда не понимал, что с ним происходит. Мне казалось, что он просто
        мечтает.
      </p>

      <p>
        Сейчас я знаю, что многие делают так же. Слушают. Кивают. И не задают
        лишних вопросов. А иногда их сами рассказывают. Почти в точности, как
        он. Но это уже другая история.
      </p>

      <p>Моя школа закончилась быстро. Как то очень быстро.</p>

      <p>Я поступил в медицинский институт.</p>

      <p>
        Времени свободного стало еще меньше. Мы виделись еще реже. Иногда я
        заходил к нему. Стоял всё там же у окна. Он почти не изменился. Только…
        стал как будто дальше. И не было до конца понятно. Где он? Завис в
        прошлом или уже далеко в будущем.
      </p>

      <p>А потом у нас начался цикл лекций по психиатрии.</p>

      <p>И вот тогда всё стало складываться.</p>

      <p>
        Сначала по кусочкам. Отдельные симптомы. Фразы из учебника. Лекции
        профессора. Потом собиралось в картину, как будто маленький магнитик
        стягивает на себя хаотично разбросанную железную стружку.
      </p>

      <p>
        Я помню это странное ощущение, когда читаешь описание болезни и вдруг
        понимаешь, что ты уже это видел. Не в палате. Не в истории болезни. А у
        себя во дворе. В соседнем доме через гаражи.
      </p>

      <p>У него.</p>

      <p>Я поставил ему диагноз заочно.</p>

      <p>
        Тихо. И про себя. И от этого не стало легче. Самое неприятное было даже
        не в этом. А в том, что раньше мне это казалось нормальным. Интересным.
        Даже в чём-то… правильным. И вот тут, я начал смотреть на людей иначе.
      </p>

      <p>Замечать похожие вещи.</p>

      <p>
        Сначала редко. Потом чаще. Сначала это привлекает. Потом настораживает.
        А потом… Ты вдруг понимаешь, что к этому можно привыкнуть.
      </p>

      <p>Есть одна простая вещь.</p>

      <p>
        Если в бочку с солёными огурцами положить свежий, то он со временем
        станет таким же. Это понятно. Но обратное ведь тоже работает. Если
        солёный огурец подержать в чистой воде - соль уйдёт.
      </p>

      <p>Вопрос только в том, в какой бочке находишься ты.</p>

      <p>
        И сколько времени ты там проводишь. Я всё чаще ловлю себя на мысли, что
        вокруг становится больше таких, как он. Сначала один. Потом два. А потом
        ты уже не считаешь.
      </p>

      <p>
        Может быть, я ошибаюсь. Но он знал китайский язык, читал Роя Брэдбери и
        писал картины, а эти. Они другие. Они иные.
      </p>

      <p>Может быть, мне просто кажется.</p>

      <p>Но ощущение остаётся.</p>

      <p>И оно…</p>

      <p>не из приятных.</p>

      <p>След Данила пропал.</p>

      <p>Несколько раз, бывая в Одессе,</p>

      <p>я проходил мимо его окон.</p>

      <p>
        Они были тёмные. Пыльные. И давно не мытые. Та же самая решётка. С
        потеками от ржавой воды на подоконнике. Только теперь никто не
        выглядывал в ответ.
      </p>

      <p>Один наш общий знакомый пытался его найти.</p>

      <p>Через связи.</p>

      <p>Через базы.</p>

      <p>Сказал потом коротко:</p>

      <p>— В списках живых его нет.</p>

      <p>
        Нашёл человека с тем же именем, фамилией и датой рождения. В списках
        мёртвых.
      </p>

      <p>Хочется верить, что это не он.</p>

      <p>Но совпадений слишком много.</p>

      <p>Я иногда думаю о мыши.</p>

      <p>Сколько она прожила?</p>

      <p>
        Дождалась ли, когда её выпустят или отважилась сама на побег, когда в её
        верхней комнате перестал включаться по ночам свет?
      </p>

      <p>
        Или так и осталась в своём картонном дворце с башенкой и гербом МЫШ,
        старательно нарисованным на нем ее хозяином синей шариковой ручкой.
      </p>

      <p>У меня не осталось ни одной его фотографии.</p>

      <p>Ни одной.</p>

      <p>Странно. Человек был, а изображения нет.</p>

      <p>Иногда я пытаюсь восстановить его лицо по памяти.</p>

      <p>
        Сейчас это можно. Технологии уже позволяют. Но каждый раз получается
        кто-то другой.
      </p>

      <p>Не он.</p>

      <p>
        И тогда я вспоминаю, как мы стояли у его окна. Я снаружи. Он внутри.
      </p>

      <p>И думаю…</p>

      <p>а с какой стороны решётки на самом деле был каждый из нас.</p>
