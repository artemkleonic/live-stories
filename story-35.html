<h2>Пролог</h2>
<p>Я всегда с некоторым удивлением смотрел на огромные дома.</p>
<p>Нет, правда.</p>
<p>Не на большие и красивые. Не на величественные.</p>
<p>Красивое человек создавать умеет. Иногда даже талантливо.</p>
<p>Меня удивляли именно огромные.</p>
<p>Те, в которых по вечерам светится всего два окна.</p>
<p>Те, где коридоры длиннее казарм.</p>
<p>Те, где хозяева бывают несколько дней в году, а всё остальное время там живёт прислуга.</p>
<p>Наверное, в детстве каждый из нас мечтал о богатстве. И я тоже мечтал.</p>
<p>У меня был зеленый автобус и ярко-голубого цвета пластиковый пистолет, внешне похожий на пистолет Макарова под ленточные пистоны. Я не мог дождаться, когда меня заберут родители из садика, чтобы слиться с этими игрушками. Как же долго тогда тянулось время. Но как же я отчетливо это помню сегодня. С собой мне их брать не разрешали. Ограничения в пользовании усиливали радость встречи. Вы скажете, что взрослые это большие дети, просто их игрушки дороже? Конечно, я соглашусь. Но что, если чуть-чуть посмотреть на это с другой стороны? А есть ли тут предел? Есть ли та самая мера, когда хватит, когда довольно, достаточно? Что могло бы произойти со мной сейчас, будь у меня тогда парк из зеленых автобусов и оружейный магазин с сотней пластиковых пистолетов?</p>
<p>Бедный человек редко думает о философии. Он мечтает о тепле, еде и своей безопасности. А как думает тот, у которого базовые человеческие потребности давно закрыты?</p>
<p>Иногда происходит в голову странная мысль. У одних мечты заканчиваются после первой же пары теплых носков. А у других не заканчиваются никогда.</p>
<p>Я могу привести множество примеров, но думаю, что мой  дорогой читатель, наверняка сам хорошо их знает.</p>
<p>Они живут вокруг нас.</p>
<p>Кто-то бесконечно строит.</p>
<p>Кто-то бесконечно покупает.</p>
<p>Кто-то «коллекционирует» машины, часы, женщин, связи или квадратные метры так, словно пытается засыпать ими какую-то внутреннюю трещину.</p>
<p>Но всё же есть важное отличие.</p>
<p>Одно дело, когда деньги приходят к человеку постепенно.</p>
<p>Тяжело. С потом. С бессонными ночами. Когда он буквально выгрызает их у жизни зубами.</p>
<p>И совсем другое, когда богатство выстреливает в человека внезапно.</p>
<p>Как нефтяная скважина, которая однажды начинает бить из земли под огромным давлением. Как золотая антилопа из старого мультфильма, осыпающая монетами из-под копыт.</p>
<p>Как выигрышный лотерейный билет, случайно оказавшийся в руках того, кто ещё вчера доедал оставленные кем-то краешки пиццы и докуривал чужие сигареты.</p>
<p>И казалось бы, так вот же оно. Счастье. Привалило? Но удивительным образом  счастья обычно это не приносит.</p>
<p>Как яркий свет в пустом ангаре.</p>
<p>В темноте человек ещё может делать вид, что внутри него что-то есть.</p>
<p>Но когда пространство внезапно становится огромным и идеально освещённым, эхо начинает звучать там слишком отчётливо.</p>
<p>И вот тут начинается самое интересное. Бедный человек хотя бы понимает, чего ему не хватает.</p>
<p>А очень богатый вдруг однажды обнаруживает, что у него есть почти всё… кроме покоя и счастья.</p>
<p>Я сейчас не о том, что «богатые плохие», а «что происходит с человеком, когда исчезает необходимость»?</p>
<p>Аскетизм ведь родился не из бедности. Это очень важно.</p>
<p>Настоящий аскетизм, это не когда у тебя ничего нет. А когда ты можешь иметь всё… и сознательно выбираешь меньшее.</p>
<p>И дело даже не в деньгах. Деньги тут как реагент, который проявляет человека, как проявитель фотоплёнку.</p>
<p>Где проходит граница между достатком и внутренним распадом?</p>
<p>Человек тысячелетиями жил в нехватке. Огонь. Еда. Тёплая шкура.</p>
<p>Безопасность.</p>
<p>Потом дом. Потом автомобиль. Потом второй. Потом самолёт. Потом яхта. Потом замок, в котором он бывает раз в три года.</p>
<p>И вот тут уже происходит страшная вещь: предметы начинают жить вместо человека. Не он владеет домом. Дом овладеет им.</p>
<p>Он уже не может остановиться.</p>
<p>Потому что роскошь почти никогда не насыщает. Она только повышает порог нормальности.</p>
<p>Вчера ты радовался хорошим ботинкам. Сегодня тебе нужен Maybach. Завтра остров. Послезавтра влияние.</p>
<p>А потом вдруг оказывается, что ты не помнишь, когда в последний раз ел хлеб с голоду или пил воду, когда слиплись губы и при этом был счастлив.</p>
<p>А ведь нет ничего вкуснее воды, когда ты действительно хочешь пить.</p>
<p>Кусок хлеба и чистый воротничок. Тихий вечер. Рядом, тот кто тебя любит. Возможность спокойно спать.</p>
<p>Здоровые ноги. Отсутствие страха.</p>
<p>Если честно огромное количество людей с миллиардом гораздо беднее старика, который поливает помидоры у себя на даче.</p>
<p>У того старика хотя бы есть жизнь.</p>
<p>А у многих сверхбогатых уже есть только обслуживание собственного масштаба.</p>
<h2>МЫСЛИ ВСУХ</h2>
<p>Я видел людей, которым было всегда всего мало.</p>
<p>Даже когда у них уже всё есть.</p>
<p>Новые автомобили. Виллы в разных странах. Часы стоимостью как дом в Буковеле. Картины в подлинниках. Яхты. Коллекции вин, которые они даже не открывали.</p>
<p>И самое удивительное, почти никто из них не выглядел счастливым.</p>
<p>С возрастом я вообще начал замечать одну неприятную закономерность: чем больше вещей человек приобретает, тем тяжелее ему становится дышать. Причем в буквальном смысле. И дело даже не в одышке. В его ощущении, что за ним всегда кто то бежит.</p>
<p>У меня твердо сложилось убеждение, что после какой-то суммы, деньги перестают быть инструментом и начинают медленно менять своего хозяина изнутри. Не сразу, но очень аккуратно.</p>
<p>Сначала они убирают благодарность.</p>
<p>Потом простоту. Потом способность радоваться мелочам. А потом человек вдруг перестаёт понимать, сколько ему на самом деле нужно для счастья. Сто рублей, как говорил Остапу Бендеру Шура Балаганов, или все таки шесть тыщ четыреста? Или пол миллиона и прямо сейчас?</p>
<p>И вот это, наверное, самое страшное, что человек голодный ещё может насытиться. А тот, кто потерял предел достаточности, почти никогда.</p>
<p>А знаете, когда люди становятся алкоголиками? Нет, не тогда, когда впервые пробуют спиртное. И даже не тогда, когда начинают пить много и часто. Это происходит в тот момент, когда человек выпивает уже не для того, чтобы ему стало хорошо.</p>
<p>А для того, чтобы ему перестало быть плохо.</p>
<p>Это очень важная разница.</p>
<p>Потому что именно в этот момент удовольствие перестаёт быть удовольствием и превращается в костыль. С человеком вообще происходят странные вещи, когда он теряет способность вовремя сказать себе: «Хватит».</p>
<p>Я иногда думаю, что весь современный мир построен на человеческой неспособности остановиться.</p>
<p>На этом стоят казино. Кредиты. Реклама. Бесконечные распродажи.</p>
<p>Даже социальные сети работают почти по тем же принципам, что игровые автоматы.</p>
<p>Ну-ка. Попробуй ещё. Обнови страницу, листай ленту ниже  Потяни ручку. Сделай ставку. Ну ещё раз.</p>
<p>Сейчас точно получится. И человек пробует. Сначала осторожно. Потом смелее. Потом начинает верить, что удача наконец-то уж точно выбрала именно его. Он выигрывает раз. Другой. Иногда даже третий. И именно в этот момент казино понимает: клиент готов.</p>
<p>Потому что самый опасный человек для казино не сорвавший куш.</p>
<p>Самый опасный тот, кто умеет вовремя встать и уйти. Но таких почти нет. Ему всегда кажется, что следующий шаг всё исправит. Следующая ставка вернёт потерянное. Следующая покупка сделает его счастливее. Следующая женщина окажется той самой. Следующий миллион принесёт покой, а миллиард закроет рот правосудию.</p>
<p>Но проблема в том, что человеческие желания почти никогда не заканчиваются сами. У них вообще нет тормозной системы. И если человек однажды не построит её внутри себя сам, то рано или поздно жизнь начнёт строить её снаружи.</p>
<p>Это неопровержимый факт. И знаете как? Болезнями. Одиночеством. Потерями. Страхом. Пустотой.</p>
<p>Потому что природа вообще очень не любит избыточность. Она всегда рано или поздно выставляет за неё счёт.</p>
<h2>ЮЛЬКА.</h2>
<p>Есть у меня одна хорошая старая знакомая, о которой я бы хотел немного рассказать подробней.</p>
<p>Она альпинист.</p>
<p>Не знаю, покоряла ли она когда-нибудь настоящие горные вершины, но то, что она как кот карабкается по отвесным стенам современных небоскрёбов, это уж точно. Раньше она утепляла стены квартир на любой высоте, а сейчас моет окна и обесшумливает металлические козырьки, чтобы дождь не барабанил по ним ночами и не мешал людям спать. В молодости она сорвалась с верёвок.</p>
<p>Упала спиной вниз и раздробила свой позвоночник да так, что саморезов у врачей ушло с небольшое ведро, чтобы все это потом собрать и обратно поставить её на ноги. Вытаскивать их назад она не стала. Так и живёт с ними до сих пор. И каждый раз пищит на рамках в аэропортах, вызывая одинаковое удивление у таможни любой страны мира.</p>
<p>Я люблю с ней болтать.</p>
<p>На мой взгляд, у нее свое, но очень правильное отношение к жизни.</p>
<p>Говорили мы с ней совсем недавно. Она залезла в свой старый компьютер и начала вручную править сайт, который написала сама еще в 2004 году. Про промышленный альпинизм. Современные технологии давно ушли вперёд. Языки программирования поменялись настолько сильно, что сегодня сайты делают уже совершенно иначе. Но она по старинке продолжает сама ковыряться в коде.</p>
<p>И делает это потому, что не хочет никому передать ту историю, тот опыт и ту логику, которые она вложила туда за многие годы.</p>
<p>Она сама подбирает ключевые слова.</p>
<p>Сама настраивает страницы.</p>
<p>Сама решает, как всё должно выглядеть и работать. И даже если, как она говорит, что запросов будет мало, ей этого точно хватит.</p>
<p>Ей достаточно. Достаточно для того, чтобы каждый день спокойно есть свой любимый тирамису и запивать его дорогим крафтовым пивом.</p>
<p>А большего ей не нужно. Она вообще часто произносит это слово:</p>
<p>«достаточно».</p>
<p>Иногда, говорит, что даже тушит сайт. Выключает его. Просто потому, что не хочет, чтобы её лишний раз дёргали клиенты. За столько лет люди и так передают информацию о ней из уст в уста. Без всякой рекламы. Без маркетологов. Без бесконечной гонки за масштабом и доходом.</p>
<p>А работа у неё, если задуматься, вообще сводится к очень простой вещи. Нужно просто помыть окно. Да, окон у нас сегодня в Украине вылетает куда больше, чем в мирное время, но и конкуренция на их обслуживание сильно упала. Не без этого. А делов то? Нужно открыть окно, высунуться чуть дальше обычного и протереть стекло тряпкой. И не оставить при этом разводов. Вуаля.</p>
<p>Но многие люди высоты боятся.</p>
<p>А она нет.</p>
<p>И вот тут начинается интересное. Она никогда не пыталась перемыть все окна в мире. Да что там в мире, в городе, на районе, и даже в том доме, где она живет.</p>
<p>Не пытается войди в ТОП по поисковикам.</p>
<p>Не пытается заработать все деньги.</p>
<p>«Зачем?» — спрашивает она.</p>
<p>И действительно.</p>
<p>Зачем?</p>
<p>«Мне достаточно», — говорит она.</p>
<p>«Мне не нужно больше крафтового пива. Я же не верблюд, чтобы заливать его в себя литрами. Консервировать его на старость я тоже не собираюсь».</p>
<p>И в этой простой фразе почему-то оказалось гораздо больше здравого смысла, чем во многих бизнес-книгах.</p>
<p>Она купила квартиру на последнем этаже самого высокого дома в своем городе. Причина покупки: дешево и не нужно платить за аренду съемного жилья. За те деньги, что она за нее заплатила в некоторых районах и паркоместо не купишь. Но многие бы там жить не смогли.</p>
<p>Это постоянное ощущение высоты.</p>
<p>Ночное дрон-шоу. И огромное небо за панорамными окнами.</p>
<p>Вид, от которого у некоторых людей такой, что начинает дрожать вся их нервная система.</p>
<p>А ей нравится.</p>
<p>Она сделала там ремонт сама, потому что умеет это делать.</p>
<p>Немного где-то сэкономила. Получилось.</p>
<p>Под домом у неё магазин, где есть всё необходимое. Рядом автобусная остановка. Новая почта.</p>
<p>А если проехать минут тридцать, то кончится цивилизация и начнется природа. Та самая, где сотка земли вырастает в цене втрое если ее просто обнести забором. Она достает  из рюкзака карманную байдарку, собирает её и уходит на два дня сплава по Десне. Смотреть на берега, ловить рыбу ровно столько, чтобы поесть, и спит в палатке, слушая ночью воду.</p>
<p>И она счастлива. По-настоящему счастлива.</p>
<p>А еще она профи в монетах. Разбирается в них лучше, любого нумизмата. Она систематизировала огромный объём данных, выстроила связи с клиентами и теперь продаёт им монеты со всего мира за небольшую комиссию.</p>
<p>Всегда найдется среди коллекционеров чудак, который собирает монеты с рыбками. Кто-то с кораблями, а кто-то с птицами. А она умеет их находить.</p>
<p>Это приносит ей дополнительный доход. Не баснословный.</p>
<p>Но достаточный для того, чтобы помогать пожилым родителям, немного откладывать, путешествовать и донатить на ЗСУ.</p>
<p>И при этом она не выглядит человеком, который проигрывает собственную жизнь в бесконечной гонке за ещё одним нулём на банковском счету.</p>
<p>Недавно она сказала, что собирается приехать к нам в гости не на маршрутке, а на байдарке. По каналу. Оттуда до нас пешком минут десять.</p>
<p>А потом, как бы вдогонку, спросила:</p>
<p>— У вас там будет место, где мне бросить матрас? Потому что приплыву я уже поздно.</p>
<p>Я засмеялся и сказал:</p>
<p>— Конечно будет. Это же дом.</p>
<p>Она пожала плечами:</p>
<p>— Ну, дом не обязательно. У меня палатка есть. А если клёв там на канале будет хороший, то я вообще останусь ночевать у берега.</p>
<p>Кто-то скажет - безумие.</p>
<p>А мне кажется, что это и есть свобода. Настоящая. Та, которую не купишь ни дворцами, ни яхтами, ни коллекциями часов.</p>
<p>Каждую зиму она уезжает в Индонезию и Малайзию. Пока она не рассказала, я даже путался в этих странах. Там зимы нет.</p>
<p>Там океан, вулканы, тёплый ветер, пустые пляжи и люди, которые всегда улыбаются. Она говорит, что там мир ещё не успел окончательно сойти с ума. Она говорит, что в этих местах стоит побывать каждому человеку хотя бы раз в жизни, что бы увидеть и понять жизнь. И каждый год она возвращается туда снова и снова.</p>
<p>Потому что поняла одну очень важную вещь. Для счастья человеку нужно гораздо меньше, чем ему постоянно пытаются продать.</p>
<p>Но есть у меня другая, совсем другая история.</p>
<p>Человек, у которого было всё.</p>
<p>Нет, не в красивом философском смысле. А буквально всё, о чём большинство людей только мечтает.</p>
<p>Огромный дом. Десяток машин, несколько бизнесов.</p>
<p>Деньги. Связи. Влияние. Возможность купить все, что приходит ему в голову.</p>
<p>И самое страшное заключалось в том, что этого всего ему катастрофически не хватало.</p>
<p>Я иногда смотрел на него и ловил себя на странной мысли:</p>
<p>он живёт так, словно внутри него сидит огромная черная дыра, которую он пытается заткнуть деньгами, покупками, азартом.</p>
<p>Но дыра не закрывается.</p>
<p>Наоборот. Чем больше он туда бросает, тем шире она становится.</p>
<p>Есть люди, которые умеют пользоваться деньгами. Ведь деньги, это как краска. Взял валик и прокатал её по стене. А можно в краску макнуть руки или гениталии и размазать или её по холсту. У Прикассо это получилось. А у остальных? Но исключения лишь подтверждают правила.</p>
<p>А есть люди, которыми уже сами деньги начинают пользоваться. И вот это очень страшная история.</p>
<h2>ТРИ ВОЛОСИНЫ В БОРЩЕ ЭТО МНОГО, А ТРИ НА ГОЛОВЕ МАЛО.</h2>
<p>Когда я демобилизовался из армии, жизнь как-то очень быстро закрутилась в новом направлении. Практически сразу я устроился медицинским директором в одну серьёзную клинику пластической хирургии. По тем временам это был совершенно другой мир. Мир людей, которым природа, возраст или зеркало вдруг начинали казаться личным оскорблением.</p>
<p>Однажды мы с моим шефом поехали в Одессу.</p>
<p>Он был не только хозяином этой клиники. Он был её мозгом, идеологом, человеком, который умел продавать людям их новое лица и надежду на новую версию самих себя. Причём продавать очень талантливо.</p>
<p>Ехали мы к одному его клиенту.</p>
<p>Как потом оказалось, человеку богатому, которому катастрофически всего не хватало.</p>
<p>Особенно ему не хватало волос на голове. Он почему-то был абсолютно убеждён, что лысина делает мужчину неполноценным. Что без густой шевелюры жизнь словно недоиграна до конца. И вот ради этой его борьбы, мы и приехали к нему домой. Пересадка волос была одной из фондообразующий статей нашего бизнеса.</p>
<p>Словом «дом» это место назвать было сложно.</p>
<p>Это был какой-то гигантский ангар.</p>
<p>Огромное сооружение таких размеров, что внутри можно было разместить парковку для частных вертолётов. И при этом, во всём этом пространстве почти не было жизни.</p>
<p>Я очень хорошо помню его гостиную.</p>
<p>Посреди огромного зала стоял телевизор размером с футбольные ворота. По тем временам он стоил не как крыло от самолета, а как весь самолет целиком, Рядом стоял диван и массивный деревянный стол. Он был такой большой, что на нем можно было сыграть Уимблдонский турнир. На столе лежали помидоры и маслины. И все!</p>
<p>Причём маслины были такого размера, что я впервые их тогда спутал со сливой. У меня есть наблюдение, которое вам может быть интересным. Как определить в дороге, где остановиться и перекусить? По красному справочнику Michelin Guide? А вот и нет обращайте внимание, где скопление фур. У водителей - дальнобойщиков желудки нежные. Они не едят где попало. А там, где их много, там и вкусно и не дорого. Конечно, если вы хотите там есть, а не что-то другое. Лично я люблю борщ, и всегда в новом месте начинаю именно с него. И после этого делаю выводы, и как правило, они меня не подводят.</p>
<p>Как же нам тогда хотелось с дороги борща.</p>
<p>А на столе только оливки с грецкий орех. И  пустота.</p>
<p>Такая дорогая, гулкая и идеально вылизанная пустота. И людей нет.</p>
<p>Туалет там был размером с гараж на две машины. Огромное помещение с серой плиткой, где стоял одинокий унитаз и рукомойник размером с ванну. И всё.</p>
<p>Смотришь на это и думаешь -</p>
<p>тронный зал. Только трон в нём как раз того самого достаточного размера, чтобы не опрокинуться  в него спиной, как это обычно делают аквалангисты, сидящие на бортах лодки. Задницы то примерно у всех одинаковые.</p>
<p>А вот справлять нужду там было как-то неловко, потому что эхо разносило любой звук по помещению с каким-то почти театральным тройным эхом.</p>
<p>Во дворе стояли машины.</p>
<p>Много машин. Его машин.</p>
<p>Ferrari. Maybach. Bentley.</p>
<p>Rolls-Royce. Причём, кажется, не один. И все они одного класса.</p>
<p>И все они были похожи друг на друга, как дорогие игрушки очень богатого ребёнка. И это уже не коллекция. Это всего лишь машины для перевозки ровного того, что так удачно помещается в трон. Все с клиренсом чуть выше лезвия ножа, будто их создавали исключительно для идеально асфальта, которого в нашей стране тогда практически не существовало.</p>
<p>Я ещё могу понять одну хорошую машину. Ну две. Допустим, седан для города. Внедорожник для охоты.</p>
<p>Может быть, микроавтобус для семьи и друзей.</p>
<p>Но когда человек начинает собирать  автомобили, как другие собирают монеты с рыбками, у меня всегда возникает один и тот же вопрос: а зачем? Показывать их друзьям, скажете вы? Так кляссер компактней, а фотоальбом с событиями из жизни ярче. А есть ли вообще друзья?</p>
<p>Где заканчивается необходимость и начинается болезнь? А ведь нам с дороги так хотелось борща, кусок докторской, или пирожков с капустой. Чебурек, жирный и вредный, шашлык и торт с чаем, а не помидоры  и маслинами размером с кулак.</p>
<p>Пока наш клиент рассказывал о своих возможностях, о домах, о своих машинах, на которых он почти не ездит, о ночных клубах Одессы, которых у него с избытком, мой Chief с азартом вошел в раж и начинал рассказывать ему о своих достижениях, но уже в медицинской сфере. Каждая волосинка имела свою цену и, о Боже, как же он огорчился, узнав о том, что их возьмут не от доноров, а с его собственного затылка. Денег у него хватило бы, что бы обрить пол Одессы.</p>
<p>И знаете, что было самым удивительным?</p>
<p>Они оба не выглядели счастливыми.</p>
<p>Вообще.</p>
<p>Один отчаянно пытался вернуть волосы, словно вместе с ними он вернёт молодость, уверенность и право нравиться женщинам.</p>
<p>Другой с азартом рассказывал о собственных успехах там, где его не слушали, и так, будто сам постоянно нуждался в подтверждении своей значимости.</p>
<p>А вокруг стояла эта гигантская, дорогая и идеально отполированная пустота.</p>
<p>И тогда у меня в голове впервые очень чётко прозвучал вопрос:</p>
<p>а где вообще находится этот самый предел достаточности?</p>
<p>Потому что если у человека есть дом размером с терминал аэропорта, машины, дороже одесского художественного музея со всем его содержимым и возможность купить всё, что он захочет… но при этом он всё ещё страдает из-за отсутствия волос на макушке, значит проблема явно не в волосах. Та сбрей ты их совсем. И на сэкономленные от операции деньги купи самовар и палку докторской колбасы. И задалась мне эта докторская. Видимо, голодные мы тогда были сильно. Запомнилось ведь.</p>
<p>А если честно, то мне всегда казалось, что лысина мужчину вообще не портит.</p>
<p>Иногда даже наоборот.</p>
<p>Особенно если у него внутри есть что-то гораздо более редкое, чем волосы. Тот самый предел достаточности.</p>
<h2>Эпилог</h2>
<p>В какой то момент жизни я пришел к выводу, что деньги, добытые тяжёлым трудом, обычно имеют вес.</p>
<p>Человек помнит их цену. Помнит бессонные ночи. Провалы. Страх. Холод.</p>
<p>А лёгкие сверхденьги действительно часто ломают психику. Потому что человек эволюционно не приспособлен к безграничному ресурсу. Мы вообще плохо умеем жить без ограничений. Именно ограничения делают человека человеком.</p>
<p>Голод научил нас готовить.</p>
<p>Холод строить жилье.</p>
<p>Смерть ценить время.</p>
<p>Нехватка научила думать.</p>
<p>Предел дал шанс развиваться.</p>
<p>А когда предела нет, часть людей начинает разлагаться. Не все. Но многие.</p>
<p>В какой-то момент жизни я задал себе один очень странный вопрос.</p>
<p>А что делал бы я, если бы у меня было действительно огромное количество денег? Нет, даже не огромное.</p>
<p>Неприлично огромное. Столько, что человеческое сознание уже перестаёт нормально воспринимать эти цифры. Миллионы. Миллиарды. Триллионы?</p>
<p>А дальше что?</p>
<p>Куда девать всё остальное?</p>
<p>Покупать двадцатую машину?</p>
<p>Пятидесятый костюм?</p>
<p>Ещё один дом, в котором ты никогда не будешь жить?</p>
<p>Раздать бедным? Красиво звучит.</p>
<p>Очень красиво. Но жизнь почему-то устроена сложнее. Потому что человек, которому просто дали деньги, далеко не всегда меняет свою жизнь к лучшему. Иногда наоборот. Деньги и жизнь заканчиваются быстрее, чем приходит понимание, как ими распоряжаться.</p>
<p>Благотворительность тоже бывает разной. Иногда она действительно спасает. Иногда просто создаёт зависимость. Иногда помогает человеку подняться. А иногда превращается в бесконечную кормушку, из которой годами едят те, кто уже давно перестал пытаться что-то изменить.</p>
<p>И вот однажды мне показалось, что я нашёл ответ.</p>
<p>Я бы строил университеты.</p>
<p>Не дворцы. Не памятники самому себе. Я бы пытался делать людей умнее. Давал бы возможность учиться там, где и правда учат, и тем, кто по праву хочет получать знания. Нанимал бы лучших преподавателей. Создавал бы места, где человек может вырасти выше самого себя. Образование это единственная инвестиция, которая может пережить самого инвестора.</p>
<p>И какое-то время эта мысль казалась мне почти идеальной.</p>
<p>А потом я задумался ещё глубже.</p>
<p>И понял одну неприятную вещь.</p>
<p>Знания сами по себе не делают человека хорошим.</p>
<p>Один человек, получив образование и выучив химию, создаст лекарство.</p>
<p>Другой - газ.</p>
<p>Один инженер построит мост.</p>
<p>Другой построит лагерь. И там и там сопромат. Одного научат спасать. Другого подчинять.</p>
<p>А все потому что ум и мудрость, это совершенно разные вещи.</p>
<p>И, возможно, главная проблема человечества даже не в том, что люди тупеют, а в том, что мы так и не научились передавать мудрость.</p>
<p>Настоящую.</p>
<p>Ту, которая помогает человеку понимать меру. Отличать достаточность от жадности.</p>
<p>Силу от жестокости.</p>
<p>Свободу от вседозволенности.</p>
<p>Да, наверное, кто-то всё-таки умеет это делать. Родители. Редкие учителя.</p>
<p>Монахи отшельники в Тибете?</p>
<p>Но всё это происходит как-то случайно. Эмпирически и без гарантий.</p>
<p>И всё же, мне кажется, человечество обязано хотя бы попытаться.</p>
<p>Потому что умный человек способен изменить мир.</p>
<p>А мудрый, возможно, способен не дать ему окончательно сойти с ума.</p>
