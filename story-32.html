<p>Архивариусы тихих судеб.</p>
<p>НАЧАЛО</p>
<p>— Ты заметил?</p>
<p>сказал Первый, лениво переворачивая страницу своего огромного журнала.</p>
<p>Страница была пустой, но он всё равно читал её с видом человека, который видит там судьбы, формулы и важнейшие отчёты.</p>
<p>— Что опять?</p>
<p>вздохнул Второй, заранее зная, что новый повод для философии и разговора уже подкрался.</p>
<p>У Первого такие поводы случались каждое утро в самом начале рабочего дня.</p>
<p>— Души. Они стали приходить чаще и какие-то… ну… взъерошенные чтоли. Как будто их кто-то прокрутил в барабане стиральной машины. Три цикла. Режим “интенсив”.</p>
<p>Второй хмыкнул.</p>
<p>— Ты просто стареешь. Раньше они тебе такими не казались.</p>
<p>— Раньше, я сам был таким, — вздохнул Первый.</p>
<p>— Помнишь, как меня сюда перевели? Я думал, что это повышение. А что оказалось</p>
<p>— бессрочная практика.</p>
<p>— Не ной. Мы оба там были, кивнул Второй.</p>
<p>— В этой земной барокамере. Не было бы ее, разорвало бы тебя при переходах между мирами. Все мы там были и все через нее прошли. Я вот вообще подорвался на мине еще во Вьетнаме. Кому-то дали инструменты, кому-то опыт…</p>
<p>— А кому-то шишки на лбу, — перебил Первый.</p>
<p>— Тебе, например. И вот это твое чувство юмора. Ну хоть что-то полезное тебе оставили.</p>
<p>— Да, а вот полезных навыков</p>
<p>— ни одного,</p>
<p>— мрачно подтвердил Первый.</p>
<p>Они сидели за длинным столом, который терялся где-то в тумане.</p>
<p>На столе лежали протоколы, светящиеся точки, папки, которые листали сами себя, и карты человеческих судеб.</p>
<p>Каждая была со своим цветом, своей вибрацией, своим уникальным отпечатком.</p>
<p>— Ладно, работаем,</p>
<p>— сказал Второй, взмахнув рукой.</p>
<p>Перед ними вспыхнул новый сгусток света</p>
<p>— тёплый, золотистый, слегка дрожащий.</p>
<p>— Принимаем, — отметил Первый. И он тут же рассыпался на множество светящихся огоньков.</p>
<p>— О, новичок,</p>
<p>— улыбнулся он.</p>
<p>— Только что из глубины. Смотри, какая чистая структура.</p>
<p>Второй приблизил лицо к сияющему ядру.</p>
<p>— Потенциал хороший. Но характер… хм… Ставь две подсказки заранее. И одного наставника.</p>
<p>Первый пролистал невидимый журнал.</p>
<p>— Одного мало. Ему бы пару. У него путь сложный, но красивый. Если не испугается</p>
<p>— поднимется высоко. Если испугается</p>
<p>— будет ходить кругами и жаловаться, что его жизнь обидела.</p>
<p>— Как ты?</p>
<p>— подколол Второй.</p>
<p>— Да,</p>
<p>— спокойно согласился Первый.</p>
<p>— Как я.</p>
<p>Они замолчали, наблюдая, как новое сознание медленно принимает форму будущей судьбы: испытания, встречи, уроки.</p>
<p>— Ты тогда там,</p>
<p>боялся жить?</p>
<p>— вдруг спросил Первый.</p>
<p>— Я тогда всего боялся,</p>
<p>— честно признался Второй.</p>
<p>— Но главное</p>
<p>— я думал, что один. Вот это и ломает.</p>
<p>— А сейчас?</p>
<p>— Сейчас я понимаю, что нам влетит от Шефа, если мы свежую партию не подготовим,</p>
<p>— буркнул Второй.</p>
<p>— Их всё больше. Может, пора заканчивать с той дурной войной? Чья вообще была идея затевать её именно сейчас? Третье тысячелетие на Земле.</p>
<p>Он поднял палец вверх.</p>
<p>— Вопросы?</p>
<p>— туда.</p>
<p>Ответы</p>
<p>— там же. Ты всё сам знаешь. Но поговорить хотелось, ага? Ладно, работаем. Просто возвращаются они пачками. А я в отпуск хочу.</p>
<p>Первый аккуратно принимал светящиеся точки, шепча:</p>
<p>— Тихо-тихо… спокойно…</p>
<p>— А всё-таки хорошо придумали, — Второй задумался.</p>
<p>— Сколько их там сейчас? Больше восьми миллиардов?</p>
<p>— Больше,</p>
<p>— кивнул Первый.</p>
<p>— И ведь они там не один. Еще наставники и Мы ведь рядом. Просто тихо. Не вмешиваемся напрямую.</p>
<p>— И они думают, что мы не существуем.</p>
<p>— Ну…</p>
<p>— Второй погладил новую душу по краю света, словно младенца.</p>
<p>— Пусть думают. Иногда незнание помогает. Иногда мешает. Поэтому мы и шлём им подсказки.</p>
<p>— Подсказки, которые они принимают за случайности…</p>
<p>— вздохнул Первый.</p>
<p>— Или за знаки,</p>
<p>— поправил Второй.</p>
<p>— Или за сбой матрицы,</p>
<p>— усмехнулся Первый.</p>
<p>Второй улыбнулся.</p>
<p>— Главное, чтобы не боялись жить. Это единственное, что тормозит их путь. Если не боятся — проходят уровень быстрее. Если боятся</p>
<p>— застревают. А некоторые</p>
<p>— живут и живут там.</p>
<p>Он говорил это так спокойно и уверенно, как шеф-повар, который замешивает дрожжевое тесто перед тем, как начинить его мясом и медленно обжарить в кипящем масле до готовности.</p>
<p>Первый снова взглянул на светящуюся каплю судьбы.</p>
<p>— Этому бы объяснить, что он не один…</p>
<p>— Объясним. Но позже. В нужный момент.</p>
<p>Через людей. Через события. Через потери. Через встречи.</p>
<p>— А если не поймёт?</p>
<p>— Получит повторение курса. Ты же получал?</p>
<p>— Я</p>
<p>— пять раз.</p>
<p>— Ну вот.</p>
<p>Они засмеялись тепло, по-доброму, как смеются те, кто прошёл трудное и теперь смотрит на всё чуть сверху.</p>
<p>— Надеюсь, этот услышит. У него миссия хорошая. Путь длинный.</p>
<p>— Ну…</p>
<p>— протянул Второй.</p>
<p>— Тогда ему точно понадобится герой, который однажды объяснит ему, что жить не страшно.</p>
<p>— Герой?</p>
<p>— Да. Есть тут у меня один на примете. Я его курирую уже лет 20, наверно. Очень наблюдательный. С хорошей памятью и правильными выводами. Работа у него, правда, мерзкая, но он скоро появится в истории. Лаврентий.</p>
<p>Первый улыбнулся.</p>
<p>— Отправляем?</p>
<p>— спросил Первый.</p>
<p>— Отправляем.</p>
<p>— в какой год?</p>
<p>Журнал сам перелистывал страницы, как это было в старых справочных автоматах при железнодорожных станциях.</p>
<p>— в семьдесят четвертый.</p>
<p>— да нет, не готов он пока туда. 2074</p>
<p>— я за прошлый век. 1974.</p>
<p>— А! Семен Семеныч! Так бы и сказал.</p>
<p>Второй слегка коснулся светящейся точки.</p>
<p>Она вспыхнула, вытянулась в тонкую нить и исчезла вниз, в тело, в жизнь, в барокамеру, в шатл очистки душ.</p>
<p>— Удачи тебе там, малыш,</p>
<p>— мягко сказал Второй.</p>
<p>— Не бойся жить.</p>
<p>Первый закрыл свой журнал и посмотрел туда, где исчез свет.</p>
<p>— Тогда продолжаем наблюдать.</p>
<p>РОЖДЕНИЕ.</p>
<p>Родзал кафедры одесского мединститута был яркий, шумный, пахло стерильностью, кварцевым светом, волнениями и легкой паникой. Молодая акушерка в седьмой раз проверяла пульс роженицы, а врач нервно поправлял маску и не из-за безопасности, а просто чтобы скрыть собственное волнение.</p>
<p>Для людей это большой день.</p>
<p>Для Архивариусов это день рабочий.</p>
<p>Первый и Второй стояли в углу где линолеум плавно поднимался на кафель стен и, конечно, были невидимы. Но присутствовали отчетливо, так что любые аппараты, казалось, чуть вибрировали от их энергетики.</p>
<p>— Ну что,</p>
<p>— тихо сказал Первый, протирая невидимые очки.</p>
<p>— Наш новичок почти готов к посадке.</p>
<p>Он постучал пальцем по прозрачной сфере, парящей рядом с ними. Сфера светилась тем самым теплым, золотистым светом, что они видели в распределительном зале.</p>
<p>— Хорошую семью выбрал,</p>
<p>— хмыкнул Второй.</p>
<p>— Эти двое, конечно, ещё те артисты будут… но терпеливые. И упрямые. Под такие миссии как он себе выбрал в самый раз.</p>
<p>— Ага. Особенно мама. Упрямая, как две горные козы,</p>
<p>— согласился Первый.</p>
<p>— Но зато любить будет ярко. Это важно.</p>
<p>А папа тоже ничего. Физически развит.</p>
<p>Сфера словно дрогнула в ответ, как ребёнок перед долгой дорогой.</p>
<p>— Нервничает,</p>
<p>— заметил Второй.</p>
<p>— Ему страшно. Каждый раз этот момент, как прыжок в холодную воду. Память стирается, подсказки закрываются, и вперёд, в барокамеру с названием планета Земля. Крохотный испытательный лагерь для человеческих душ. Почти как пионерский, только посерьезней. С невидимыми покровителями и наставниками.</p>
<p>— Зато тело хорошее дали,</p>
<p>— сказал Первый, заглядывая в карту судьбы.</p>
<p>— Генетический набор, как свежий ремонт: и стены ровные, и проводка целая.</p>
<p>В родзале поднялась суета. Врач резко скомандовал:</p>
<p>— Тужимся! Дышим! Поехали!</p>
<p>Архивариусы переглянулись.</p>
<p>— Пора,</p>
<p>— сказал Второй.</p>
<p>Он поднял руку. Сфера плавно поднялась выше, начала светлеть, рассеиваться, как солнечный пар. Потом:</p>
<p>— резкий, мягкий толчок, и золотой свет тонкой нитью рванул вниз, в маленькое тело, которое только-только делало первый вдох.</p>
<p>Мир взорвался криком.</p>
<p>Люди услышали ребёнка.</p>
<p>Архивариусы душу.</p>
<p>— Приземление прошло успешно, — отметил Первый, будто проверяя технический чек-лист.</p>
<p>— Так… память обнулилась. Наставники на месте?</p>
<p>Рядом появились два новых существа</p>
<p>— лёгкие, как утренний воздух. Они были похожи на силуэты, способные принимать любую форму, какую бы ребенку потом ни потребовалось увидеть во сне или услышать в интуиции.</p>
<p>— Первый наставник для силы,</p>
<p>— сказал Второй, глядя на более яркий силуэт.</p>
<p>— Чтобы подталкивать, когда будет бояться, и защищать, когда начнёт творить глупости.</p>
<p>— Второй</p>
<p>— для мудрости,</p>
<p>— добавил Первый.</p>
<p>— Чтобы направлять и подсказывать. Не говорить что делать, а шептать так, чтобы он сам догадывался.</p>
<p>—Может все же Третьего? Для любви?</p>
<p>— Повременим.</p>
<p>Нет у него этого в тех задании. Как раз определиться ему самому надо. Значит оставляем этих двух.</p>
<p>Оба наставника склонились над крошечным, ещё красным от усилий существом, которое громко требовало обратно привычного, теплого космоса.</p>
<p>— Ну что, ребята,</p>
<p>— сказал Второй наставникам.</p>
<p>— В добрый путь. Работы впереди много. Порой он будет вас слышать. Порой игнорировать. Иногда ругаться на вас, хотя и не понимает, почему настроение упало. Это нормальная практика.</p>
<p>— А если сильно заупрямится? — спросил Первый.</p>
<p>— Тогда будем вмешиваться мы через обстоятельства, пожал плечами Второй.</p>
<p>— Кто-то же должен подбрасывать совпадения и «неожиданные встречи».</p>
<p>Он посмотрел на малыша.</p>
<p>Тот уже не кричал. Он внимательно смотрел в пустой угол родзала, именно туда, где стояли они.</p>
<p>— Видел?</p>
<p>— удивился Первый.</p>
<p>— Он нас почувствовал!</p>
<p>— На секунду.</p>
<p>— Второй мягко улыбнулся.</p>
<p>— Потом забудет. Так и задумано.</p>
<p>Доктор взял ребёнка, поднес к матери.</p>
<p>— Гляди какой красавец! Богатырь. Та, уставшая, заплаканная, но светящаяся изнутри, прижала его к груди.</p>
<p>— Вот оно,</p>
<p>— сказал Второй тихо.</p>
<p>— Первое чувство в новом мире. Любовь. Которая ничего не объяснит, но всё исправит.</p>
<p>Первый нахмурился:</p>
<p>— Слушай… как думаешь… он справится?</p>
<p>— Все справляются,</p>
<p>— ответил Второй.</p>
<p>— Просто не все с первого раза.</p>
<p>Они ещё немного постояли, наблюдая, как человеческая жизнь начинает свой долгий путь из ничего в что-то.</p>
<p>— Ну что,</p>
<p>— протянул Первый.</p>
<p>— Наставники закреплены. Душа вселена. Память стерта. Родители эмоционально раздавлены, но счастливы.</p>
<p>Пора, наверное…</p>
<p>— В отпуск?</p>
<p>— подсказал Второй.</p>
<p>Первый облегчённо вздохнул:</p>
<p>— Да! Хочу в отпуск. Хотя бы на неделю.</p>
<p>Второй хлопнул его по плечу:</p>
<p>— Сейчас доведём этого малого до первого сна и всё. Уходим. Пусть дальше они работают.</p>
<p>Наставники стали таять, сливаясь с воздухом над младенцем.</p>
<p>Архивариусы тихо направились к выходу, растворяясь в свете родильной лампы.</p>
<p>— Пусть растёт,</p>
<p>— сказал Второй.</p>
<p>— И пусть не боится жить.</p>
<p>— Если что</p>
<p>— мы рядом,</p>
<p>— нахмурился Первый, уже мечтая о гамаке где-то между вселенными.</p>
<p>И они исчезли.</p>
<p>А человек тот самый, что выбрал эту семью, эту жизнь, эту миссию впервые спокойно заснул на груди матери.</p>
<p>И путь начался.</p>
<p>ПЕРЕХОД.</p>
<p>Пока в одном родзале малыш делал свой первый вдох, по коридору, всего в нескольких шагах, развернулась другая история.</p>
<p>Громкие голоса, быстрые шаги, вспышки ламп. Для людей это чрезвычайная ситуация. Для Архивариусов знакомый, отточенный процесс.</p>
<p>Первый остановился у двери соседней комнаты.</p>
<p>Второй тоже замер, будто прислушиваясь не ушами, а чем-то глубже.</p>
<p>— Он?</p>
<p>— спросил Первый тихо.</p>
<p>— Он,</p>
<p>— кивнул Второй.</p>
<p>— Уже знал, что уйдёт быстро. У него программа короткая, но важная. Он был зрелым, слишком зрелым. Память стереть полностью с первого раза так и не смогли. Решили усилить.</p>
<p>— Да,</p>
<p>— подтвердил Первый.</p>
<p>— Там такие муки совести накопились за прошлые годы… пришлось дважды проводить его через рождение, чтобы хоть чуть-чуть сбросить старые пласты. Но всё равно… он помнил слишком много.</p>
<p>В родзале началась суета. Резкая, напряжённая. Молодая врач кричала:</p>
<p>— Давление падает! Быстрее! Капельницу!</p>
<p>Медсестры метались, как встревоженный рой пчёл. Снаружи всё выглядело трагедией.</p>
<p>Архивариусы же стояли спокойно.</p>
<p>— Это не трагедия,</p>
<p>— сказал Второй.</p>
<p>— Это завершение. Он пришёл не жить, а освободиться.</p>
<p>Внутри комнаты акушерка дрожащими руками держала голубоватого малыша, который сделал лишь слабый вдох и будто устал.</p>
<p>— Пытаются вернуть,</p>
<p>— заметил Первый.</p>
<p>— Они всегда пытаются. Правильно делают. Это часть их работы, но и конечно урока.</p>
<p>— А он не вернётся,</p>
<p>— мягко сказал Второй.</p>
<p>— Он свою задачу выполнил ещё до рождения. Ему нужно только пройти формальность - выход. Чтобы петля закрылась.</p>
<p>Малыш тихо, почти благодарно, отпустил мир.</p>
<p>Так же незаметно, как вошёл.</p>
<p>Датчики непрерывно пищали. Люди плакали. Дрожащей рукой акушерка сделала запись в журнале. 9.52 остановка сердца, 10.06 остановка реанимационных действий. Констатирована смерть мозга.</p>
<p>И только в Энергетическом слое стало светло.</p>
<p>Лёгкая капля сознания поднялась, свободная, чистая, словно долгожданный вздох после долгого затяжного нырка.</p>
<p>Первый протянул руки и светлая капля мягко опустилась в его ладони.</p>
<p>— Всё,</p>
<p>— сказал Первый.</p>
<p>— Он вышел из барокамеры. И окончательно очистился. Теперь ему дадут широкий выбор. И, наконец, отпуск. Сколько же мы её ждали.</p>
<p>Второй усмехнулся:</p>
<p>— Ему положен длинный отдых. Столько жизней подряд без пауз — редкость. Он был упрямым.</p>
<p>— Разговорчивым,</p>
<p>— уточнил Первый.</p>
<p>— Он всё время спорил там, внутри. С людьми, с миром, с собой. Вот память и не стиралась. Зацепилась.</p>
<p>Капля души спокойно мерцала у него на ладони.</p>
<p>— Мама?!!</p>
<p>— спросил Второй.</p>
<p>Первый кивнул в сторону врачей.</p>
<p>— Сохранили. У неё своя задача. Тяжёлая, но нужная. Потеря малыша, то ведь тоже её урок, её поворот, её сила дальше. Она поднимется выше.</p>
<p>— Хорошо,</p>
<p>— сказал Второй.</p>
<p>— Ни разу не было случайностей. Всё по плану.</p>
<p>В коридоре промчался врач с потными висками. Медсестра плакала, прислонившись к стене. Ведь все шло так ровно, гладко. Как теперь все это сказать отцу там - за родзалом? Жизнь полыхала эмоциями, как пожар.</p>
<p>В их мире всё было ровно, мягко, как дыхание.</p>
<p>— Ладно,</p>
<p>— сказал Первый, поднимая взгляд.</p>
<p>— Этого мы отдадим старшим. Дальше не наша компетенция.</p>
<p>Он аккуратно поднял светящуюся каплю, и та растворилась вверх</p>
<p>— туда, где совсем другие уровни.</p>
<p>— Пошли к нашему новенькому? — спросил Второй.</p>
<p>— Пошли, — ответил Первый.</p>
<p>Его наставники уже закрепились. А он, похоже, нас почувствовал. Нужно успеть, пока он не уснул, и проверить, как там адаптация.</p>
<p>— И да,</p>
<p>— улыбнулся Второй.</p>
<p>— После этого - отпуск?</p>
<p>— После этого - отпуск,</p>
<p>— подтвердил Первый.</p>
<p>— А эти двое пусть дальше с ним работают.</p>
<p>Они развернулись и пошли обратно в тот родзал, где жизнь только начиналась.</p>
<p>Не торопясь.</p>
<p>Спокойно.</p>
<p>Как идут те, кто точно знает: смерть и рождение это одна и та же дверь, просто с разных сторон.</p>
<p>ПЕРАЫЕ ШЕПОТЫ.</p>
<p>Наставники закрепились за ребёнком в тот самый момент, когда он впервые уснул у матери на груди.</p>
<p>Тогда они были почти незаметны едва-едва ощутимые колебания в воздухе.</p>
<p>Работы у них было немного: просто сопровождать, наблюдать, мягко поправлять траекторию, если она слишком сильно отклонится.</p>
<p>Детский сад прошёл ровно.</p>
<p>Школа ещё ровнее.</p>
<p>Ни подвигов, ни катастроф.</p>
<p>Ровная, тихая река жизни.</p>
<p>И наставники только переглядывались:</p>
<p>— Удивительно спокойный ребёнок,</p>
<p>— говорил Первый.</p>
<p>— Может, мы зря переживали?</p>
<p>— Подожди,</p>
<p>— отвечал Второй.</p>
<p>— Тихая вода любит глубину. Он ещё не проснулся.</p>
<p>Первые вмешательства начались незаметно с детских снов.</p>
<p>Сны-ПОДСКАЗКИ</p>
<p>Когда ребёнку было около семи, он увидел первый странный сон.</p>
<p>Наставники стояли рядом, обсуждая внимательно:</p>
<p>— Нужно мягко открыть канал памяти. Чуть-чуть. Чтобы знание не ударило в голову, но дало ощущение, что он не один.</p>
<p>— Начнём с символов?</p>
<p>— Конечно. Символы лучший язык.</p>
<p>И в ту ночь мальчику приснилась битва с динозаврами.</p>
<p>Сон был яркий, как кино в формате IMAX:</p>
<p>рев, земля дрожит, взмах хвоста, который сносит деревья, огромные силуэты в дымке. И меч длинный холодный клинок. Город, как после бомбежки и длинный корпус городской больницы с выбитыми окнами, безлюдные улицы и они. Зубастые монстры как из фильма Парк Юрского периода. Но нужно пройти от одного корпуса к другому, во что бы то ни стало. И по открытой местности.</p>
<p>Малыш проснулся, но не страхе, а</p>
<p>в восхищении.</p>
<p>— Заметил?</p>
<p>— сказал Второй.</p>
<p>— Он помнит силу. Ему это пригодится.</p>
<p>— Главное, чтобы не решил, что он сам тираннозавр,</p>
<p>— буркнул Первый.</p>
<p>Потом, год спустя, начались самолёты.</p>
<p>Огромные лайнеры взлетали… ну совсем не там, где положено:</p>
<p>по просёлочным дорогам, по лесным тропам, между еле-еле расходящимися деревьями или просто среди городских застроек.</p>
<p>И каждый раз крылья чудом не задевали ветки, столбы и тянущиеся вдоль них провода.</p>
<p>Каждый раз самолёт всё равно уходил вверх, уверенно набирая высоту. В чистое небо.</p>
<p>— Это что сейчас было?</p>
<p>— спросил Первый, наблюдая за очередным взлётом.</p>
<p>— Пробуждение уверенности,</p>
<p>— ответил Второй.</p>
<p>— Его путь будет непростым. Местами вроде взлётной полосы нет, а лететь всё равно нужно.</p>
<p>— Так мы поэтому и показываем, что крылья выдержат?</p>
<p>— Да. Чтобы, когда придёт время, он не испугался.</p>
<p>РЕКА</p>
<p>Когда наш герой стал студентом мединститута, сны стали другими.</p>
<p>Тонкими. Теплыми. И слишком реальными. Один и тот же сон возвращался снова и снова.</p>
<p>Широкая тихая река. Нет это была не река. Это был обводной канал Киевского водохранилища.</p>
<p>Высокие зелёные берега.</p>
<p>Тёплый, летний вечер.</p>
<p>Золотой свет, в котором не существовало времени.</p>
<p>Он стоял на обрыве и смотрел вниз на отражение солнца в воде, на медленное течение, на спокойствие мира.</p>
<p>— Ты знаешь это место?</p>
<p>— тихо спрашивал Первый.</p>
<p>— конечно. И он узнает, — уверенно отвечал Второй.</p>
<p>— Это его место силы. На одном из уровней. Там он отдыхал между жизнями. Там мы с ним и говорили.</p>
<p>— Интересно… — задумался Первый.</p>
<p>— Почему канал?</p>
<p>— Потому что его путь</p>
<p>— про течение. Не про рывки. Не про рычание и кулаки. Он должен плыть. И помогать плыть другим.</p>
<p>В этот момент ночной ветер касался его лица, и он почти слышал:</p>
<p>Ну как тебе место? Нравится? Не бойся. Мы рядом. И всё идёт правильно. Ты его еще увидишь вживую, лет через 15.</p>
<p>Но человек не распознаёт голос наставника.</p>
<p>Он просто просыпается с ощущением теплоты, когда совсем не хочется вставать и учить латынь по рисованым костям в атласе человека.</p>
<p>Он чувствовал это особенно остро в те дни, когда падало настроение или наоборот, появлялась безусловная уверенность в себе, откуда-то из ниоткуда.</p>
<p>— Началось,</p>
<p>— сказал Второй. — Он начинает ощущать нас.</p>
<p>— Это хорошо?</p>
<p>— Это неизбежно.</p>
<p>Впереди его ждали ещё большие перемены: первые настоящие выборы, первые внутренние толчки, первые моменты, когда жизнь пойдёт не по плану, но именно так, как задумано.</p>
<p>И наставники только ждали.</p>
<p>Терпеливо. Спокойно. Как ждут те, кто знает: самое интересное начинается тогда, когда человек впервые перестаёт спать и начинает искать.</p>
<p>ВЫБОР</p>
<p>С окончанием школы жизнь его перестала быть фоном. Юношеская бравада, гонки на велосипедах по полосе рулежки, самолет на вторй круг, магний с марганцовкой из самолетной ступицы, сухой лиман, ночевки, девчонки, тихое одесское море, всё это оказалось приятной иллюзией, теплом на поверхности, которое скрывало глубину выбора. А теперь настала настоящая взрослая жизнь: куда идти дальше, чем заниматься и как быть дальше.</p>
<p>И наставники снова рядом. Невидимые, но ощутимые, как лёгкий ветер, который меняет направление облака. Они спорили между собой, тихо, почти шёпотом:</p>
<p>— Наука, и исследования для него … это было бы идеально. Он справился бы. Его голова кладезь возможностей. И химию обожает. Смотри. Наизусть выучил.</p>
<p>— Нет, — ответил второй.</p>
<p>— Он должен сам выбрать. Иначе всё остальное - пустая трата времени. Пусть проходит уроки самостоятельно.</p>
<p>— мать подскажет?</p>
<p>— мать? да, сейчас попробуем организовать это. И именно она подоткнет его к медицинскому.</p>
<p>Они наблюдали, как герой принимает решение жениться. Посвятить себя медицине, но не остаться в госпитале, а отправиться служить в далёкую воинскую часть, да еще и с молодой женой.</p>
<p>— Я бы его остановил! — возмутился первый наставник.</p>
<p>— Можно было просто… задержать тогда троллейбус, изменить день этого их свидания, и не произошло бы ничего. Столько потом мороки будет.</p>
<p>Второй только вздохнул, устало и спокойно, как тот, кто видел тысячекратные повороты судьбы.</p>
<p>— Нет. Он должен пройти это сам. Да, будет больно. Развод, предательство, судебная волокита… Но это его урок. И без него он не станет тем, кем должен стать.</p>
<p>— теперь ты понял? Почему Архивариусы не дали третего? Тот бы точно вмешался.</p>
<p>Первый наставник уставился в пустоту:</p>
<p>— А ведь он мог бы выбрать все иначе. Лёгко. Без страданий.</p>
<p>— Да, — согласился второй.</p>
<p>— Но это не принесло бы ему мудрости. Он уже сам выбрал путь. Всё остальное лишь последствия, которые станут фундаментом.</p>
<p>Он вспомнил другого малыша, того, что умер в родзале. Короткая программа, урок завершён. Вышел без боли, без выбора, завершил путь мгновенно.</p>
<p>— Вот и контраст, — сказал второй наставник.</p>
<p>— Один ушёл, покончив с прошлым, другой остался. Ему предназначено пройти уроки, хотя он и не помнит своих минулых жизней.</p>
<p>Память стерта, остались только сны. И из них сложно сделать выводы. Но его выбор именно этот, он свободный и задаёт всю его будущую судьбу.</p>
<p>И на мгновение, словно ветром, между ними пронёсся свет такой тонкий, как озарение. Он касался героя, который сидел в ординаторской медсанбата, читая учебники неврологии, разбираясь с бюрократией и украинским языком, который он никогда не учил в жизни.</p>
<p>Он ещё не понимал, почему всё происходит именно так. Но уже ощущал, что что-то ему подсказывало, как правильно, и почему так не правильно тут. Как лёгкий шёпот, как тепло в груди, как чувство, что где-то есть глаза, которые смотрят, но не вмешиваются напрямую.</p>
<p>— Он справится, — сказал второй наставник. — Пусть пройдёт всё сам. Пусть выберет.</p>
<p>— Я всё равно боюсь, что… — начал первый, но замолчал.</p>
<p>— Всё идёт по плану, — мягко улыбнулся второй. — Иногда самый трудный путь и есть самый правильный.</p>
<p>И они снова растворились в воздухе, оставив человека одного, но уже с ощущением, что даже в глубоком падении есть кто-то рядом.</p>
<p>Они тихо наблюдали, как герой снова окунулся в вихрь эмоций: счастья, волнений и сомнений. Наставники знали: всё это часть программы, часть урока, который поможет ему стать тем, кем он должен быть.</p>
<p>— Смешно, — сказал первый. — И немного грустно. Но главное — выбор остался за ним.</p>
<p>— Всегда, — согласился второй. — Даже если последствия болезненные, даже если сердце разбивается, всё это фундамент.</p>
<p>И они тихо посмеялись вместе, невидимо, словно ветром, проходя мимо.</p>
<p>Судьба, как они знали, любит тишину и тонкий юмор.</p>
<p>КОГДА УЧЕНИК РЕШАЕТ, ЧТО ОН ПРОРОК</p>
<p>Архивариусы сидели на своём привычном месте, чуть выше человеческих событий, но не настолько высоко, чтобы потерять детали. Они следили за героем и наблюдали за наставниками: тот закончил мединститут, военную академию, стоял на пороге взросления и впервые в жизни пытался понять:</p>
<p>“А зачем я вообще здесь?</p>
<p>Что мне делать дальше?”</p>
<p>Первый наблюдал за ним внимательно, чуть наклоняя голову — почти по-отцовски.</p>
<p>— Началось, — сказал он. — Период Больших Вопросов.</p>
<p>Второй фыркнул:</p>
<p>— Лишь бы не начался период Больших Ответов.</p>
<p>— Точно, — улыбнулся первый. — Это хуже.</p>
<p>Они оба знали: именно в такие годы молодые души особенно уязвимы.</p>
<p>Если дать слишком много вдохновения, человек решит, что он избранный.</p>
<p>Если дать слишком мало, он впадёт в уныние.</p>
<p>Баланс тут тонкий, как в хирургии. Лишнее движение и всё.</p>
<p>— Смотри, — сказал Первый, показывая пальцем вниз, — он сейчас чувствует, будто должен совершить что-то великое. Ему кажется, что судьба подталкивает.</p>
<p>— Это нормально, — отозвался Второй. — Главное, чтобы он не начал думать, что его миссия изменить мир.</p>
<p>Первый поднял бровь:</p>
<p>— Примеры опять вспоминать будем?</p>
<p>— Придётся. Учить на чужих ошибках быстрее.</p>
<p>Он вздохнул и открыл тонкую, светящуюся страницу, не историю одного человека, а целую эпоху.</p>
<p>На ней вспыхивали имена, от которых у людей ёкает сердце, а у архивариусов нет:</p>
<p>Ленин.</p>
<p>Сталин.</p>
<p>Гитлер.</p>
<p>Путин.</p>
<p>— Видишь? — сказал Второй, постукивая по странице. Каждый из них был уверен, что “понимает свою миссию”. Что его путь единственно верный. Что он знает, как надо всем остальным жить.</p>
<p>Первый тихо кивнул.</p>
<p>— И все они начинали одинаково, — продолжил Второй. — С благих намерений. С идеи “спасти”, “освободить”, “исправить”.</p>
<p>А закончилось всё трагедиями и для них тоже, и для тысяч душ, которые не планировали ускоренной сдачи экзамена.</p>
<p>— ну их то мы не оставим, а вот этих закоперщиков придется…. Он задумался.</p>
<p>— Сверху команды не давали на них. Поправил его Второй. Там уж точно есть кому ими заняться.</p>
<p>Он закрыл страницу.</p>
<p>— Миссия, которую человек объявляет сам себе, почти всегда иллюзия. А настоящая миссия всегда скромная и тихая. Она не требует фанфар.</p>
<p>Они посмотрели на героя: тот стоял у окна и смотрел на дождь.</p>
<p>— Задумался. Тихо произнес Первый.</p>
<p>— Решается, дополнил Второй.</p>
<p>— Ты понимаешь, — сказал Первый, — он же сейчас может решить, что его миссия спасать всех подряд. Или стать кем-то “великим”.</p>
<p>— Поэтому, — ответил Второй, — мы ничего ему не подсказываем. Ни слова.</p>
<p>Пусть сделает свой выбор. Обычный. Земной. Но Сам.</p>
<p>Он помедлил.</p>
<p>— И да, пускай женится на этой. Да, пускай уедет с ней в часть. Да, пускай пройдёт и предательство, и развод, и слом. Зато она ему сына родит. А он сбежит от нее и останется жить с ним в новой семье, а потом создаст свою.</p>
<p>Это его путь. Его урок.</p>
<p>А не навязанная сверху “миссия великого предназначения”.</p>
<p>Первый усмехнулся:</p>
<p>— А ведь он мог пойти другим путём. И стать химиком. Я же мог вмешаться.</p>
<p>Второй покачал головой:</p>
<p>— Не вмешиваться тоже работа.</p>
<p>И часто самая сложная.</p>
<p>Они снова глянули на него.</p>
<p>—Слушай, ну, пусть хоть Ужгород, а не этот лес под Днепропетровском, как он там правильно?</p>
<p>—Новомосковск, поправил его Второй.</p>
<p>— Вот вот. Новомосковск.</p>
<p>—Ладно. Только аккуратно.</p>
<p>—Товарищ Генерал-полковник. Я подумал, готов к распределению в западный военный округ. Он отрапортовал эту фразу четко и без запинки.</p>
<p>—Можно.</p>
<p>—Савицкий. В приказ.</p>
<p>Распределение в медицинской академии было куда проще и быстрее, чем на гражданке.</p>
<p>—Ну все готово, Первый отрусил руки, как от пыли.</p>
<p>—вижу, стараешься, балуешь его.</p>
<p>Герой уже собирал свои чемоданы, готовясь ехать в забытую богом воинскую часть принимать должность старшего ординатора взвода, отдельной роты медицинской батальона. Он то думал, что это его продуманный выбор.</p>
<p>Но это была точка программы.</p>
<p>— Смотри, — сказал Первый. — Он сомневается… Ему кажется, что он должен сделать что-то другое.</p>
<p>— Отлично, — ответил Второй. — Значит, растёт.</p>
<p>— А если решит, что именно это его миссия, то?</p>
<p>— Тогда мы ему мягко объясним позже. Через опыт. Через людей. Через жизнь.</p>
<p>Но ни в коем случае не сегодня. Сегодня его задача просто собрать вещи и как то впихнуть их всех в пятитонный контейнер.</p>
<p>Они замолчали, глядя на то, как старший лейтенант закрывает за собой дверь и уходит в свою дальнейшую жизнь, ещё не зная, что вернётся оттуда уже совсем другим человеком.</p>
<p>— И всё-таки, — тихо сказал Первый, — хорошо, что он не родился с излишним самомнением.</p>
<p>А то пришлось бы много работать.</p>
<p>Второй хмыкнул:</p>
<p>— Нам хватит тех, кто пытается спасать мир, не спасаясь от самого себя.</p>
<p>Они ещё немного посидели в тишине и только спустя пару минут Второй добавил:</p>
<p>— Вот потому-то ему и стирали память. Чтобы не лез туда, где пока нет дверей.</p>
<p>Первый кивнул:</p>
<p>— Да.</p>
<p>И чтобы он прожил жизнь, а не потратил её на попытку сыграть в пророка.</p>
<p>Унылый железнодорожный вокзал. Ужгород - неплохой маленький городок для трех-пятидневного отпуска. Вкусная пицца, прекрасное темное пиво. Но для его жизни слишком короткая  взлетная полоса. Ожидая старенький Урал, который вёз его контейнер в воинскую часть, он ещё не знал, что впереди будут развод, тяжёлые решения, обман, бессонные ночи и ощущение полной потери опоры.</p>
<p>Оба наставника сидели на своей “верхней галёрке”, болтая ногами в пространство между мирами.</p>
<p>— Всё, — сказал Первый.</p>
<p>— Он сел не в тот транспорт, в котором жизнь была бы ровнее. Да и вообще не в тот поезд. Ну какой Ужгород?</p>
<p>Второй усмехнулся:</p>
<p>— А что нам ровная жизнь? Её получают коровы, собаки, лошади и ослы, которые верно служили человеку. Он говорил это тихо, будто сам с собой. А потом наставники за ними присмотрят, кем они станут уже в образе людей.</p>
<p>Первый тихо хмыкнул:</p>
<p>— Да, легких путей для жизни тут на Земле найти можно только им.</p>
<p>ПЕРЕСЕЧЕНИЕ ТРАЕКТОРИЙ</p>
<p>Прошли годы после мединститута, военной академии и демобилизации.</p>
<p>Но жизнь иногда умеет играть в причудливые шахматы.</p>
<p>На встрече выпускников он снова встретил её.</p>
<p>Ту самую, разница в имени с которой была лишь в одну букву, с которой был в одной группе с первого курса и фамилии в журнале шли рядом, его первая, а её сразу за ним.</p>
<p>— Ну вот, — сказал первый наставник, наблюдая, как они вспоминали смешные истории из универа и ни разу не ссорились. Совсем ни разу. Так не бывает, а нет. Бывает. . — Ага… закружилось.</p>
<p>Второй подался вперёд:</p>
<p>— Ага! Вот, начинается.</p>
<p>Пересечение траекторий.</p>
<p>Первый уточнил:</p>
<p>— Десять лет ждали… И всё ради одного вечера.</p>
<p>— Не одного, — поправил Второй. — У них там пакет задач. Комплексная работа. Это тебе не “любовь с первого взгляда”. Это “сверка по накопленным ошибкам”.</p>
<p>Первый поднял бровь:</p>
<p>— а ты знаешь, как они будут друг друга потом спрашивать: “А что если бы мы поженились на первом курсе?”</p>
<p>— догадываюсь, — фыркнул Второй. — Хорошо, что не поженились. Мы бы тогда с тобой работали не в две смены, а в четыре.</p>
<p>Там где они бы сейчас жили почти нет жизни.</p>
<p>Левый берег Херсонщины?</p>
<p>— Да,</p>
<p>Они тогда оба были ещё зелёные. Дать им семью в том возрасте, это всё равно что дать гранату детям: шумно, весело, но недолго.</p>
<p>Второй задумчиво посмотрел вниз, на свою ногу, потом на карту.</p>
<p>— А сейчас они как раз дозрели.</p>
<p>Пережили отдельные уроки.</p>
<p>Выдержали своё.</p>
<p>Герой прошёл предательство. Она магистратуру, туберкулезных пациентов и маленькую, но уже свою квартиру на окраинах Киева.</p>
<p>Вот теперь можно дать шанс. Но не больше.</p>
<p>Первый кивнул:</p>
<p>— Да, это не слияние судеб. Это прям практическое занятие.</p>
<p>Совместная лабораторная.</p>
<p>— подожди, а он ей еще чего то там рисовал на биологии кажется?</p>
<p>—Глистов он ей рисовал. А потом стащил у нее кошелек незаметно. И сразу вернул с напутствием, ты же в Одессе. Будь осторожна. Не разевай варежку.</p>
<p>И тут экран судьбы вспыхнул ярче.</p>
<p>На встрече выпускников он увидит её взгляд. Она заметила его. Мало. Недостаточно.</p>
<p>—Ускорим? Спросил Первый.</p>
<p>—Нет. Сам все сделает. Ответил Второй.</p>
<p>Наставники не вмешивались.</p>
<p>Они просто наблюдали, как две линии, долго идущие параллельно, наконец делают маленький, но очень важный поворот.</p>
<p>— Ну что, вмешиваемся? — шепнул Первый.</p>
<p>Второй отмахнулся:</p>
<p>— Ты что.</p>
<p>Пусть сами.</p>
<p>Это же их экзамен.</p>
<p>Мы только смотрим, чтобы не скатились в самоуверенную “миссию” исправления друг друга.</p>
<p>Это особенно опасно.</p>
<p>Первый продолжил:</p>
<p>— И что дальше?</p>
<p>— Дальше всё просто, — ответил Второй.</p>
<p>— Они попробуют.</p>
<p>— Они создадут семью.</p>
<p>— Они несколько раз скажут друг другу: “А что если бы мы были вместе раньше?”</p>
<p>— И что мы скажем им мысленно? — спросил Первый.</p>
<p>Второй улыбнулся, наклонив голову:</p>
<p>— “Ребята…</p>
<p>Если бы вы были вместе раньше — раньше бы и развелись.</p>
<p>Слишком рано, слишком громко, слишком наивно.”</p>
<p>Пусть лучше сейчас, когда оба уже с мозгами, шрамами и опытом.</p>
<p>Они ещё немного посмотрели на вспыхивающие точки, на людей, на разговоры, на предстоящую встречу.</p>
<p>И вдруг Первый сказал:</p>
<p>— Слушай… А может, это и есть их миссия? Встретиться. Понять. Прожить вместе. Просто быть рядом?</p>
<p>Второй медленно замотал головой:</p>
<p>— Нет. Миссия, это всегда внутри.</p>
<p>А отношения… это всего лишь зеркало.</p>
<p>В котором человек может либо увидеть себя, либо разбить стекло, решив, что виновато отражение. Хотя, знаешь, думаю, архивариусам виднее.</p>
<p>Он щёлкнул пальцами, и линии судьбы снова сдвинулись, плавно подводя героев к их знаменитой “случайной” встрече.</p>
<p>— Ладно, — сказал Первый. — Давай смотреть.</p>
<p>Чувствую, будет интересно.</p>
<p>Второй усмехнулся:</p>
<p>— Интересно? Конечно будет.</p>
<p>Эти двое ещё столько шума поднимут, что нам потом точно дадут внеочередной отпуск.</p>
<p>И два наставника, не вмешиваясь, лишь наблюдали, как герой идёт навстречу женщине, судьба которой хранила место в его жизни.</p>
<p>Где-то между строк, между тем, как герой наш взрослел, терял, находил и понимал, наверху, в тихой канцелярии, такой себе светлой комнате, где время течёт боком, снова собрались Архивариусы. Тут их уже было больше.</p>
<p>Собрались без суеты, просто посидеть, перебрать дела, вспомнить смешное и хорошо забытое старое.</p>
<p>Первый - высокий, чуть сутулый, с привычкой всё время поправлять невидимые очки, лениво листал свой журнал.</p>
<p>Второй - низкий, широкоплечий, со смешной бородкой, сидел, болтая ногой, и думал, как бы незаметно стащить у коллеги его карандаш.</p>
<p>Третий, как обычно, молчал, но от его молчания лампа над столом светила ровнее.</p>
<p>— Слушай… — Первый архивариус прищурился. — У нас же был один… помните? Тот, которого мы курируем давно. Где герой такой с характером, упрямец редкостный. Его ещё Лаврентий поднатаскивал.</p>
<p>— А-а-а! Тот, который всё время «я сам, я сам», хоть и не помнит, что обещал маме учиться? — оживился Второй. Химию еще наизусть выучил. Помню! Лаврентий с ним намучился. Никому не доверял, а ему поверил. А кто его в кота обратил? Третий посмотрел вверх. Эта там дали команду. Хороший парень, но голова, как старый винчестер, гудит, но работает.</p>
<p>— Точно он, — первый постучал по журналу. — Смотри, он сейчас на очередном этапе. Там что-то про войну, про встречи, про выборы. И… стой-ка.</p>
<p>Он наклонился ниже.</p>
<p>Страницы журнала мерцали, как будто написаны не чернилами, а светом, иногда исчезающим и появляющимся снова в зависимости от того, делает ли человек правильные выводы.</p>
<p>— Ты это видишь? — тихо сказал он.</p>
<p>— Вижу… — второй даже замер. — Он пишет. Правда пишет.</p>
<p>— Книгу?</p>
<p>— Прямо сейчас?</p>
<p>— Прямо сейчас, — подтвердил первый, закрывая журнал ладонью, будто оберегая свет от чужих взглядов. — И знаешь… читателю, пожалуй, пора…</p>
<p>— Ты про тот момент? — второй улыбнулся. — Где он перестаёт быть героем и впервые заговорит сам?</p>
<p>— Да. Давай откроем страницу.</p>
<p>Первый архивариус щёлкнул пальцами, мягко, тихо, как будто выключил ненужный спектр.</p>
<p>Лампа мигнула.</p>
<p>Комната дрогнула, будто выдохнула.</p>
<p>И тогда он сказал:</p>
<p>— Ладно. Пусть говорит сам. Его история этого заслуживает.</p>
<p>— И его дети… — добавил третий, второй раз открыв рот, — …пусть тоже послушают.</p>
<p>И журнал раскрылся.</p>
<p>На странице проступили первые строки уже от того самого человека, который пережил многое, сделал ошибки, спас жизни, потерял себя и снова нашёл, стал учиться заново… и наконец решился  заговорить.</p>
<p>ОТ ПЕРВОГО ЛИЦА</p>
<p>Встреча выпускников девяносто седьмого года проходила в Одессе. В солнечный, почти наглый в своей красоте день. На Приморском бульваре. Моя будущая жена вместе со своей лучшей подругой Анечкой забронировали летнее кафе, договорились о закусках и собрали часть нашей медицинской «стаи».</p>
<p>Людей было немного, но каждый там был как отдельная планета. Я к этой встрече готовился особенно тщательно. И пусть говорят, что случайностей не бывает, но уж больно вовремя меня тогда нашли. Позвонила Аня и предложила прийти. Я согласился сразу, даже уговаривать не пришлось.</p>
<p>У меня тогда была большая красная машина Opel Frontera. Я её вылизал до абсурда, набрызгал её и себя всем, что обещало «стать лучше, чем ты есть», и явился таким красавцем, будто приехал не на встречу выпускников, а на кастинг «Холостяка». Коим я тогда и являлся.</p>
<p>Я подъехал к мединституту, почти впершись черным бампером в лакированные двери главного корпуса. Наши однокурсники скромно сидели на парапете и ждали всех остальных. Я вспомнил третий курс, когда возил всех на такси по кафедрам, работая ночным охранником и получая на то время просто огромные деньги. Я вспомнил это место, где в девяносто первом толпились абитуриенты и выискавали свои оценки в Ведомостях, чтобы понять ты уже поступил или псе провалил. Но сегодня я заехал прямо сюда, под каштаны. Будь вход чуть шире, я бы въехал прямо к Пирогову под локоть. Эта статуя стояла как символ нашего института, носившего его имя.</p>
<p>Мы собрались в плотную толпу и пешком двинулись по нашим родным и злачным одесским улочкам. Тем самым, где когда-то между парами  мы учили анатомию, повторяли гистологию или писали пулю. Художественный музей, подземный грот до Воронцовского дворца. Мы шли параллельной ему и дошли до кафе, где нас уже ждали. Столики стояли прямо на улице.</p>
<p>Все расселись. И мне стало заметно, как время незаметно, но жёстко меняет людей: юношеские лица остались улыбчивыми, но в улыбках уже прятались взрослые истории.</p>
<p>И вот тогда началось самое интересное. Мне показалось, что я вижу всех насквозь. Не глазами, а чем-то другим. Будто кто-то включил подсветку внутренностей, но не анатомических, а жизненных. Было сложно понять, что это: подсказки? Провидение? Или странное ясновидение, которое иногда приходит после дежурств, когда не спал двое суток.</p>
<p>Через какое-то время, под бодрый ритм «Я шоколадный заяц», из-под стола вылез огромный накачанный негр (ой, афроамериканец) и начал танцевать стриптиз. Девчонки визжали так, будто им снова по восемнадцать, а местные зеваки забыли зачем они пришли в парк. Даже официанты на миг открыли рты и стояли неподвижно.</p>
<p>Он остался в одних чёрных плавках с маленьким белым хвостиком, которые сливались с его фиолетово-черной кожей. В такт ритму он играл мышцами, словно показывал пособие по анатомии.</p>
<p>И Светка Русалкина — о, Светка…</p>
<p>Так схватила его за задницу, будто всю жизнь тренировалась и готовилась именно к этому моменту. Пуговица на её откровенном декольте еле сдерживала страсть, как цепь пантеру от прыжка, но при этом она так громко смеялась, что голуби впорхнули с веток акаций. Не разжимая пальцев и не отпуская секунд тридцать-сорок, если не минуту большую ягодичную мышцу зайца, в ее глазах читалось:</p>
<p>«Господи, как же я давно хотела это сделать… её муж хороший, человек, полковник, один из преподов нашей военной кафедры, возрастом был старше лет на тридцать этого зайчонка, компанию ей не составил, но и не запретил ей принять участие. А вот подержать бедро негра? Это же мечта, которая сбылась, но почему-то осталась не прописанной в супружеском договоре. Пройдет немного времени и миссия принимать людей тут на Земле будет передана Светлане, как будто в самом её имени заложен тот свет, с которым они входят в новый мир.</p>
<p>Андрюха Акулов - скромный, немного одиночка, краснел так, будто его застали на месте преступления без штанов. Приехал он один, хотя женат и с кучей детей. И мог бы заодно всем показать море. Глядел на всё это и думал о своём:</p>
<p>«Хорошо, конечно, но мне завтра в Киев, сосудистая хирургия, палата, пациенты…» врач он до мозга костей. А с началом войны ушел туда, где его помощь была особенной всем нужна.</p>
<p>Викуся с её вечным тихим смешком. Она всегда хихикала, когда не знала, что сказать. И в этот момент была похожа на Мерлин Монро, когда ей снизу под платье подул поток воздуха. Улыбалась уголком губ и кокетливо смотря на стриптизёра, явно вспоминая свою любовь с того самого первого курса. ту самую. А он, мерзавец, выбрал другую и до сих пор живёт с ней.</p>
<p>Викуся сделала карьеру и стала известным одесским кардиологом. У неё симпатичная дочка и любящий муж.</p>
<p>А ещё был Олег. Его длинные, покрашенные в чёрное (а иногда в рыжее) волосы, на ветру развивались не хуже чем у Томаса Андерса на его концертах Modern Talking. Маг, астролог, личный друг самого Павла Глобы и большой противник алкоголя, что само по себе уже чудо среди студентов-медиков.</p>
<p>В свободное время он торговал шоколадными конфетами на Привозе. А однажды я встретил его в мясном ряду. Он стоял, прижимая к груди три-четыре коробки конфет, будто продавал не сладости, а детали к машине времени Шурика из Ивана Васильевича.</p>
<p>Потом он исчез, а позже я узнал, что он в Таиланде. Хотя в тот же день видели его на одном из одесских пляжей. Квантовая суперпозиция в чистом виде.</p>
<p>А какая интересная трансформация бывает с фамилиями. Лена Лихошерстова. Миниатюрная, как француженка, хрупкая с виду, но отважная, как морской пехотинец, она в пять утра как по приказу, стояла на станции пригородной электрички, в которой я ехал по грибным местам и в шутливой форме пригласил взять  её с собой. Я не поверил, что среди перронных желтых фонарей, я увижу её силуэт. А потом она вышла замуж и взяла фамилию мужа. Колтунова. Лена с честью и достоинством перенесла переезд с заповедных мест Херсонщины на новые земли юга Одесщины, где ей удалось почти с нового листа начать новую жизнь в удалении от своего родного дома.</p>
<p>Юля Додий - я знал, что она терапевт, но никак не мог в это верить. Все, кто живет в курортных городках, особенно таких, как Черноморск, они же лицом повернуты к туристам Жена моряка, свои апартаменты для гостей и неимоверной красоты цветы вокруг их домика они выстроили с любовью. Если человек умеет вырастить такое вокруг себя, значит и в душе он умеет дарить людям праздник.</p>
<p>А Люда? Люда Красуляк. Это вообще легенда. Анестезиолог в Вознесенске, спасающая от боли всех, кто рядом с ней. Человек, который готов болеть сам, но чтобы не болело у других. Южный Буг и белые лебеди и сын Тема, и каторжная работа, но та, без которой она уже не представляет своей жизни. Тоже ведь счастье.</p>
<p>Я смотрел на них - и казалось, что я все это вижу. Через время, через расстояния.</p>
<p>Одна только Анечка, приняв от шоколадного зайца предложение ему подыграть, видимо это входило в его гонорар, так прогнулась в позвонке, придерживаемая им нежно за талию  и стоя на своих стройных полусогнутых ногах, что кончики ее волос дотронулись горячего одесского асфальта, родила четырех девчушек, да таких славных, что по праву может считаться не только врачом, но и мамой с большой буквы.</p>
<p>И я не знаю почему, но мне казалось, что я всё это чувствую, я могу прочитать. Словно на мне были линзы правды, выданные на один вечер архивариусами или наставниками, чтобы я понял, что у каждого из нас своя история, своя рана, свой жизненный урок.</p>
<p>В тот день меня накрыло. Таким странным ощущением, словно все эти люди - ученики разных классов:</p>
<p>кто-то по-прежнему в первом,</p>
<p>кто-то перешёл на пятый,</p>
<p>кто-то уже собирает документы на выпускной, а кто-то уже давно сдал экзамены экстерном.</p>
<p>И что-то в голове начинало меняться.</p>
<p>Словно собирались пазлы, но рисунок получался совсем не тот, который должен был быть.</p>
<p>И в такие моменты мне всегда казалось, что рядом… кто-то есть.</p>
<p>Наставники? Архивариусы?</p>
<p>А если уж они не справлялись, то может твит кто-то повыше?</p>
<p>С Аленой мы поженились через год. А ещё через год мне поступило такое интересное предложение, от которого, как говорят, совсем нельзя отказаться. Открыть в Киеве центр магнитно-резонансной томографии для серьёзной структуры, обладающей колоссальными диагностическими и финансовыми возможностями.</p>
<p>И началось всё это с одного телефонного звонка.</p>
<p>-здравствуйте, Алексей. Меня зовут Софья. На тот момент процесс этот тянулся бесконечно долго, как жвачка, которую пережёвываешь, но уже не чувствуешь вкуса. Выбор места. Стройка, закупки, лицензии, согласования… И чтобы не выпадать из профессии, я начал консультировать пациентов по вопросам лечения их злокачественных новообразований.</p>
<p>Именно тогда начался самый странный и самый важный этап моей врачебной жизни.</p>
<p>Ко мне приходили совершенно разные люди. Казалось бы, разные судьбы, разные истории, разные миры. Но я почему-то чувствовал их всех одинаково близко.</p>
<p>Будто внутри у меня был маленький архив, а в нём записи о каждом из них.</p>
<p>Обычная консультация по радиохирургии, лучевой терапии или радиотерапии меня интересовала меньше всего. Методы стандартные, да и протоколы прописанные. Ничего нового.</p>
<p>Но люди… Люди были совершенно иные.</p>
<p>Мне было интересно слушать их истории.</p>
<p>Сравнивать их слова с теми, что у меня откликались внутри.</p>
<p>Было странное ощущение, что я знаю каждого человека, как будто мы уже когда-то проживали вместе какой-то кусочек жизни.</p>
<p>Пациенты приходили вместе с родственниками. И как правило, именно их родственники и говорили за них.</p>
<p>А сами пациенты молчали, только изредка произносили пару фраз.</p>
<p>В голосах чувствовались подавленность, усталость и тягостное принятие. Будто они уже сложили руки.</p>
<p>И вдруг маленький шанс.</p>
<p>Шанс вернуть человека в движение.</p>
<p>Не всегда вылечить, но вернуть ему осмысленность, направление и вектор.</p>
<p>Каждая такая жизнь, каждый человек, который вдруг расправлял плечи, выпрямлял спину, снова начинал дышать полной грудью давал мне прилив сил.</p>
<p>Мне казалось, что если я могу сделать хоть что-то, чтобы смягчить прохождение души через эту земную колонию общего режима, облегчить её маршрут, помочь не упасть в отчаяние - это уже очень многое.</p>
<p>Таких людей за годы было много.  Сотни, а может и тысячи.</p>
<p>Каждый с уникальной целью, задачей и своим уроком.</p>
<p>Я никогда не пытался выяснить, ради чего именно они возвращались в жизнь.</p>
<p>Это не моё дело.</p>
<p>Но я видел, как они снова начинают жить. Просто жить.</p>
<p>И этого было достаточно.</p>
<p>Многие из них могли позвонить мне даже ночью.</p>
<p>Просыпаться было тяжело.</p>
<p>Но я все таки поднимал трубку.</p>
<p>Потому что это был не звонок пациента, это был зов человека, который ещё не разобрался в своём уроке.</p>
<p>А потом? Потом открылся центр МРТ.</p>
<p>И всё резко изменилось.</p>
<p>Работа стала рутиной, очень похожей на ту самую палату номер шесть, которая медленно, но уверенно вытягивает из тебя последние силы.</p>
<p>МРТ дело нужное, информативное, полезное и рентабельное.</p>
<p>Но это была уже не медицина в моём понимании.</p>
<p>Это была механика.</p>
<p>Бизнес. Диагностика без жизни.</p>
<p>Мы находили причины болезней, но не имели понятия к тому, почему эти болезни возникали.</p>
<p>Мы были диагносты, а не клиницисты.</p>
<p>Мы отдавали врачам картинку, а они уже должны были разбираться с человеком дальше.</p>
<p>Но многие, к сожалению, забывали главное:</p>
<p>ничто не заменяет разговора с пациентом.</p>
<p>Именно в разговоре кроется ключ.</p>
<p>В истории. В боли. В страхе. В его жизни, а не в снимках его внутренних органов.</p>
<p>Если слышать человека, то можно лечить. Если видеть только изображение, то можно пропустить главное.</p>
<p>Жизнь лечит разговором.</p>
<p>А снимки лишь помогают не заблудиться. Но времени на разговоры тут нет совсем. Оно не оплачивается.</p>
<p>А потом всё оборвалось.</p>
<p>Рутина затянула меня воронкой, как водоворот, который сначала кажется игривым, а потом вдруг тянет на глубину.</p>
<p>Пациенты ушли на второй план.</p>
<p>И не потому, что я так хотел, а потому что времени на них просто больше не было.</p>
<p>Отчёты, финансовые таблицы, письма, какие-то бланки, формы, бесконечные программы, бухгалтерия ай-пи телефония.</p>
<p>Деньги, которые надо посчитать.</p>
<p>Деньги, которые надо проверить.</p>
<p>Деньги, которые никому нельзя доверить.</p>
<p>Я пытался переложить работу на других, но понимал:</p>
<p>они не сделают это так, как делал бы я. Они не чувствуют человека так, как чувствовал я.</p>
<p>И в какой-то момент я перестал понимать, а зачем вообще всё это? Если оно не приносит радость.</p>
<p>А потом пришёл 2022 год.</p>
<p>Война.</p>
<p>Два центра, которые я открыл, продолжили работать без меня, словно две автономные станции на далёкой планете, потерявшие связь с командиром. И было тоскливо. Тяжело. Уныло и как то пусто.</p>
<p>Я видел, как люди уходят.</p>
<p>Так быстро, так рано, так нелепо.</p>
<p>Мне казалось, их просто косят.</p>
<p>Даже не дав им закончить свои уроки, не дав пройти свой путь. Это было самым страшным: кто-то не успел и всё. Занавес. Как в лётной школе пилотов во время войны: только взлет и посадка.</p>
<p>Ускоренный выпуск.</p>
<p>И тогда, в этом переломном времени, я сделал неожиданное для самого себя. Я оставил медицину.</p>
<p>Я стал дарить людям праздник.</p>
<p>Маленький и по домашнему тёплый. Дружеские встречи.</p>
<p>Совместные ужины.</p>
<p>И конечно дегустации, где люди не прятались за бокалами, не заливали горе, а расправляли плечи. Сингулярные напитки, это даже не крафтовые. Ну про них, дай бог, будет отдельная история.</p>
<p>Разные люди приезжали ко мне, и я видел, как они уезжают другими. Чуть более живыми.</p>
<p>Чуть более спокойными. Чуть более настоящими, какими, возможно, они были раньше.</p>
<p>И вот это чувство лёгкое, тёплое, человеческое стало возвращаться и ко мне.</p>
<p>Я снова ожил и почувствовал смысл.</p>
<p>Да, я сегодня консультирую пациентов меньше, чем раньше.</p>
<p>Но каждый раз, когда удаётся помочь кому-то вернуть себя, это всё равно приносит мне радость.</p>
<p>И я понял простую вещь:</p>
<p>Если человек способен помочь хотя бы одной человеческой душе пройти ее земной путь, стать ей поддержкой и немного придать ей сил, но при этом, не посягая на её выбор, то он уже не даром проходит земную школу.</p>
<p>Да, возможно, у каждого есть своя цель, миссия, призвание.</p>
<p>Возможно, даже несколько. И человек может проявляться в разных местах, в разных делах, в разных качествах.</p>
<p>И это прекрасно.</p>
<p>Но если он живёт так,</p>
<p>что благодаря его жизни</p>
<p>другие живут лучше, то</p>
<p>это и есть лучший показатель прохождения урока.</p>
<p>А вот если от его действий страдают люди, тут уже начинают шевелиться они - Архивариусы.</p>
<p>Тихие, невидимые, но строгие. И вот тогда они уже не наблюдают, они передают эти души выше, где уже не их зона ответственности.</p>
<p>С этими моментами я сам до конца так и не разобрался.</p>
<p>Но чем дольше живу, тем больше понимаю:</p>
<p>Мы часто не знаем, зачем живём.</p>
<p>Но по тому, как живут рядом с нами видно, насколько правильно мы идём по этой колонии временного пребывания с названием Земля.</p>
<p>Эпилог.</p>
<p>Зима в тот год пришла мягко, почти извиняясь.</p>
<p>Снег ложился на крыши так нежно, будто берёг наш дом от лишних мыслей.</p>
<p>По вечерам мы с женой сидели у окна, без телефонов, просто рядом. Разговаривали о жизни, о детях, о том, как странно повернулась судьба: скольким помогли, скольких услышали, а где-то сами заблудились.</p>
<p>И вот одной такой ночью я почувствовал их. Архивариусов.</p>
<p>Не шаги.</p>
<p>Не силуэты.</p>
<p>Просто присутствие.</p>
<p>Как будто тишина стала глубже и плотнее.</p>
<p>Первый заговорил не голосом, а теплом, проходящим через грудь:</p>
<p>— Ты живешь жизнь так, как может не каждый: слушал других. Слушать - это редкий навык. Ты делал это не ради славы, не ради денег. Ты слушал, чтобы человеку стало легче. Это и есть настоящая работа.</p>
<p>Второй, добавил:</p>
<p>— Ты удивляешься, что уставал? Так от сострадания устают сильные, а не слабые. Но ты всё равно продолжал. И возвращал людей обратно к свету, иногда одним разговором.</p>
<p>Мы с женой переглянулись.</p>
<p>Она тихо сказала, почти шёпотом:</p>
<p>— Просто… если сможете… проведите так же мягко и наших детей.</p>
<p>И тут архивариусы улыбнулись, почувствовалось это даже сквозь зимний воздух.</p>
<p>— Мы не проводники, — сказал старший. — Мы лишь храним следы. Но если дети ваши будут похожими на вас хотя бы в одном — будут слышать других, то мы подставим плечо, когда земля под ногами дрогнет. Это обещание записано.</p>
<p>— А компасы мы им выдадим через людей. Только без инструкции, они сами разберутся, иначе какой смысл в этом пути?</p>
<p>Мы засмеялись. Вместе.</p>
<p>Пожалуй, впервые за долгое время мне стало по-настоящему легко.</p>
<p>И в этот момент я понял:</p>
<p>смысл всех этих лет кроется в людях. В тех, кого вернул, стоящих на краю. В тех, кого выслушал. В тех, кто уезжал довольным после обычного вечера с бокалом нашего семейного сингулярного напитка.</p>
<p>Мы не герои. Мы носители тихой судьбы.  Но если хотя бы одна душа живёт тут в этой барокамере под название Земля, где если смотреть в ночное небо, то звезды кажутся нам дырками, чтобы нам было чем тут дышать, значит, ты оставил след, который не заметёт ни снег, ни время, ни даже война.</p>
<p>Архивариусы ещё немного посидели в нашем доме. Тихо, будто листали последние страницы.</p>
<p>И исчезли, оставив после себя ту тишину. Но не пустую, а светлую.</p>
<p>Мы с женой смотрели на снег. Он мягко ложился на ветки сосен за окном и думали только об одном:</p>
<p>если бы каждый человек помог хотя бы одному, мир бы давно стал другим.</p>
<p>Мягче. Человечнее. Живее.</p>
<p>И когда-нибудь, надеюсь, наши дети тоже услышат этот шёпот</p>
<p>о том, что жить нужно так, чтобы другим рядом с тобой становилось теплее.</p>
<p>Как бы ни была холодна зима.</p>
