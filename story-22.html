  <template id="storyText">
    <p>В этом году Пасха пришла рано. 12 апреля 2026-го. Почти на цыпочках. Я проснулся поздно. Не потому что спал крепко, а я под утро просто не спешил вставать.  Телефон уже лежал рядом, как верный сторож, который всю ночь собирал для меня чужие мысли. Сообщений было непривычно много. Viber, WhatsApp… даже там, где обычно тишина и редкие, почти невесомые слова, но сегодня везде был шум.</p>

    <p>Я всегда читаю сообщения. Потому что за каждым сообщением стоит человек. Или, по крайней мере, так хочется верить.</p>

    <p>Но сегодня я листал… и быстро понял: за ними никого нет. Картинки. Крашенки. Пасхи. И подписи одинаковые, как отпечатки штампа:</p>

    <p>«Христос Воскрес!»</p>

    <p>«С праздником светлой Пасхи!»</p>

    <p>«Мира, добра, благополучия!»</p>

    <p>Будто кто-то боялся, что все могут забыть, какой сегодня день и решил себе напомнить. И не один раз. А заодно сразу напомнить всем, но по отдельности.  Иногда кажется, что если собрать все эти сообщения в одну комнату, они начнут поздравлять друг друга и сами себя. И никто даже не заметит отсутствия людей. Со стороны выглядит красиво. Ведь все соблюдали пост. Все ждали. Все очищались. А потом резко так- БАБАХ.</p>

    <p>Разрешено! Можно мясо. Можно яйца. Можно сдобное тесто. И, кажется, снова можно всё остальное… включая старую добрую злобу, зависть и равнодушие. Но сначала открытка. Обязательно. Людей ведь много а ремени мало. И куда проще всего переслать то, что уже прислали тебе.</p>

    <p>Так удобнее жить. Мне однажды так и объяснили:</p>

    <p>— Зачем усложнять? Есть готовое - бери и отправляй. Я тогда не кивнул. Это против моего понимания. А вот сегодня вдруг подумал:</p>

    <p>Господи… а что вы вообще знаете об удобной жизни? Потому что настоящая - она ведь неудобная. В ней нужно думать, чувствовать, выбирать слова. Иногда молчать. Иногда написать одному человеку вместо ста. И, возможно, самое сложное тут это не перепутать праздник с его изображением.</p>

    <p>Хочу поведать историю, которая случилась абсолютно на самом деле. Она совершенно не выдуманная. Речь идет о моем дедушке. Он родился в 1916 году, а из жизни ушел в 1999. Он был инженером летного полка. Обслуживал самолеты, не был пилотом, как мой второй дед, тот был летчиком-истребителем, а этот был начальником над инженерами. То есть он ремонтировал самолеты.</p>

    <p>Война застала его где-то под Брянском, потом его перевели в Молдавию. Там он служил, там же познакомился с моей бабушкой, которая поступила в Одесский медицинский институт в 42-м году, в Кишиневский, переведясь туда через три года обучения в Одесском. Это просто к слову. Она училась при немцах и много чего интересного рассказывала. Это будет отдельная история, о которой я, возможно, расскажу позже. Так вот, когда он был военным, его бросала судьба куда только возможно. Он побывал в оккупационных войсках в Германии, служил в летных полках Молдавии. Потом перевелся начальником военной приемки на военный завод в городе Рыбинск. Сейчас у этого города другое название. И уже оттуда он демобилизовывался.</p>

    <p>Так вышло, что он поехал в Одессу. Он мог остаться в Москве, но перспектива зацепиться там существовала на уровне нескольких процентов. Ему прямо сказали: возможно, два года ты будешь бегать по кабинетам и доказывать свое право на квартиру. Но потом докажешь, но нервы, время. А до этого ему предлагали возглавить ракетные войска где-то на севере России, но моя бабушка уже тогда сильно болела и просто не выдержала бы климат.</p>

    <p>Он не стал цепляться за столицу советского союза. И он со своей семьей переехал в Одессу. И уже тут, будучи демобилизованным, он пошел работать в горисполком, чтобы иметь возможность не просто получить положенную ему по закону квартиру, а иметь выбор, из хотя бы нескольких. Два с половиной года он работал на общественных началах, не получая ни копейки. В итоге квартиру он выбрал и получил. И в этой квартире родился я.</p>

    <p>Но самое интересное свелось к другому. Я, будучи маленьким, видел, чем он продолжает заниматься на тех же общественных началах. Он выписывал поздравительные открытки для ветеранов. У него была огромная пачка таких открыток, которые сегодня, наверное, уже коллекционируют. «С Днем Победы», яркие, красивые. И на каждой открытке с обратной стороны он каллиграфическим почерком, а почерк у него был действительно идеальный, писал поздравление. Индивидуально каждому ветерану по списку. Каждый год. Он не писал под копирку. В каждой открытке было имя и отчество. Он сверял по списку и делал маленький, но личный знак внимания. Потом эти открытки разносились по почтовым ящикам. Он делал это с педантичной точностью. Шариковой ручкой. Хотя очень любил чернильную, с золотым пером. Я помню, как она мне нравилась. Эта ручка. Но он понимал, что открытка без конверта может попасть под дождь, и чернила поплывут. Поэтому выбирал надежность.</p>

    <p>И вот однажды, это я очень хорошо запомнил, спустя годы он получает примерно такую же открытку. От какого-то депутата, который вспомнил, что ветераны еще остались, и решил их поздравить.</p>

    <p>Пришел конверт. Уже не просто открытка. Его нужно было вскрыть. На конверте был адрес, внутри текст, напечатанный на принтере. И стояла подпись синего цвета того самого депутата.</p>

    <p>Он так обрадовался. В глазах было столько счастья от того, что о нем помнят.</p>

    <p>И я тогда его сильно огорчил. Сказал: дедушка, посмотри, это не настоящая подпись. Это просто напечатано. Я наслюнявил палец, потер эту подпись, и она не стерлась. Потому что это были не чернила, а печать. Скорее всего лазерная.</p>

    <p>Он не поверил. Сказал, что такого не может быть.</p>

    <p>Я не стал его переубеждать. А через два дня он получил точно такое же письмо. Один в один.</p>

    <p>И вот тогда я впервые увидел в его глазах грусть. Он понял, что я был прав. Что все поздравления сводились к распечатке стандартного текста, в котором даже не было его имени. Адрес и его имя были только на конверте, иначе письмо просто не дошло бы.</p>

    <p>Вот она - разница. Когда поздравляют от души и пишут рукой, пусть даже обычной шариковой ручкой. И когда отправляют то, что удобно.</p>

    <p>Я не понимаю людей, которые сегодня пересылают картинки из интернета, не потратив даже минуту на то, чтобы написать что-то от себя. Это настолько просто и примитивно, что иногда кажется, будто это отправляет не человек, а программа.</p>

    <p>А может, часть из нас уже и есть программы. Просто мы еще не до конца это заметили.</p>

    <p>А вот теперь вдогонку еще одна история. Возможно, где-то она приукрашена, но в целом она правдивая.</p>

    <p>Один молодой человек, у которого жизнь пошла как-то не туда, понял, что нужно что-то менять. К кому идти, он не знал. И пошел в храм. Во Всенощную. Ночью. Просто потому, что проснулся и почувствовал, что его туда тянет. Он не думал о внешнем виде. Надел то, что было под рукой. Джинсы, футболка. На автомате сунул телефон в карман и забыл выключить звук. Он стоял почти до утра. Слушал, вдыхал, пытался хоть как-то дотянуться до чего-то святого. И в этот момент телефон начал оживать. Сообщения. Одно за другим. Писк. Снова писк. И этот звук начал раздражать не его, а окружающих. Сначала были взгляды. Косые, холодные, оценивающие. Те самые тетушки в платочках, которые, казалось бы, должны были прийти за тем же, за чем и он. Потом в этих взглядах появилось осуждение. Почему не выключил телефон. Как можно. Это же храм. А когда стало светлее, они рассмотрели его одежду. И вот тут уже не сдержались. Реплики. Замечания. Уже не взглядом, а вслух. Не так одет. Не там стоит. Не так себя ведет. И в этот момент телефон зазвонил. Он достал его, попытался быстро сбросить, но случайно включилась громкая связь. И на весь храм прозвучало:</p>

    <p>«Где ты? Почему не дома?»</p>

    <p>Его выгнали.</p>

    <p>Не вывели. Не попросили. Именно выгнали из храма. С тем же чувством правоты, с каким обычно выносят мусор. Он вышел на улицу. Раннее утро. Пусто. И очень хотелось есть.</p>

    <p>Через дорогу была пиццерия. Он зашел. Сонная девушка за стойкой, такой же сонный пиццайоло. Но когда он сделал заказ, они оживились. В глазах появился интерес. Первый клиент. Первый человек в этот день. Первый мужчина. Он сел. Взял кусок пиццы и уронил его на пол. Потом разлил кофе на стол. Возможно, от усталости. Возможно, от той самой ночи.</p>

    <p>И ничего не произошло.</p>

    <p>Никто не посмотрел косо. Никто не сказал ни слова с укором. Они просто улыбнулись. Сказали: ничего страшного, сейчас все уберем. Принесли новый кофе. Подогрели пиццу. Аккуратно вытерли стол.</p>

    <p>А потом принесли маленький маффин. Просто так. Комплимент от заведения.</p>

    <p>И в этот момент он, возможно, впервые за долгое время почувствовал, что он не лишний.</p>

    <p>После этого он стал чаще заходить в пиццерию. Чем в храм напротив. И вот здесь уже никакой иронии. Потому что вопрос на самом деле очень простой.</p>

    <p>Если человеку легче найти принятие в месте, где продают пиццу, чем в месте, где говорят о любви,</p>

    <p>то, возможно, проблема не в человеке.</p>

    <h2>Эпилог.</h2>

    <p>Сегодня слишком легко сказать «с праздником». Настолько легко, что в этих словах почти ничего не остается.</p>

    <p>Мы научились поздравлять, не чувствуя. Верить, не вдумываясь. И быть рядом, не замечая друг друга.</p>

    <p>И, возможно, самое страшное не в том, что мы стали хуже.</p>

    <p>А в том, что нам стало удобно такими быть.</p>
