    <p>Колол я сегодня дрова.</p>

    <p>Тот самый момент, когда лучше, чтобы никто не звонил и не отвлекал. Тогда мир делится на две половины: полено и топор. И больше ничего не существует. Ни новостей, ни политики, ни соседей.</p>

    <p>И вот тут звонок.</p>

    <p>— Лешечка, у меня телефончик заблокировался, можешь глянуть?..</p>
    <p>Конечно. Когда же ещё.</p>

    <p>— Можно подойти?</p>
    <p>— Приходи, — говорю.</p>

    <p>Приходит. Стоит на пороге с видом человека, которому срочно нужна хирургическая операция. Протягивает аппарат. Я уже мысленно готов к разбитому экрану, к вирусам, к банковским мошенникам. Но с телефоном всё в порядке. Заблокирован Фейсбук.</p>

    <p>Не в первый раз.</p>

    <p>Опять что-то ответила. На эмоциях. Впопыхах. Кому-то что-то доказывала, кто даже не человек. Какой-то аватарке без лица, с пустой историей, с набором букв вместо имени. Роботу, проще говоря.</p>

    <p>Она защищала честь и достоинство нашего президента. Серьёзно так защищала. С огоньком. Как маленькая верная собачка, которая искренне считает, что если лаять достаточно громко, то зло отступит.</p>

    <p>Зло не отступает.</p>

    <p>Зато алгоритм срабатывает чётко. Нецензурная лексика. Агрессия. Нарушение стандартов сообщества. Блокировка.</p>

    <p>И вот она стоит у меня на дворе. Дальше идти скользко. Глаза честные. Возмущение искреннее.</p>

    <p>— Но я же права!</p>
    <p>Конечно, права.</p>
    <p>Вопрос только в том, с кем ты споришь?</p>

    <p>С деревом? С забором? С пустым аккаунтом, созданным вчера ради того, чтобы кто-то не выдержал и написал лишнее?</p>

    <p>Есть правило. Старое. Простое.</p>

    <p>«Не кормите троллей».</p>

    <p>Оно работает в интернете так же безотказно, как топор по сухой берёзе. Только никто не хочет им пользоваться.</p>

    <p>В жизни всё иначе. Если к тебе под забор пришли живые люди, начали гадить, кричать, настраивать прохожих — тут да. Бог велел разобраться. Поставить точки. Обозначить границы. Как я порой ей говорю: куда правильнее выстрелить, перезарядить и снова выстрелить в темноту, чем светить туда фонарём и спрашивать: кто там?</p>

    <p>Но в соцсетях под забор приходят не люди. Туда приходит шум. А человек почему-то реагирует на шум так, будто его ударили по лицу.</p>

    <p>Я спрашиваю её:</p>

    <p>— А зачем?</p>
    <p>— Ну как зачем? Надо же ответить!</p>
    <p>Надо. Обязательно надо.</p>

    <p>Если ударился мизинцем о косяк, я понимаю. В этот момент философия заканчивается. Из человека выходит всё накопленное за неделю. Иногда даже за жизнь. Но если ты ударился мизинцем в людном месте, можно ведь улыбнуться? Даже если внутри оркестр играет совсем другую музыку.</p>

    <p>Интернет — это тот самый косяк, о который люди продолжают биться мизинцем. И каждый раз искренне удивляются боли.</p>

    <p>Самое интересное — сколько ни объясняй, сколько ни приводи примеров, внутри всё равно что-то кипит. Какая-то энергия. Странное такое излучение. Желание обязательно что-то сказать. Ответить. Доказать. Отгавкаться, другого слова нет.</p>

    <p>Отгавкаться от пустоты.</p>

    <p>Я иногда думаю: может, человеку просто страшно промолчать? Будто если он не ответит, мир решит, что он согласен. Что он слабый. Что он проиграл. Но мир ничего не решает. Мир даже не заметит. А вот ты заметишь. Когда очередной раз окажешься заблокированным. Когда настроение твоё испорчено. Когда внутри снова эта вязкая злость.</p>

    <p>Колол дрова я. Думал об этом.</p>

    <p>Полено не спорит. Оно просто лежит. Ты его раскалываешь, и оно становится теплом. Если не трогать — останется просто поленом, пока не сгниёт и не превратится в труху.</p>

    <p>Слова — те же дрова.</p>

    <p>Можно бросить их в печь — и станет тепло. А можно кидать в забор. И удивляться, почему он не отвечает. И почему потом болит мизинец.</p>

    <h2>1. Молчание за столом</h2>

    <p>Есть особый тип тишины. Она не спокойная и не умиротворённая, не мудрая. Она вязкая. Такой тишиной иногда молчат многие.</p>

    <p>За большим столом. Скатерть выглажена. Салаты аккуратно разложены. Кто-то уже налил по рюмке, кто-то подливает чай. Разговоры текут, как обычно: политика, цены, дети, «а вот раньше».</p>

    <p>И вдруг фраза. Не крик. Не скандал. Просто небрежное замечание. Про кого-то из близких. Про родственника, например. Про человека, которого любят. Иногда — про них самих. Сказано это с лёгкой усмешкой. С высоты возраста. С видом «я-то пожил, я знаю».</p>

    <p>И все продолжают дальше жевать.</p>

    <p>А ты чуть медленнее уже ставишь чашку на блюдце. Твоё лицо остаётся спокойным, даже, может, улыбнёшься. Кивнёшь и перенесёшь тему разговора.</p>

    <p>Эти люди не спорят. Потому что спор — это конфликт. Потому что «зачем портить вечер». Потому что «ну что я буду доказывать».</p>

    <p>Они, как правило, умные. Они могут ответить так, что у собеседника не останется ни одного аргумента. Но не отвечают.</p>

    <p>И только позже, когда гости уходят, когда стол разобран, когда в доме уже тихо, начинается другое.</p>

    <p>Те же самые слова начинают звучать внутри. Громче, жёстче и, конечно, острее. Мозг прокручивает возможные ответы. Точные формулировки. Спокойные, без хамства. Такие, которые расставили бы всё по местам.</p>

    <p>И каждый раз в этом внутреннем монологе он побеждает.</p>

    <p>Но в реальности человек проигрывает. Потому что проглотил. И это «проглотил» не исчезает. Оно оседает где-то глубоко. Там, где у людей потом начинает болеть голова. Где скачет давление. Где бессонница приходит без приглашения.</p>

    <p>И самое поразительное — он всё понимает. И потом говорит:</p>

    <p>— В следующий раз скажу.</p>

    <p>И наступает следующий раз. Тот же стол. Те же разговоры. И снова тишина.</p>

    <p>Иногда молчание — не достоинство.</p>
    <p>Иногда молчание — это медленно глотаемый камень.</p>

    <h2>2. Люди, которые не могут удержать торт</h2>

    <p>Есть ещё другой тип людей.</p>

    <p>Их не нужно провоцировать. Их не нужно задевать. Им просто что-то рассказали. Новость. Инсайд. Случайную деталь. Чужую тайну.</p>

    <p>И внутри у них начинает расти напряжение. Будто в груди завели моторчик. Им надо. Обязательно надо поделиться. Срочно позвонить кому-то:</p>

    <p>— Ты представляешь?!</p>

    <p>Потом второму:</p>
    <p>— Только никому не говори…</p>

    <p>Третьему. Четвёртому. Случайному встречному и поперечному.</p>

    <p>Им кажется, что они так становятся значимее. Что информация — это власть. Что раз они владеют чем-то «важным», значит и сами становятся важными.</p>

    <p>Но происходит странное.</p>

    <p>С каждым пересказом новость становится менее живой.</p>
    <p>С каждой интонацией — всё более искажённой.</p>
    <p>С каждым «только между нами» — всё более пустой, а иногда и тупой.</p>

    <p>Это как испечь большой, красивый торт.</p>

    <p>С коржами. С кремом. С ягодами сверху. Только достал из духовки, и аромат на весь дом.</p>

    <p>И вместо того чтобы поставить его на стол для близких, ты выходишь с ним на улицу:</p>

    <p>— Хочешь кусочек?</p>
    <p>— И тебе?</p>
    <p>— И тебе тоже…</p>

    <p>Кусочек за кусочком.</p>

    <p>Кто-то уронил. Кто-то не доел.</p>
    <p>Кто-то сказал: «Ну так себе».</p>
    <p>Муха села. Крем потёк. Корж подсох.</p>

    <p>И вот ты возвращаешься домой.</p>

    <p>Голодный.</p>

    <p>А торта нет.</p>

    <p>И самое страшное — для тех, кто действительно мог бы оценить, ты его не донёс.</p>

    <p>Информация — это энергия.</p>

    <p>Когда её раздают без разбора, человек опустошается. После десятого пересказа он уже сам не чувствует вкуса того, что говорил. Остаётся только лёгкая усталость. И странная пустота.</p>

    <p>Иногда самая большая сила — не в том, чтобы сказать.</p>
    <p>А в том, чтобы удержать.</p>

    <h2>3. Точное слово</h2>

    <p>Есть редкое качество.</p>

    <p>Оно редкое, не громкое, не эффектное. Оно совсем не собирает аплодисментов.</p>

    <p>Это способность сказать вовремя. Не раньше. Не позже. Не в эмоции. И не в глухом молчании.</p>

    <p>Я видел таких людей.</p>

    <p>Они не перебивают. Они не вскакивают со стула. Они не доказывают с пеной у рта.</p>

    <p>Они слушают.</p>

    <p>И когда в разговоре появляется что-то кривое — не грубое даже, а именно кривое — они не спешат.</p>

    <p>Пауза.</p>

    <p>Кто-то успевает отпить воды.</p>
    <p>Кто-то начинает нервно шевелить салфетку.</p>

    <p>А они спокойно говорят:</p>

    <p>— Подожди.</p>

    <p>Не «ты не прав». Не «да как ты смеешь». А просто — «подожди».</p>

    <p>И дальше — всего одно предложение. Короткое. Чёткое. Без агрессии.</p>

    <p>Но смысл в нём такой, что спорить уже не хочется.</p>

    <p>Это похоже на хорошо поставленный клинок.</p>
    <p>Не машешь им. Просто показываешь — и втыкаешь.</p>

    <p>Точное слово не унижает. Не раздувает конфликт. Не оставляет осадка.</p>

    <p>Оно возвращает разговор в русло.</p>
    <p>Иногда возвращает уважение.</p>
    <p>Иногда возвращает границы.</p>
    <p>А иногда возвращает самого человека на место.</p>

    <p>И удивительно, но после такого слова не остаётся тяжести.</p>

    <p>Никто не болеет. Никто не чувствует себя раздавленным. Никто не опустошён.</p>

    <p>Потому что энергия не была выплеснута. И не была проглочена.</p>

    <p>Она была направлена.</p>

    <p>Как огонь в печи. Не по стенам.</p>
    <p>Не в занавески. А туда, где он греет.</p>

    <p>Мне кажется, этому невозможно научить теорией. Это не про темперамент. Не про интеллект. Не про возраст.</p>

    <p>Это про внутреннее спокойствие.</p>

    <p>Когда ты не обязан доказывать всем всё.</p>
    <p>Когда ты не боишься паузы.</p>
    <p>Когда ты знаешь, что если надо — ты скажешь.</p>
    <p>И именно столько, сколько нужно.</p>

    <p>Не больше. Но и не меньше.</p>

    <h2>Эпилог</h2>

    <p>Человек всю жизнь учится обращаться со словом.</p>

    <p>Сначала говорить. Потом доказывать. Потом защищаться. Потом молчать.</p>

    <p>И только где-то ближе к зрелости некоторые счастливчики начинают понимать, что слово — это не звук. Это часть тебя.</p>

    <p>Каждое сказанное уходит.</p>
    <p>Каждое проглоченное остаётся.</p>
    <p>Каждое растраченное истощает.</p>

    <p>Мы думаем, что сражаемся за правоту.</p>
    <p>На самом деле мы чаще всего теряем равновесие.</p>

    <p>Иногда нужно промолчать, потому что перед тобой забор.</p>
    <p>Иногда нужно сказать, потому что перед тобой живой человек.</p>
    <p>Иногда нужно удержать, потому что это не новость, а твоя внутренняя энергия.</p>

    <p>И, наверное, вся мудрость не в красноречии.</p>

    <p>А в том, чтобы однажды проснуться и почувствовать: внутри тебя тихо.</p>

    <p>Без непрожёванных обид.</p>
    <p>Без рассыпанных по дороге тортов.</p>
    <p>Без бессмысленных криков в пустоту.</p>

    <p>Просто тихо.</p>

    <p>А значит — тепло.</p>
