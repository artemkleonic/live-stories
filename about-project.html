    <h2>Несколько слов о проекте</h2>

    <p>Иногда книги появляются не на бумаге. Они рождаются гораздо раньше: в разговорах у костра, в дороге, в случайных встречах, в чужих судьбах, которые на какое-то время пересекаются с твоей. Со временем таких историй становится много. Сначала это просто воспоминания. Потом заметки. А потом вдруг понимаешь, что они начинают жить своей жизнью.</p>

    <p>Так и появился этот проект.</p>

    <p>Это не совсем книга в привычном смысле. Скорее сборник живых историй, которые постепенно складываются в одну дорогу.</p>

    <p>Некоторые из них произошли на самом деле. Некоторые почти на самом деле. А некоторые просто родились из наблюдений за людьми и жизнью.</p>

    <p>Я решил публиковать их здесь, в интернете, по мере того как они вспоминаются или происходят.</p>

    <p>Без спешки и без строгого плана, именно так, как это и бывает в жизни.</p>

    <p>Если вы случайно оказались на этом сайте, значит, один из этих рассказов уже нашёл своего читателя.</p>

    <p>А если вам захочется иногда возвращаться сюда и читать новые истории — значит, Рой продолжает жить.</p>

    <p>Добро пожаловать.</p>

    <h2>Почему Рой?</h2>

    <p>В жизни каждого человека иногда случаются трудные периоды. Конечно, у каждого они свои. Для кого-то трагедией может оказаться сгоревший дотла дом, а для кого-то отсутствие пармезана в пицце.</p>

    <p>У меня же это был период переосмысления.</p>

    <p>Я работал тогда в одной страховой компании. Всё, что у меня было на тот момент из имущества, помещалось в багажнике моей машины. Это был вишнёвого цвета почти-джип по имени Opel Frontera.</p>

    <p>В багажнике лежал спальник, с ним вообще связана отдельная история. Две банки тушёнки. Раскладная туристическая лопатка. Газовая туристическая плитка. И ещё одна вещь, которая выбивалась из этого походного набора. Это был отрез ткани для пальто из очень качественного габардина. Его когда-то купил мой дедушка. Ещё в послевоенные годы. Он собирался сменить свою офицерскую шинель на что-то более приличное. Но пальто так и не сшил. Ткань осталась лежать. А потом каким-то естественным образом перешла ко мне. Так и путешествовала вместе со мной.</p>

    <p>Работу в компании я делал довольно быстро. Своего жилья у меня не было. Семьи тогда тоже. Спешить домой было некуда. Поэтому вечерами я просто искал, чем бы себя занять.</p>

    <p>Однажды я открыл Google и ввёл простой запрос:</p>

    <p><strong>«клуб любителей внедорожников».</strong></p>

    <p>Среди результатов появился сайт с живым и довольно шумным форумом. Назывался он Offroadmaster.</p>

    <p>Так как мой Opel всё-таки был почти джипом, то и я себя почувствовал почти джипером.</p>

    <p>Чтобы зарегистрироваться, нужно было придумать себе ник. Кличку. Имя, под которым ты будешь жить на форуме. Я немного подумал и вдруг вспомнил сцену из фильма «Крепкий орешек». Ту самую, где Брюс Уиллис босиком бегает по небоскрёбу, воюя с террористами, и представляется:</p>

    <p><strong>— Рой.</strong></p>

    <p>Что-то в тот момент во мне было с ним схоже. Так я и написал.</p>

    <p><strong>ROY.</strong></p>

    <p>Ник прижился.</p>

    <p>Сначала это было просто имя на форуме. Потом кличка среди знакомых. Потом псевдоним.</p>

    <p>И только спустя годы я понял, что слово это оказалось удивительно точным.</p>

    <p>Рой, в нашем понимании, это ведь не просто куча пчёл. Это состояние.</p>

    <p>В рое нет одного центра управления. Но при этом он движется как единый организм. Каждая пчела делает своё дело, а вместе получается система.</p>

    <p>Похожим образом устроена и жизнь человека. Мысли, воспоминания, разговоры, случайные встречи, книги, дороги, друзья, охоты, ошибки, открытия — всё это постепенно собирается в рой историй.</p>

    <p>Иногда этот рой гудит тихо и спокойно. Иногда тревожно и громко. Но именно из него и рождаются тексты. Каждый рассказ — это как отдельная пчела. А вся книга — как улей. И если прислушаться, то внутри него всегда слышен один и тот же звук.</p>

    <p><strong>Гул жизни.</strong></p>

    <p>Так что теперь «Рой» — это уже не просто старый ник из интернета. Это способ смотреть на мир.</p>

    <h2>История одного спальника</h2>

    <p>В багажнике моего вишнёвого Opel Frontera лежал спальник. Купил я его в Одессе, на Седьмом километре. Камуфляжный, добротный. Главное его достоинство заключалось в том, что он легко превращался в двуспальное одеяло. Покупался он для вполне понятных целей: охота, рыбалка, сырые прохладные осенние ночи у костра.</p>

    <p>Он не был особенно толстым и тяжёлым, но своё дело выполнял чётко.</p>

    <p>И вот однажды в моей жизни произошёл довольно серьёзный поворот. Мне поступило предложение открыть с нуля центр МРТ в Киеве. Когда перед человеком возникает подобная задача, он первым делом думает не о стенах и не об аппаратах. Он думает о людях.</p>

    <p>И я сразу вспомнил Ирину Леонидовну Воронину. Она тогда курировала херсонское отделение страховой компании, где мы вместе работали. Каждый раз, когда мы встречались, она говорила мне почти одними и теми же словами:</p>

    <p><strong>— Заберите меня в Киев. На любую должность, на любую работу.</strong></p>

    <p>История у неё была, мягко говоря, необычная. Она была попадья. Самая настоящая.</p>

    <p>Её муж был батюшкой — священником с небольшим приходом где-то в окрестностях Херсона. Помимо служения он ещё ловил рыбу и довольно успешно её солил.</p>

    <p>Жили они очень скромно. Денег было немного. Страховая компания тоже не баловала большими доходами. Поэтому Ирина Леонидовна была готова на любую подработку. Когда мне предложили запускать центр МРТ, я сразу вспомнил о ней.</p>

    <p>Она приехала в Киев первым же поездом. Я встретил её на вокзале. Первое, что мы сделали — купили ей раскладушку.</p>

    <p>Поселилась она прямо в помещении будущего центра. Там только-только закончился ремонт, пахло свежей краской и штукатуркой. Ирина Леонидовна заняла кабинет, где в будущем должен был разместиться УЗИ. Там у неё появилась маленькая келья. На стене — небольшой иконостас. В углу — аккуратно заправленная раскладушка. На подоконнике — чайник и несколько кружек. И свеча.</p>

    <p>Всё было удивительно чисто, спокойно и как-то сразу правильно.</p>

    <p>Это был лучший сотрудник, которого я когда-либо встречал. Такой светлой и чистой души человека я больше в жизни не видел. Она буквально излучала доброе настроение. Работала за троих: была и администратором, пока ещё никого не наняли, и моим помощником, и сторожем, и даже поваром. Готовила она, кстати, превосходно.</p>

    <p>Через некоторое время в Киев приехал батюшка. И тут возникла небольшая бытовая проблема. На раскладушке вдвоём им разместиться было уже невозможно.</p>

    <p>Ирина Леонидовна однажды подошла ко мне очень осторожно и сказала:</p>

    <p><strong>— Может быть, у вас найдётся что-нибудь… двуспальное?</strong></p>

    <p>И тут я, конечно, вспомнил про свой спальник.</p>

    <p>Тот самый. Одесский. Камуфляжный. Который легко превращался в двуспальное одеяло.</p>

    <p>Так он и перекочевал из багажника моей Фронтеры в маленькую келью в кабинете будущего УЗИ.</p>

    <p>Иногда я думаю, что мой спальник прожил довольно интересную жизнь.</p>

    <p>Сначала он должен был греть меня у костров на охоте и рыбалке. А в итоге стал семейным ложем священника.</p>

    <p>Так что теперь этот спальник, можно сказать, почти святой.</p>

    <p>Почти как плащаница. И каждый раз, когда я теперь вижу этот спальник, я думаю: некоторые вещи становятся святыми совершенно неожиданно.</p>

    <h2>О вещах и историях</h2>

    <p>Иногда самые обычные предметы проживают вместе с человеком целую жизнь. Сначала они появляются случайно. Куплены на рынке, подарены друзьями или просто оказываются под рукой в нужный момент.</p>

    <p>Сначала это просто вещь. Но проходит время, и она начинает впитывать в себя события, людей, дороги, разговоры и воспоминания.</p>

    <p>Так постепенно обычный камуфляжный спальник, купленный когда-то на одесском Седьмом километре для охоты и рыбалки, может вдруг оказаться семейным ложем священника.</p>

    <p>И тогда понимаешь, что некоторые предметы становятся почти святыми не потому, что так было задумано, а потому что через них проходит жизнь.</p>

    <p>Со временем я начал замечать, что похожая судьба бывает не только у вещей. Иногда так происходит и с историями. Сначала это просто случайный эпизод из жизни. Потом воспоминание. Потом рассказ, который ты однажды пересказываешь друзьям. А через какое-то время таких историй становится много. Они начинают собираться вместе, как пчёлы в улей.</p>

    <p>Так и появился этот проект.</p>

    <p>Здесь собраны простые жизненные рассказы, иногда смешные, иногда странные, иногда совсем тихие. Но у каждого из них есть одно общее свойство: они прожиты по-настоящему.</p>

    <p>И если со временем какая-то из этих историй станет для кого-то таким же тёплым и настоящим воспоминанием, как мой старый спальник, значит, этот Рой появился не зря.</p>
