<!-- ТЕКСТ -->
<template id="storyText">
<p>I have a toast that I save for special moments.</p>
<p>I never say it at the beginning of a gathering. At first, people are always in a hurry to live. They sit with stiff faces, taste the food, laugh too loudly, speak about nothing important. I wait.</p>
<p>I wait for the wine to warm them from within.</p>
<p>For conversations to become honest.</p>
<p>For that quiet depth to appear in their eyes — the depth where real things can finally be spoken aloud.</p>
<p>And then I raise my glass and speak about time.</p>
<p>When I was still in school, my best friend had a father who worked at sea. He was a sailor, the chief radio officer on a cargo ship. A broad man with a beard, a striped naval shirt, and those tiny wrinkles near the eyes that only appear in people who have truly seen the world.</p>
<p>He came home rarely. Always unexpectedly. Always carrying flowers.</p>
<p>And people waited for him.</p>
<p>The table would be set before he even arrived, as if the house itself somehow sensed his return. I loved visiting them during those days. He carried distant countries inside him like the scent of salt trapped in old wood. And yet he loved coming back home more than all the places others dreamed of escaping to.</p>
<p>As if he had discovered something out there — and realized that home was still better.</p>
<p>One day, he brought back a shotgun from Turkey. Smuggled. Lightweight. Beautiful. Twelve-gauge steel polished so perfectly it looked unreal.</p>
<p>To me, it was treasure itself.</p>
<p>I stared at it with trembling hands like a boy staring at a relic from some forgotten legend. My heart beat so hard it felt ready to leap from my chest just to touch the metal.</p>
<p>All the treasures from adventure novels suddenly seemed worthless beside it.</p>
<p>But he looked at the gun differently.</p>
<p>Not with excitement.</p>
<p>With sadness.</p>
<p>As if he wasn’t looking at a weapon at all, but at time already lost.</p>
<p>I didn’t understand it back then.</p>
<p>Later, I did.</p>
<p>He had spent too many years trying to reach that dream. Work. Noise. Fatigue. Health. Responsibilities. Friends who disappeared one after another. Life had quietly taken its payment.</p>
<p>The shotgun arrived only after the season for it was already gone.</p>
<p>My first hunting gun came a few years later.</p>
<p>And it came on time.</p>
<p>I managed to live through it fully:</p>
<p>the cold river wind against a speeding boat,</p>
<p>the smell of wet forests,</p>
<p>the breathing of northern swamps,</p>
<p>the sharp crack of ice beneath my boots,</p>
<p>the trembling anticipation before dawn.</p>
<p>I even wrote a story about those days later on.</p>
<p>Because some things in life bloom only during their own brief season.</p>
<p>Not “someday.”</p>
<p>Now.</p>
<p>You should hug your child while they still climb into your arms on their own.</p>
<p>You should kiss your wife while she still walks toward you instead of away from you.</p>
<p>You should travel while your eyes still burn with curiosity, not when you finally “find the time.”</p>
<p>You should sit and drink tea with a friend today — because tomorrow may quietly disappear for one of you.</p>
<p>Time is a strange currency.</p>
<p>You cannot earn more of it.</p>
<p>You cannot borrow it back.</p>
<p>You cannot store it safely away for later.</p>
<p>And yet we keep postponing life as if we have endless reserves hidden somewhere.</p>
<p>We tell ourselves:</p>
<p>later,</p>
<p>next year,</p>
<p>when things calm down,</p>
<p>when there is money,</p>
<p>when there is time.</p>
<p>But sometimes the safe opens already empty.</p>
<p>Fifteen years ago, I bought myself a floating summer house — a small yacht-like river cabin I had once seen belonging to an old acquaintance of mine, a lawyer from another story I wrote.</p>
<p>I fell in love with it instantly, like a child staring into a toy store window.</p>
<p>I paid an absurd amount of money for it. Bargained over every dollar. Lost anyway. Then spent another fortune restoring it.</p>
<p>The workers transformed it into something beautiful within a month. Smooth wood. Warm lacquer. Reflections dancing on black evening water.</p>
<p>Meanwhile the neighbors built theirs slowly with their own hands. Hammering late into the evenings. I’ve already sold mine long ago, but sometimes I still hear those echoes inside my memory.</p>
<p>That boat became an entire chapter of life.</p>
<p>Bare feet on warm wooden boards.</p>
<p>The smell of grilled meat and river water at sunset.</p>
<p>Friends laughing somewhere on the deck while the shoreline dissolved into darkness.</p>
<p>We did not simply spend time there.</p>
<p>We lived inside it.</p>
<p>Later I sold it for nearly three times less than what I had invested.</p>
<p>Some would call that stupidity.</p>
<p>But sailors have a saying:</p>
<p>the two happiest days in a yacht owner’s life are the day he buys the yacht and the day he sells it.</p>
<p>The money came and went.</p>
<p>But the time remained.</p>
<p>And it turned out to be worth far more.</p>
<p>Had I bought it later, there would have been no such summers. No sunsets. No youth left to place inside those memories.</p>
<p>I arrived exactly on time for that chapter of life.</p>
<p>And life rewarded me for it.</p>
<p>I once had another friend.</p>
<p>Even in school, he had no interest in studying. By eighth grade he was already selling crayfish to passengers at a railway station while everyone else sold sunflower seeds and cheap beer somewhere near the market.</p>
<p>He stood out immediately.</p>
<p>He smelled of money, ambition, cheap deodorant, and danger.</p>
<p>Later he became an industrial climber, building mobile communication towers high above cities, hanging over rooftops like a bird of prey above concrete streets.</p>
<p>Money flowed fast.</p>
<p>So did life.</p>
<p>But youth and health never announce the day they decide to leave.</p>
<p>And one day his hands could no longer hold the climbing carabiner steadily.</p>
<p>That was when life demanded payment.</p>
<p>He had spent years selling the most valuable thing he owned — himself.</p>
<p>There were no savings.</p>
<p>No business left.</p>
<p>No future carefully built beneath the exhaustion.</p>
<p>His wife left with the child. Alcohol replaced meaning. Then even the traces of him slowly disappeared, as if time itself had quietly switched off the light.</p>
<p>Everything in life must happen at the right moment.</p>
<p>The worst tragedy is when a person trades health for money instead of building a future while strength still gives them the chance.</p>
<p>And still we continue believing in “later.”</p>
<p>Later we will travel.</p>
<p>Later we will call.</p>
<p>Later we will begin living properly.</p>
<p>But “later” is the greatest lie time has ever invented.</p>
<p>Tomorrow is only a version of today that nobody promised us.</p>
<p>So hug your child now.</p>
<p>Kiss your wife now.</p>
<p>Pour tea for your friend while there is still someone to place a second cup beside.</p>
<p>Dreams, rivers, hunts, love, youth — they all belong to a season.</p>
<p>And seasons do not wait for us forever.</p>
<p>Life is happening right now.</p>
<p>At this exact moment, while your eyes move across these lines.</p>
<p>And if you’ve made it this far, then perhaps my toast has already reached you.</p>
<p>So raise your glass.</p>
<p>To time.</p>
<p>While it is still yours.</p>
