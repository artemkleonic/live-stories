<h2>Пролог</h2>
<p>В юности человеку кажется, что выбор это что-то простое. Выбрать велосипед. Куртку. Музыку в наушниках. Место, где провести лето. Позже всё становится тяжелее. Где жить. Кого любить. Кому верить. За что отвечать. А иногда, кем стать для других людей. Медицинский институт тоже был выбором. Но тогда, в семнадцать лет, это казалось скорее красивой идеей, чем дорогой длиною в жизнь. В таком возрасте мало кто вообще понимает, что делает. Нам кажется, будто впереди бесконечность и любую ошибку можно будет исправить потом. Но однажды наступает день, когда «потом» заканчивается. И вот ты стоишь с дипломом в руках. Уже не студент. Ещё не врач. Где-то между двумя мирами. А впереди выбор. Первый и настоящий. Не про деньги. Не про отпуск И не про удобство. А про судьбу. Только со временем приходит та самая мысль. А что, если мы никогда не выбирали сами? Что, если жизнь аккуратно ведёт нас по коридорам, которые были построены задолго до нашего рождения? Через случайных людей. Через ошибки. Через любовь. Через потери. И всё происходящее не наказание и не награда. А урок.</p>
<h2>Одесский медицинский</h2>
<p>Иногда кажется, что жизнь ломается где-то на фронте. Или в реанимации. Или в тот момент, когда тебе впервые выносят  диагноз, от которого уже точно не отмахнуться. Это неправда.</p>
<p>Жизнь ломается тихо. Порой, без выстрелов и без криков. Иногда прямо в деканате одесского медицинского института.</p>
<p>Я долго считал, что всё у меня шло правильно. Школа, вуз, белый халат, запах формалина в учебных классах анатомки, похожих на мясные ряды привоза. и ощущение, что ты вроде как стоишь на правильной стороне жизни. Мы тогда были уверены, что медицина это точно про смысл. Про помощь. Про движение вперед и вверх. Про будущее. Но при этом, нас никто не учил одному простому и важному уроку. После института ты больше никому не нужен. Хотя, если подумать, то и в самом институте тоже, но там ты еще птенчик, и за тобой как-никак присмотрят. А вот как оперишься, точно получишь под зад коленом и вылетишь из гнезда не случайно, а целенаправлено. Конечно, находились те, кто цеплялся своими не окрепшими лапками за стены альма-матер. Хватался за кафедру, и маленький клювик птенчика потихоньку вырастал в мощный, изогнутый как коготь медведя, клюв какой-то хищной птицы. Но в большинстве случаев, студенты-выпускники, получив в руки долгожданный диплом, разлетались в стороны, как осколки от тяжелой хрустальной вазы, однажды упавшей на пол.</p>
<h2>Начало пути</h2>
<p>Есть распределение. И есть ты. И деканат, который формально все это курирует.  Я не был ни лучшим, ни худшим. Обычный студент одесского мединститута, который вовремя сдавал экзамены и не задавал тех самых лишних вопросов. А ведь именно лишние вопросы как раз имели тогда ключевое значение. Да и сейчас от них много чего зависит, особенно от тех, кто знает на них ответы.</p>
<p>Я честных шесть лет отучился в этом поистине легендарном вузе и даже не допускал мысли, что со мной может произойти что-то странное и нелепое, к чему я совершенно не был готов. А приходит это «что-то» всегда тихо и неожиданно, и часто со знаком минус, но бывают курьезы, когда оно со знаком плюс. Вот например. Помню я экзамен по дерматологии. Так вышло, что я не вел конспект. Совсем. Ну не записывал я изречения маленького седого человека с залысиной и табличкой на двери своего кабинета - заведующий кафедрой. А профессор был очень ревнив к своим цитатам и принимал экзамен исключительно и только по своему конспекту. Мне предрекали «банан», ну максимум тройку с натяжкой. Ситуация критическая. Своего конспекта нет и никогда не было, чужого не достать. Времени на подготовку к экзамену пять дней. Учебник по этим кожным и венерическим болезням был размером с первый том «Война и мир». А читать его и смысла нет. Спасение лишь одно и предельно очевидно - конспект лекций профессора! Но его нет и не будет.</p>
<p>И тут я вспоминаю про толстый еще бабушкин двухтомник «внутренние болезни» издания 1953 года с пожелтевшими страницами и потрепанным переплетом. В него вместилась вся медицина от А-кушерства до Э-пидемиологии.</p>
<p>Вся Д-ерматология занимала в нем страниц сорок, не больше. За эти пять дней я просто выучил их наизусть. То есть все, что там было написано, прочитав и запомнив даже то, что было помечено звездочками и потом шло мелким шрифтом внизу страницы.</p>
<h2>Экзамен</h2>
<p>Вот тут то мне и задают вопрос. Из конспекта. Все. Это как мина, на которую ты уже наступил. И ногу оторвет сразу, как только ты сделаешь шаг. А ответ на этот вопрос был там, внизу на одной из тех страниц, со звездочкой. Конечно я его знал. Я выпулил  ответ на одном дыхании и получил ПЯТЬ!!! Такое бывает? Чудо, скажете вы? Возможно. Или кто то сверху смотрит в этот момент и тихо посмеивается, толи над тобой, толи над профессором, толи над всем этим учебным процессом. Я пролетал так все экзамены, даже государственные. Вроде как кто-то меня вел за руку. Правда, всегда готовился к ним с особой тщательностью и трепетом, и конечно со шпаргалками и нервами.</p>
<p>Шпаргалки у меня были особенные. Почти произведение искусства. Это были аккуратно вырезанные листочки из тетради в клеточку размером примерно пять на восемь сантиметров. Тонким простым карандашом на них был нанесён текст такой плотности, что с трех метров они казались чистыми. Три строчки спокойно помещались в одной клетке. С обеих сторон эти микроносители информации содержали краткий конспект целого цикла лекций или всего учебника. Всего таких листочков было около сорока. Двадцать лежали в правом кармане халата. Двадцать в левом. А в нагрудном кармане находилось оглавление. Система была безупречной и театрально отработанной.  Получив билет, нужно было спокойно прочитать вопрос, достать из нагрудного кармана маленький листочек с оглавлением, который идеально сливался с обычной бумажкой на столе и не вызывал у преподавателя никаких подозрений. После этого оставалось только определить номер нужной шпаргалки, мысленно пересчитать листочки в кармане и аккуратно извлечь необходимую информацию. Тут главное не сбиться при счете. Один не верный выбор и вся система рухнет.  По сути, это была аналоговая поисковая система задолго до появления Google. Пользовался я ими редко. Парадокс заключался в том, что пока пишешь такой конспект, запоминаешь материал почти полностью. Поэтому шпаргалки чаще служили не для спасения, а для моральной поддержки. Иногда только подсмотреть какую-нибудь формулу, не перепутать дозировку или вспомнить латинский термин, который в обычной жизни не произносил даже преподаватель. Но сама технология работала идеально. Сегодня, думаю, мало кто станет заниматься подобим безумием. Экзамены изменились. Да и сама философия подготовки тоже. Сейчас во многих местах достаточно выбрать один правильный вариант из четырёх предложенных. Даже если ты ничего не знаешь, вероятность случайно попасть в правильный ответ уже двадцать пять процентов. И ведь речь идёт не о викторине в телевизоре.Речь идёт о медицине. Удивительная всё-таки вещь этот современный экзамен.</p>
<p>Впрочем, это уже совсем другая история.</p>
<h2>Распределение</h2>
<p>А потом началось распределение.</p>
<p>Есть старая формула: держись подальше от начальства и поближе к кухне. В институте я её соблюдал почти безупречно. Деканат для меня существовал где-то отдельно, как орган управления, который лучше лишний раз не тревожить. Как другая планета, где живут такие люди, которые тебе и расписание составят и стипендию начислят, но будоражить их глупыми вопросами не стоит. И вот, за полгода до выпуска я очень сильно опоздал на это пресловутое предварительное распределение.</p>
<p>Не трагедия, как мне тогда казалось. Но для системы это был сбой в работе, это было почти личное оскорбление. Первая встреча с замдекана получилась короткой и запоминающейся. Он не разговаривал он орал. Жестами. Голосом. Интонацией.</p>
<p>И в какой-то момент, уже не сдерживаясь, бросил в меня:</p>
<p>— Поедешь в Володарск-Волынский. Будешь там врачом общей практики. Все. Решение обжалованию не подлежит.</p>
<p>Я был там однажды. На охоте. Примерно 30 лет спустя. Там не было даже дорог.</p>
<p>Точнее, они были, но только для тех, кто ездит на телеге. С конякой вместо мотора.</p>
<p>И тогда я впервые понял, что распределение это не твой выбор.</p>
<p>Это направление. На которое ты не влияешь. Но, через несколько месяцев всё изменилось.</p>
<p>Подползали ГОСы. Начиналась страда государственных экзаменов. Это у технарей - время дипломной работы. Тут в медицинском своя «концессия». Мы собрались с ребятами и сами пришли в деканат. Предложили заключить договор. Так сказать взаимовыгодный - помощь с логистикой. Возить экзаменаторов. И не просто возить, а на своем личном транспорте. Чтобы они никуда не опаздывали и были всегда в форме. По иронии, мне достался он. Тот самый замдекана. И я возил его на своей старой «вишневой восьмерке» с экзамена на экзамен, по городу и за город, по кафедрам и по кабакам и по другим злачным местам Одессы.</p>
<p>Между делом мы заезжали туда, куда студенты обычно не заходят.</p>
<p>Там он доставал вино - настоящее. Нет. Не в бутиках, а с огромных, размером с дом бочек винсовхоза. Виноматериал, заготовленный заранее для одесского завода шаманских вин, ценился крайне высоко, и мы разливали его у меня в гараже по пластиковым бутылкам для всех тех, кто по его мнению его заслуживал.</p>
<p>При этом он говорил. Не как начальник, а уже как человек со своим личным шофером. Про систему. Про распределение. Про то, как на самом деле принимаются решения. И в какой-то момент я поймал себя на странной мысли: я начал его понимать. Не принимать сказанное, а именно понимать.</p>
<p>Когда пришло время окончательного распределения, у меня уже был выбор, который можно было “договорить”. Связи. Отношения. Нужные слова в нужном месте. И даже пару тех самых пластиковых бутылок с вином, которые мне заслужено были переданы лично им и еще не успели прокиснуть.</p>
<p>И я мог этим воспользоваться. Еще как мог, но не стал. Потому что подумал: если я сейчас пойду этим путём, это же будет уже не мой выбор? И я сделал шаг в сторону.</p>
<p>И в этот самый момент я впервые почувствовал, что меня не ведут, меня расставляют. Как мебель. Только не те, что сверху, архивариусы тихих судеб, а вот эти. Местные. Что тут. Что пониже.</p>
<p>Идея поступать в медицинский не была ни моей мечтой, ни призванием. Она просто появилась. Я хотел быть химиком.</p>
<p>Не “думал об этом”, а именно хотел всерьёз. Химию я знал лучше школьного преподавателя и учил её не по учебникам, а по рукописям самого Менделеева. Они до сих пор у меня сохранились. Мне это было очень интересно. Где-то в восьмом классе я впервые заметил, что этот интерес не случайный. А уже в девятом-десятом начал всерьез готовиться… в медицинский.</p>
<p>Потому что мама тогда сказала простую вещь: врач может не разбогатеть, но голодным точно не останется.</p>
<p>А химик? Где ты будешь работать? Дышать парами кислот на гальванике? Или травить себя промышленными удобрениями? Тогда это звучало убедительно. Очень убедительно, да и авторитет умной женщины не вызывал никаких сомнений.</p>
<p>Я с ней не спорил. Я просто сменил траекторию.  Готовился каждый день. Три экзамена: биология, химия, сочинение. Сочинения я писал без усилий, на носовом дыхании. Химию знал. Биологию дотянули. Да еще так дотянули, что весть первый год в Медине я повторял биологию только по своим школьным конспектам.</p>
<p>Конечно я поступил.</p>
<p>Не блестяще, три четверки при проходном одиннадцать. Но этого оказалось достаточно.</p>
<p>И дальше началась та самая “нормальная жизнь”, о которой потом вспоминают с улыбкой.</p>
<p>Сессии, друзья, ощущение, что ты на своём месте.</p>
<p>Я ни разу не задал себе вопрос, что будет потом? Это и была моя ошибка.</p>
<p>Потому что после института нет “потом”. Есть сейчас и есть распределение.</p>
<p>Если ты заранее не договорился, не встроился, не нашёл себе точку нового отсчета жизни, тебя уже не спрашивают. Тебя расставляют, как удобно им. И в какой-то момент я это ощутил. Резко. Не драматично. Но без розовых соплей.</p>
<p>Просто стало ясно: кроме меня за мою жизнь думать никто не будет. Я начал искать выход. Он нашёлся быстро и почти случайно. К нам приехал полковник-вербовщик охотник за головами. Из Украинской военно-медицинской академии. Я написал рапорт. Не раздумывая. Это был не шаг вперёд. Это был еще один шаг в сторону. Два года в академии.</p>
<p>Неврология. Новые люди.</p>
<p>Иллюзия, что теперь всё под контролем. Такой себе анальгетик при перетоните.</p>
<p>Но контроль это тоже иллюзия. После академии было то же самое распределение. Только жёстче. Потому что теперь ты в погонах. И решения принимают люди, у которых эти погоны тяжелее твоих.</p>
<p>Там уже не предлагают. Там приказывают. Но мне снова повезло. Мне дали выбор. Два варианта. Я выбрал тот, который показался мне менее плохим. Через три месяца я понял: здесь можно прожить жизнь и ничего в ней не сделать.</p>
<p>Позже, я вернулся туда, куда меня швырнула жизнь. Посмотреть. Спустя годы. Посмотреть, как там? А там уже были руины и всего один человек, который меня узнал, вспомнил и провел экскурсию по моим местам боевой славы. Я зашел в ту самую палату номер 6, в которой я жил, и даже не смог пройти мимо того самого объекта, который у военных не делится на М и Ж,  перед дорогой назад. И вот тогда я ясно увидел, как выглядел бы мой вариант будущего.</p>
<p>Уволиться из армии тогда было почти невозможно. В нашей части был стоматолог. Он пил. Не “иногда”, а беспробудно. Дежурил по медсанбату пьяным, засыпал в солдатской кровати. Однажды даже обмочился и проспал всё, что только можно было проспать.</p>
<p>И его не увольняли. Даже по служебному несоответствию.</p>
<p>Потому что зубы дергать было бы некому. Иногда он приходил в себя, и тогда в его кабинете снова начинала жужжать бормашина, как знак, что система всё ещё живет и работает.</p>
<p>Если человек не хотел служить, его не отпускали. Его ломали. Не всегда буквально. Но достаточно, чтобы он перестал задавать вопросы. Те самые неудобные вопросы, и далеко не всегда тем самым людям, которые знают на них ответы. Меня не сломали.  Мне просто хватило трёх месяцев. Я понял: здесь можно прожить жизнь , и не прожить её. Мой непосредственный начальник это тоже понимал. Нет, не командир, а невролог из госпиталя повыше. Молодой, перспективный, местный, с погонами, которые нужно было защищать от тех, кто младше по званию. Я же был для него риском. Уверенно смотрящим ему в затылок.</p>
<p>И он… помог. Не из доброты.</p>
<p>Из расчёта. На моё место можно было поставить кого-то, куда более безопасного. Того самого, кто не будет мешать. И не будет носить погоны.</p>
<p>И я ушёл. И впервые за долгое время вдохнул. Свобода - это не слово. Это воздух. Он реально пахнет иначе. Его можно втянуть в лёгкие и не верить, что это не сон. Птицы звучат громче. Шаг становится легче. И ты вдруг понимаешь, что всё это время дышал вполсилы. А потом я заметил одну вещь. Когда я жил “своей” жизнью, я не болел. Меня как будто что-то подпитывало. Силы приходили откуда-то сами. Я мог пройти десятки километров и почти не уставать. Но стоило мне свернуть не туда, тело начинало ломаться. Серьёзно и без предупреждений. Корь во взрослом возрасте с реанимацией. Флегмона ноги с операцией. Менингоэнцефалит после контакта с пациенткой.</p>
<p>Каждый раз, как будто кто-то сверху говорил: “Не туда идёшь.”</p>
<p>Я не знаю, есть ли у этого объяснение или нет, но совпадений было слишком много, чтобы их игнорировать.</p>
<p>Система меня списала быстро.</p>
<p>Непригоден к военной службе в мирное время. Формулировка сухая. Почти равнодушная. Заболевание, ДА, связано с прохождением воинской службы. И все. Точка. Личное дело захлопнулось.</p>
<p>Я не спорил. Потому что к этому моменту уже понял: иногда тебя не выталкивают, тебя отпускают.</p>
<p>Я восстановился быстро.</p>
<p>Стоило начать жить своей жизнью, как тело снова стало работать, как надо. Появилось дело, которое сначала было просто увлечением. Потом оно стало чем-то большим. Медицина осталась. Но уже не как единственный путь к существованию.</p>
<p>Я начал замечать странную вещь: людям иногда важнее не лечение. Им важнее, чтобы с ними поговорили. Чтобы их услышали. Чтобы рядом был кто-то живой. И в какой-то момент я поймал себя на мысли, что делаю для них не меньше, чем раньше. Просто делаю это иначе.</p>
<p>А потом пришла война. И всё снова стало похоже на тот самый выбор, которого на самом деле нет.</p>
<p>Я вижу, как люди идут туда, куда когда-то мог пойти я. И понимаю, чем это может закончиться. А иногда их туда тащат силой. Раньше я бы сделал шаг. Сейчас нет. Не потому что не могу. Потому что знаю цену. Это не смелость. И не трусость. Это опыт.</p>
<p>Хирурги знают.</p>
<p>Иногда правильное решение не идти на операцию тогда, когда риски от её проведения выше, чем не делать ничего. Остановиться.</p>
<p>Посмотреть, куда ведёт дорога. И признать, что ты уже там был.</p>
<p>И вот здесь начинается самое неприятное.</p>
<p>Потому что никто не скажет тебе, правильно ли ты поступаешь. И никто не возьмёт на себя ответственность за этот выбор. Ты остаёшься с ним один. И живёшь с этим дальше. С пониманием.</p>
<h2>Эпилог</h2>
<p>Если ты сейчас читаешь это и ищешь ответ, то его нет. Никто не придёт и не скажет, как правильно. Ни командир. Ни врач. Ни тот, кто “уже прошёл”.</p>
<p>Все они расскажут только свою историю. Но жить тебе придётся своей. Ты можешь пойти туда, куда страшно. Можешь остаться. Можешь сделать шаг в сторону.</p>
<p>Любое решение будет иметь цену.</p>
<p>И самое неприятное, ты узнаешь её только потом. Не сейчас. Не в момент выбора. А когда уже нельзя будет ничего изменить.</p>
<p>Это и есть вся правда.</p>
<p>Никто за тебя не решит.</p>
<p>И никто за тебя не ответит.</p>
<p>Ты останешься с этим один.</p>
<p>И дальше, либо живёшь с этим спокойно, либо объясняешь себе всю жизнь, почему ты сделал это свой выбор именно так.</p>
<p>Другого варианта нет.</p>
