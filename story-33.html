    <p>Смеркалось.</p>

    <p>Молодой месяц уже вышел, но звёзд на небе ещё не было. Конец рабочего дня. Два архивариуса уже собирались закрывать свой офис.</p>

    <p>Один высокий, сухой, с вечной привычкой протирать невидимые очки и выравнивать стопки бумаг, даже там, где стопок не было.</p>

    <p>Второй круглый, мягкий, из тех, кто считает, что порядок, конечно, должен быть, но при этом он не должен мешать жизни.</p>

    <p>Отчёты сданы. Долгов нет. Жалоб ноль. Да и кто будет в ночь перед Рождеством жаловаться?</p>

    <p>Редкая, почти забытая тишина вокруг.</p>

    <p>— Ну что, — сказал круглый, натягивая свой плащ, — дня на два-три можно отойти от дел?</p>

    <p>Плащ его стройнил и прятал небольшой, выдающийся вперёд животик.</p>

    <p>— Можно, — согласился сухой. — Мир стоит. Ад работает без выходных. Рай… ну, рай всегда вроде как со всем справляется. Уходя, зажигаем им звезду. Люди  её там уже заждались. Да и день начнёт сразу прибавляться.</p>

    <p>И тут внезапно - ТУК.</p>

    <p>Не стук в дверь или в стену, а именно тук. Как будто звук из телефона, когда пришёл аванс, но совсем другой - не звонкий, но характерный. Вежливый, чтоли и настойчивый. Приглушённый.</p>

    <p>Чего-чего, а получить письмо в это время уж никто ге ожидал.</p>

    <p>От конверта исходил то ли пар, то ли дым и запах какого-то дорогого мужского парфюма. В эту же секунду от него отделился маленький светящийся лоскуток и поднялся чуть выше уровня глаз того, что был в плаще, и на мгновение застыл в воздухе.</p>

    <p>Круглый хотел прихлопнуть его, как моль, но плащ помешал, он промахнулся, и лоскуток исчез.</p>

    <p>Сухой посмотрел на него удивлённо.</p>

    <p>— Решил, что они не узнают, что мы его получили? Не тот случай. Тут что-то явно важное.</p>

    <p>Заказное письмо лежало на столе с аккуратной точностью, будто его положили и трижды поправили.</p>

    <p>Корешок с уведомлением о доставке растаял в воздухе, а его ровный след на конверте говорил о том, что новое дельце возникло ниоткуда, но решать его нужно немедленно.</p>

    <p>Печать красная, гербовая, в форме глаза с вертикальным зрачком, будто смотрела сквозь них, не оставляя никаких шансов.</p>

    <p>Отправитель: Отдел котлов и сопутствующих мучений.</p>

    <p>— Черти… ! — вздохнул круглый.</p>

    <p>Он снял плащ и повесил его обратно.</p>

    <p>Письмо вскрыли уже сидя.</p>

    <p>Потому что стоя такое читать было нельзя.</p>

    <p>«…сообщаем, что командированный к нам ваш практикант - ангел, имя прилагается, начал систематически вмешиваться</p>

    <p>в устоявшиеся адские традиции…»</p>

    <p>— Молодой ещё, — пробормотал круглый.</p>

    <p>— Это всегда плохо, — кивнул сухой.</p>

    <p>Они читали дальше.</p>

    <p>И чем дальше читали, тем больше плакали. Не от жалости. От смеха.</p>

    <p>Практикант прибыл по обмену для практического закрепления навыков общения с грешниками методами, отличными от хрестоматийных.</p>

    <p>Бодрый, с неподобающим для ангела-практиканта чувством юмора, с крыльями, выданными в небесной канцелярии (дата стояла неразборчиво), «с фабричным блеском», значит, новые и с твёрдыми убеждениями, что всё и везде можно улучшить.</p>

    <p>Первым делом он ввёл обед и выходной в середине недели.</p>

    <p>В Аду черти всегда питались отменно, но времени на это не выделялось, и ни в одной инструкции не были прописаны обеденные перерывы.</p>

    <p>— Даже дьявольская работа должна иметь перерыв, — сказал он, повесив табличку на вход.</p>

    <p>До этого черти работали без остановки, а тут началось.</p>

    <p>Очередь перед дверьми Ада вырастала к полудню, а к вечеру было вообще не пробиться.</p>

    <p>Начали собираться зеваки, потом подтягивались проходимцы.</p>

    <p>— А что там такое?</p>

    <p>— Почему в котлах не орут?</p>

    <p>Всегда находились критики огненного режима, а в толпе им было легче затеряться. Никто не мог распознать, откуда шёл это зловонный шум, но он явно мешал работе. Часть новеньких, только что поступивших, толпилась у входа, растерянно оглядываясь по сторонам.</p>

    <p>Сухой продолжал читать вслух.</p>

    <p>Негативные последствия пришлось срочно ликвидировать.</p>

    <p>Обеды отменили. Порции уменьшили. Но многим это уже не понравилось.</p>

    <p>Текст письма всё больше напоминал донос, написанный каллиграфическим почерком без единой ошибки.</p>

    <p>— Они что, там теперь не доедают? — сухой пробежал глазами уже прочитанный текст, пытаясь отыскать причину уменьшения порций.</p>

    <p>— Читай дальше, думаю, это не главное, — сказал круглый.</p>

    <p>В течение первой недели своего пребывания ангел решил «наладить» коллектив (как он выразился) и отметить своё назначение на должность стажёра-практиканта. Шампанское, которое он как-то пронёс через служебный вход, не рассчитано на нашу рабочую температуру и, кроме того, оказалось сомнительного качества.</p>

    <p>На лице круглого появилась улыбка.</p>

    <p>— Ох, и черти… И порции у них маленькие, и шампанское у них не Bollinger. Зажрались окончательно.</p>

    <p>Сухой одобрительно кивнул.</p>

    <p>Открывая эту бутылку, он выстрелил пробкой и пробил ей (в этом месте текст шёл через запятую и на латыни, перечень позиций был длинный).</p>

    <p>— Это что? — сухой удивлённо посмотрел на круглого.</p>

    <p>— Очевидно, был рикошет.</p>

    <p>— Да нет, я про латынь. Там же они только мат понимают.</p>

    <p>— А точно латынь? — второй привстал на носочки, будто пытался заглянуть в письмо.</p>

    <p>— Да вот… Musculus gluteus maximus. (Большая ягодичная мышца)</p>

    <p>— Читай дальше.</p>

    <p>Основная часть содержимого из бутылки пришлась не в бокалы, а на парадный мундир нашего начальника отдела котлов и сопутствующих мучений.</p>

    <p>Шампанское высохло быстро, но шеф наш стал ко всему липнуть.</p>

    <p>К документам. К подчинённым. И к собственной тени.</p>

    <p>С тех пор он постоянно избегал торжественных выходов. А это уже прямое нарушение наших традиций и его должностных обязательств.</p>

    <p>На этом месте ровный почерк будто дрогнул и сменился на печатный.</p>

    <p>— Что же у них там происходит…?</p>

    <p>— Дальше, еще хуже.</p>

    <p>Ангел подсадил всех машинистов котелен на холодное марочное пиво и при этом с обязательным употреблением вяленой рыбы. Он нашёл здесь приемлемые условия для её сушки, ввиду чего в реку Стикс был запущен малёк тарани, плотвы и воблы, купленный за бюджетные средства нашего ведомства, ранее выделенные на уголь, серу и газ. А это подотчетные средства.</p>

    <p>Черти первого уровня стали куда более веселее и смелее тех, кто выше их по статусу. Они начали вести панибратские беседы с грешниками в котлах, сопровождая все фразой:</p>

    <p>— Терпите, братья, не мы это всё придумали. А это уже прямое нарушение субординации.</p>

    <p>Два новых чана заменили на бассейны с водой из Мёртвого моря, вдоль которых поставили холодильники под пиво. Это стало привлекать демониц, а у них и без того полно обязанностей. Среднюю температуру в Аду снизили до курортной и не уведомили об этом начальство.</p>

    <p>Один старый черт даже сказал другому:</p>

    <p>— А знаешь… этот практикант? Он вообще-то прикольный. Чем-то похож на моего внука.</p>

    <p>Это вызвало раздражение, разделение коллектива на два лагеря с противоположными взглядами и нарушило слаженную работу остальных сотрудников в Преисподней.</p>

    <p>На этом месте архивариусы плакали уже навзрыд.</p>

    <p>Выше всех границ было то, что где-то тут, в Аду, он нашёл цыган.</p>

    <p>Как это произошло в письме не уточнялось, но фиксировался сухо и с отчаянием.</p>

    <p>Теперь они ходят между чанами с букетами ландышей и предлагают эти букеты грешницам. Но ландыши не рвут сами, а достают их исключительно у него. Кроме того они разносят:</p>

    <p>— Холодное баночное пиво!</p>

    <p>— Сладкую горячую кукурузу!</p>

    <p>— И пахлаву!</p>

    <p>Постояльцы Ада начали жаловаться.</p>

    <p>Во-первых, все без исключения бесплатные чаны внезапно оказались у него в аренде.</p>

    <p>Во-вторых, за них теперь требовалось платить. Черти, по условию договора с одной стороны, теперь не карают грешников на общественных началах, как раньше, а оказывают им услуги согласно действующему прейскуранту.</p>

    <p>А те, со своей стороны, обязаны принять и оплатить эти услуги даже без Акта выполненных работ.</p>

    <p>А деньги, как известно, при входе сюда брать с собой всегда запрещали всем. Под риском оказался наш резервный золотой запас.</p>

    <p>Тут всегда полный пансион с опциями «всё включено» и всегда все бесплатно. То есть за все платит Бес.</p>

    <p>Ваш практикант при этом ходит с рупором между котлами и вещает:</p>

    <p>— Энергоносители дорожают, за Ад нужно доплатить!</p>

    <p>С недоумением на нас смотрят как старожилы, так и свежеприбывшие грешники.</p>

    <p>Харон на свою лодку уже поставил четырёхтактную «Ямаху», и берет плату в обратную сторону, чем вызвал удивление у Церберов и породил массу лишних вопросов о своём происхождении. Маленькую черную шапочку у него находили, изымали, но каждый раз она у него появлялась снова и снова.</p>

    <p>Сухой еле сдерживал смех.</p>

    <p>— Это нарушает базовые принципы мучения, — писали черти. — Страдания должны быть доступными.</p>

    <p>Дальше ещё хуже.</p>

    <p>— А вот…</p>

    <p>Он призвал всех учить латынь.</p>

    <p>Тем, кому она давалась туго, ангел предлагал французский.</p>

    <p>После горячего котла и пары банок холодного пива, французский язык можно было услышать теперь чаще привычного матерного, который стали понимать хуже и далеко уже не все. Нам становится все сложнее коммуницировать. В Аду начал формироваться новый формат общения.</p>

    <p>— Quid agis, peccator? (Что ты делаешь, грешник) — спрашивал один. — Je comprends, mais je souffre autrement, (я понимаю, но я страдаю по-другому), отвечал другой.</p>

    <p>Демоницы заслушивались французской речью, забывали свои инструкции и проявляли интерес к смыслу сказанного.</p>

    <p>Советом старшин это было признано крайне опасным явлением.</p>

    <p>Перечень нововведений практиканта занимал ещё четыре страницы.</p>

    <p>Отдельным пунктом значилось:</p>

    <p>«Создание атмосферы курорта</p>

    <p>с элементами человеческого тепла».</p>

    <p>В конце письма было приписано:</p>

    <p>«Все методы влияния исчерпаны.</p>

    <p>Увольнять нельзя, не наш.</p>

    <p>Мучить бесполезно.</p>

    <p>Просим принять меры.</p>

    <p>С уважением,</p>

    <p>(очень уставшие) черти.»</p>

    <p>В конце была просьба. Нет. Мольба. «Просим срочно отозвать ангела. Мы больше не справляемся. Ад теряет свой профиль.»</p>

    <p>Архивариусы дочитали.</p>

    <p>Долго молчали. Думали.</p>

    <p>— Он их просто… достал, — тихо сказал круглый.</p>

    <p>— а ты знаешь..? А ведь у них там лучше, чем у нас, — уточнил сухой.</p>

    <p>Он аккуратно сложили письмо и на миг призадумался .</p>

    <p>— Оставлять без внимания это нельзя, — сказал сухой.</p>

    <p>— Ни в коем случае, — согласился круглый. — Это подрывает наши основы.</p>

    <p>Они посмотрели друг на друга и снова улыбнулись.</p>

    <p>И почти одновременно произнесли:</p>

    <p>— На землю.</p>

    <p>— В наказание? — переспросил сухой.</p>

    <p>— К людям, — добавил круглый.</p>

    <p>— Но аккуратно, — подумал вслух первый. — К кому-нибудь…</p>

    <p>— …кто там сам не очень то умеет держать баланс, — закончил второй.</p>

    <p>Сухой посмотрел в реестр.</p>

    <p>Листал долго.</p>

    <p>Остановился.</p>

    <p>— Доктор.</p>

    <p>— Какой?</p>

    <p>— Тот самый, который лечит не запретом, а мерой. —Психиатр?</p>

    <p>— та ты что? Этот гробит.</p>

    <p>— невролог.</p>

    <p>— есть на примете?</p>

    <p>— Точно есть.</p>

    <p>Круглый впервые сделал серьёзное лицо.</p>

    <p>— Вот пусть там и продолжит с ним.</p>

    <p>На столе из света и тени сформировалось личное дело ангела. Три звезды на полях.</p>

    <p>— Ого… А он не такой то и простой, этот ангел.</p>

    <p>Сухой набрал воздух в грудь и резко выдохнул его на печать.</p>

    <p>Оттиск лёг чуть ниже фотографии, цепляя её кончик:</p>

    <p>Ангел временного пребывания.</p>

    <p>Допуск разрешён.</p>

    <p>И где-то внизу, в рождественский вечер, доктор-невролог, дом которого стоял на самом обрыве, вдруг почувствовал, что к нему идёт гость.</p>

    <p>Ангел приходит не эффектно.</p>

    <p>Не с сиянием и не с музыкой.</p>

    <p>Снаружи тихо выл ветер.</p>

    <p>Город уже давно научился жить под этот звук. Как старики живут с шумом в ушах, раздражает, пугает, но однажды становится частью их фона.</p>

    <p>Доктор сидел на кухне.</p>

    <p>Перед ним стояла чашка давно остывшего чая, телефон мигал непрочитанными сообщениями, а в голове неприятно шумело после тяжёлого дня. Он устало потёр глаза.</p>

    <p>В комнате было тихо. Слишком тихо.</p>

    <p>А потом скрипнул пол и хлопнула дверца холодильника.</p>

    <p>Не громко. По-хозяйски.</p>

    <p>Доктор поднял взгляд. Возле открытого холодильника стоял какой-то молодой парень. Лет двадцать пять. Может меньше. Стоял он в его старой растянутой футболке с полустёртой надписью, шортах и тех самых потёртых кроксах, которые доктор все собирался выбросить уже третий год подряд. И без носков. С растрёпанными светлыми волосами и с таким видом, будто он тут живёт с детства.</p>

    <p>Парень задумчиво изучал содержимое холодильника.</p>

    <p>— О… докторская, — уважительно произнёс он. — Настоящая?</p>

    <p>Доктор молчал. Мозг невролога ещё пытался цепляться за рациональность.</p>

    <p>«Так… спокойно. Галлюцинация? Усталость? Недосып?»</p>

    <p>Он машинально посмотрел на часы, потом на бутылку. Почти пустая.</p>

    <p>— Ого… — тихо сказал он самому себе. — Вот уже и видения пошли… Допился. До чертиков.</p>

    <p>Парень обернулся.</p>

    <p>Посмотрел внимательно.</p>

    <p>— Нет. До чертиков вам ещё далеко. Они бы сразу начали советы давать.</p>

    <p>Он захлопнул холодильник.</p>

    <p>— здравствуйте.</p>

    <p>Доктор продолжал смотреть на него молча.</p>

    <p>— Ты кто?</p>

    <p>Парень вздохнул так, будто этот вопрос ему задавали уже слишком много раз.</p>

    <p>— Ангел временного пребывания.</p>

    <p>Повисла пауза.</p>

    <p>— Понятно, — кивнул доктор. — Значит всё-таки шизофрения.</p>

    <p>— Да нет, — спокойно ответил парень. — Шизофрения обычно начинается куда скучнее. А я — командировочный.</p>

    <p>Он сел напротив. Кроксы смешно чавкнули по полу.</p>

    <p>Доктор автоматически достал нож и отрезал два куска докторской колбасы. Один положил себе.</p>

    <p>Второй ему. — Прости, хлеб кончился.</p>

    <p>Мозг может сомневаться во всём, но привычка кормить гостя у нормального человека отключается последней.</p>

    <p>Парень оживился.</p>

    <p>— О! Спасибо. А что у вас тут внизу с нормальной едой сложновато? Вы часто едите эту дрянь?</p>

    <p>— доктор глянул на него удивленно. Это самая дорогая докторская, которая была.</p>

    <p>—прошли времена, когда то, что качественно, то и дорого. Сейчас и за дорого дрянь можно купить и за дешево можно продать душу.</p>

    <p>Незваный гость полез рукой в карман и достал маленькую бутылочку странной формы. Стекло внутри будто слегка светилось.</p>

    <p>— вот это Вы точно не пробовали.</p>

    <p>Доктор устало усмехнулся.</p>

    <p>— Я, молодой человек, в своей жизни пробовал такое, что Вам даже родители не показывали.</p>

    <p>— меня удивить сложно.</p>

    <p>— о-о! Чего только мне родители не показывали. Он улыбнулся. Но мне кажется, я им сумел показать больше.</p>

    <p>— вот это мы сейчас и проверим.</p>

    <p>Он бережно поставил бутылочку на стол.</p>

    <p>Внутри жидкость переливалась так, будто в ней было растворено северное сияние.</p>

    <p>— Смесь молока единорога, слезы русалки и ещё примерно четырёхсот ингредиентов. Не буду вам рецептурой голову морочить.</p>

    <p>— Звучит,  как состав энергетика из девяностых.</p>

    <p>— Хуже. Гораздо хуже. Оно там всё натуральное.</p>

    <p>Доктор хмыкнул.</p>

    <p>— И что это?</p>

    <p>Парень улыбнулся.</p>

    <p>— это сингулярный напиток.</p>

    <p>— Почему сингулярный?</p>

    <p>Ангел задумался.</p>

    <p>— Как бы вам объяснить… вы знаете, что такое горизонт событий?</p>

    <p>Доктор медленно поднял на него глаза.</p>

    <p>— Это рядом с чёрной дырой.</p>

    <p>— Примерно. Место, где пространство и время начинают меняться местами. Где привычные законы уже не работают.</p>

    <p>Он аккуратно покрутил бутылочку пальцами.</p>

    <p>— Мы говорим, напиток оттуда. Из-за горизонта.</p>

    <p>— Очень удобно. Ничего же не проверишь.</p>

    <p>— Конечно. Но доверьтесь. В этом и смысл половины Вселенной.</p>

    <p>Доктор неожиданно улыбнулся.</p>

    <p>Парень тоже.</p>

    <p>Потом ангел вдруг стал серьёзнее.</p>

    <p>— А вы знаете, что с обратной стороны любой чёрной дыры есть Светлая?</p>

    <p>— Белая?</p>

    <p>— Нет. Именно Светлая.</p>

    <p>Он наклонился ближе.</p>

    <p>— Из неё вылетает всё, что когда-то исчезло в чёрной. Просто никто этого не видел. Потому что, чтобы это это осознать … нужно всё-таки пролететь горизонт.</p>

    <p>Он медленно открыл бутылочку.</p>

    <p>Из горлышка поднялся тонкий серебристый дымок.</p>

    <p>В квартире запахло чем-то странным.</p>

    <p>Детством. Снегом. Мандаринами. И почему-то далёкой дорогой домой, по которой уже давно никто не ходил.</p>

    <p>—это точно сон. Но такой хороший, как в детстве. Эх, давно мне ничего не снилось приятного. Просыпаться не охота совсем.</p>

    <p>Ангел откинулся на спинку стула.</p>

    <p>— ну хорош, вы не спите, я реальный, только стал видимый. Закрепляюсь к Вам на стажировку. Вот мои бумаги.</p>

    <p>Доктор смотрел на серебристый дымок, медленно поднимающийся к потолку.Потом перевёл взгляд на парня. Потом снова на бутылочку.</p>

    <p>Невролог внутри него ещё отчаянно сопротивлялся.</p>

    <p>Мозг человека вообще удивительно упрямый орган. Он готов поверить в заговор мировых элит, порчу, Арестовичу и лечению мочой, но до последнего отказывается принимать очевидное. Особенно если очевидное сидит у тебя на кухне в твоей же старой футболке и жуёт докторскую колбасу.</p>

    <p>— Нет, — тихо сказал доктор. — Так не бывает.</p>

    <p>— Бывает - бывает — спокойно ответил ангел. — Просто редко и далеко не с каждым.</p>

    <p>— Галлюцинации при переутомлении бывают куда чаще.</p>

    <p>Парень тяжело вздохнул и полез рукой куда-то за пазуху.</p>

    <p>— Вот поэтому нас и не любят отправлять к врачам.</p>

    <p>На стол лёг толстый пакет документов.</p>

    <p>Серьёзный. С тесёмками. С пожелтевшими уголками. С таким видом, будто его носили между мирами уже лет триста.</p>

    <p>Доктор машинально выпрямился.</p>

    <p>— Это что?</p>

    <p>— Сопроводительные бумаги.</p>

    <p>— Ваши.</p>

    <p>— На меня?</p>

    <p>— Ну а на кого же ещё? Не на кота же. — кстати, как он? Лаврентий склубочившись лежал на печке.</p>

    <p>— О! Палыч, а вы замечательно выглядите.</p>

    <p>Он подвинул папку ближе.</p>

    <p>На обложке золотыми буквами было вытиснено:</p>

    <p>«Временное наблюдение.</p>

    <p>Объект склонен к саморазрушению,</p>

    <p>иронии и избыточной рефлексии».</p>

    <p>Ниже стояла огромная печать.</p>

    <p>Не чернильная. Светящаяся.</p>

    <p>Будто кто-то раскалённым солнцем поставил оттиск прямо на бумагу.</p>

    <p>Внутри нее медленно двигались тонкие золотые линии. Как живые.</p>

    <p>Доктор нахмурился.</p>

    <p>Открыл первую страницу.</p>

    <p>«Назначается ангел временного пребывания. Срок командировки — до стабилизации внутреннего света объекта либо до отдельного распоряжения.»</p>

    <p>Ниже шли подписи.</p>

    <p>Одна — аккуратная, сухая, идеально ровная. Вторая — чуть кривая, с кляксой в углу.</p>

    <p>Он листал дальше.</p>

    <p>«Рекомендуется: не оставлять одного в моменты потери смысла,</p>

    <p>ограничить доступ к самоуничтожению,</p>

    <p>периодически напоминать о человеческом».</p>

    <p>И ниже:</p>

    <p>«В случае тяжёлых приступов цинизма разрешается:</p>

    <p>музыка, друзья, долгие разговоры,</p>

    <p>собаки, коты, снег, хороший алкоголь в малых дозах.»</p>

    <p>Доктор нервно усмехнулся.</p>

    <p>— Это что… шутка?</p>

    <p>— Нет. Методические рекомендации.</p>

    <p>Он провёл пальцем по печати.</p>

    <p>И в этот момент золотое свечение вдруг отозвалось и сменило свой цвет на оранжевый, как от лампы накаливания.</p>

    <p>Печать отозвалась каким-то странным, невозможным теплом, которое нельзя было объяснить.</p>

    <p>И вот тут доктор впервые испугался по-настоящему.</p>

    <p>Не мистики, а того, что всё это может оказаться правдой.</p>

    <p>Он медленно сел обратно. Молча взял бутылочку.</p>

    <p>— Сколько градусов?</p>

    <p>— Тут не в градусах измеряется.</p>

    <p>— Опасная фраза.</p>

    <p>— Очень.</p>

    <p>Доктор сделал глоток.</p>

    <p>И замер.</p>

    <p>Вкус невозможно было описать.</p>

    <p>Будто одновременно: первый снег, поездка в детстве, запах ёлки, утро после большой беды, которая ушла,</p>

    <p>момент, когда тебя простили,</p>

    <p>и ощущение дома, которого уже давно нет. Где-то очень глубоко внутри вдруг стало тихо. Не весело.</p>

    <p>Не хорошо. А именно тихо.</p>

    <p>Он медленно закусил докторской колбасой.</p>

    <p>Ангел внимательно наблюдал.</p>

    <p>— Ну как?</p>

    <p>Доктор долго молчал.</p>

    <p>Потом тихо произнёс:</p>

    <p>— Если это галлюцинация или сон… то не буди меня, пожалуйста.</p>

    <p>Ангел улыбнулся.</p>

    <p>— Обычно это моя фраза.</p>

    <p>После этого навалился сон резко, как наркоз.  Будто кто-то наконец выключил внутри аварийный режим, в котором он жил последние годы.</p>

    <p>Доктор даже не заметил, как уснул прямо за столом. Ему давно ничего не снилось. Ни хорошего. Ни плохого.</p>

    <p>Только темнота и редкие обрывки тревоги. Почему, воздушную тревогу всегда сопровождает сирена? Почему не заменить её на вальс Штрауса, например? Зачем загонять людей в нее еще больше?</p>

    <p>Но в эту ночь было иначе.</p>

    <p>Ему снился снег. Тихий двор.</p>

    <p>Какой-то забытый смех. И ощущение, что впереди ещё не всё потеряно.</p>

    <p>Утром он проснулся резко. По привычке. С тем знакомым страхом первых секунд:</p>

    <p>«Что я вчера натворил?»</p>

    <p>Голова была удивительно ясной. Даже слишком. Он медленно открыл глаза.</p>

    <p>Кухня. Стол. Чашка. Нож.</p>

    <p>Недоеденная докторская.</p>

    <p>Пустая бутылочка с серебристым налётом внутри. И папка.</p>

    <p>Та самая?</p>

    <p>Со светящейся печатью.</p>

    <p>Доктор медленно перевёл взгляд дальше.</p>

    <p>На диване, укрывшись старым пледом и закинув одну ногу на подлокотник, спал ангел в его затасканной футболке со сткртым рисунком и тихо храпел.</p>

    <p>Первые несколько дней доктор искренне жалел, что не сошёл с ума окончательно. Потому что если бы это была шизофрения, то с ней хоть как-то можно смириться и жить, как все. Лечить шизофрению, это примерно тоже самое, что в горной реке руками ловить форель. Это под силу медведям, но у человека совсем другие задачи.</p>

    <p>А вот ангела временного пребывания это совсем не тревожило, он не жалел ни разу.  Да и вообще, доктор ему стал симпатичен.</p>

    <p>Он просыпался раньше всех. Причём непонятно зачем. Словно у него внутри стоял будильник на «спасение человечества».</p>

    <p>Утром доктор выходил на кухню и к удивлению обнаруживал:</p>

    <p>вымытую чашку; открытое окно; уже заваренный чай; и ангела, который сидел на подоконнике в его старой футболке и задумчиво смотрел на серое зимнее небо Киева.</p>

    <p>— Ты вообще спишь? — однажды мрачно спросил доктор.</p>

    <p>— Пробовал. Интересная функция. Но у вас тут слишком шумно.</p>

    <p>Где-то далеко снова завыла сирена.</p>

    <p>Ангел поднял голову. Каждый раз он слушал её так, будто не мог привыкнуть.</p>

    <p>И каждый раз не привыкал. Сначала доктора это даже забавляло. Потом начало раздражать. Потому что ангел оказался не небесным существом, а какой-то ходячей совестью. Причём молодой. Энергичной. И вполне такой себе настырной.</p>

    <p>Он: выливал остатки алкоголя, где бы он не был, но при этом не трогал закрытые бутылки. Выбрасывал просроченные таблетки. Отключал новости после третьего подряд видео с разрушениями. Заставлял есть горячее и утром требовал выпивать большую чашку теплой воды с лимоном. А еще открывал шторы и почему-то постоянно пытался разговаривать, что для уставшего врача было уже формой насилия.</p>

    <p>— Ты не можешь спасти всех, — говорил ангел.</p>

    <p>— А я и не пытаюсь.</p>

    <p>— Врёшь.</p>

    <p>— Конечно вру. Я врач.</p>

    <p>Ангел хмыкал.</p>

    <p>Потом шёл к холодильнику и съедал докторскую колбасу так, будто это был священный ритуал Земли. Особенно его поражали люди. Нет.</p>

    <p>Не так. Его поражало, что люди вообще ещё функционируют.</p>

    <p>Он впервые увидел: врачей после суток дежурства, матерей в метро во время тревог, детей, которые уже не пугаются взрывов, стариков, обсуждающих цены под звуки работы ПВО. И однажды ночью, когда они сидели в машине возле аптеки, ангел вдруг тихо спросил:</p>

    <p>— А почему вы тут все ведёте себя так… спокойно?</p>

    <p>Доктор усмехнулся.</p>

    <p>— А как надо?</p>

    <p>— Ну… у вас война.</p>

    <p>— А ещё коммуналка, налоги, давление и работа с восьми утра.</p>

    <p>— Ко всему привыкаешь.</p>

    <p>Ангел долго молчал.</p>

    <p>Потом тихо сказал:</p>

    <p>— В Аду всё честнее.</p>

    <p>Доктор повернул голову.</p>

    <p>— В смысле?</p>

    <p>— Там хотя бы понятно, за что мучают.</p>

    <p>И вот тут доктор впервые не нашёл что ответить.</p>

    <p>Ангел действительно начал менять траекторию его жизни.</p>

    <p>Тихо и почти незаметно. Иногда это жутко бесило. Иногда пугало. А иногда спасало.</p>

    <p>Больницы ангел невзлюбил сразу.</p>

    <p>Не потому что там было страшно. В Аду он видел вещи гораздо хуже.</p>

    <p>Но там страдание было встроено в систему. А здесь оно происходило как-то… неправильно. Без логики.</p>

    <p>Без объяснений. Без виноватых.</p>

    <p>В тот день доктор взял его с собой почти случайно.</p>

    <p>Просто ангел второй день ходил за ним по дому и задавал вопросы.</p>

    <p>Много. Слишком много. Почему люди курят, если знают последствия? Почему продолжают любить тех, кто их разрушает? Ну или просто продолжают с ними отношения?</p>

    <p>Почему пьют таблетки горстями, но не могут сказать друг другу:</p>

    <p>«Помоги мне»?</p>

    <p>И главное:</p>

    <p>— Почему вы всё время такие уставшие? Доктор тогда долго молчал. Потом ответил:</p>

    <p>— Потому что мы живём так, будто обязаны выдержать всё.</p>

    <p>На этот раз в машине ангел сидел непривычно тихо. Смотрел в окно.</p>

    <p>На серый город. На людей. На женщин с пакетами. На подростков с рюкзаками. На старика, который продавал носки возле метро во время воздушной тревоги.</p>

    <p>— Странные вы, — тихо сказал он.</p>

    <p>— Вам страшно, больно, тяжело… но вы всё равно продолжаете жить.</p>

    <p>Доктор усмехнулся.</p>

    <p>— Это потому что кредит за квартиру для многих сам себя не выплатит.</p>

    <p>Ангел впервые за утро улыбнулся.</p>

    <p>Но улыбка быстро исчезла.</p>

    <p>Потому что они приехали.</p>

    <p>В детском отделении всегда пахло одинаково. Лекарствами. Пластиком.</p>

    <p>И чужой надеждой. Ангел сначала держался уверенно. Он улыбался детям. Разговаривал с ними.</p>

    <p>У одной девочки незаметно починил игрушку, просто проведя пальцем по треснувшему пластмассовому зайцу.</p>

    <p>Доктор это заметил, но ничего не сказал. Только нахмурился.</p>

    <p>— Тебе же нельзя.</p>

    <p>— Это не чудо. Это мелкий ремонт.</p>

    <p>— У вас там за формулировки, я смотрю, отдельные премии.</p>

    <p>Ангел тихо усмехнулся.</p>

    <p>Но потом они вошли в палату в конце коридора. И всё изменилось.</p>

    <p>Мальчик. Лет семи. Слишком худой.</p>

    <p>Слишком бледный. Из тех детей, которые уже разговаривают как маленькие взрослые, потому что болезнь украла у них детство раньше времени. Он лежал спокойно. Даже слишком спокойно. Мать сидела рядом и улыбалась той страшной улыбкой, которой улыбаются только родители очень больных детей. Когда держатся уже из последних сил.</p>

    <p>— Здравствуйте, доктор, — тихо сказала она. Доктор кивнул.</p>

    <p>Начал говорить что-то привычное.</p>

    <p>Спокойное. Профессиональное.</p>

    <p>Но ангел уже не слушал. Он смотрел на ребёнка. Очень внимательно.</p>

    <p>Словно пытался понять что-то, чего раньше никогда не видел. Потом сделал шаг ближе. Ещё один.</p>

    <p>Доктор это сразу почувствовал.</p>

    <p>Воздух изменился. Стало теплее.</p>

    <p>Тише. Лампа над кроватью едва заметно дрогнула. Ангел медленно поднял руку. И вот тут доктор впервые увидел его настоящим. Не парнем в кроксах. Не смешным квартирантом.</p>

    <p>А кем-то гораздо древнее человека.</p>

    <p>В его глазах на секунду вспыхнуло что-то невозможное. Слишком светлое. Слишком большое для этого мира. Монитор возле кровати тихо пискнул. Мальчик вдруг задышал чуть легче. Мать замерла.</p>

    <p>Доктор резко шагнул вперёд.</p>

    <p>— Нет.</p>

    <p>Ангел медленно повернул голову.</p>

    <p>— Но я могу помочь.</p>

    <p>— Нет.</p>

    <p>— Почему?!</p>

    <p>В голосе ангела впервые прозвучала злость. Настоящая. Почти детская.</p>

    <p>— Потому что нельзя, — тихо сказал доктор.</p>

    <p>— Это ребёнок!</p>

    <p>— Я вижу.</p>

    <p>— Тогда почему?!</p>

    <p>Доктор молчал несколько секунд.</p>

    <p>Будто каждое слово весило слишком много.</p>

    <p>— Потому что если ты начнёшь решать, кому жить, а кому нет… этот мир перестанет быть человеческим.</p>

    <p>Ангел смотрел на него так, будто впервые видел.</p>

    <p>— Но он же ни в чём не виноват…</p>

    <p>И вот тут доктор не выдержал.</p>

    <p>Отвернулся к окну.</p>

    <p>Потому что ответа на это у него не было. Ни как у врача. Ни как у человека. Ни как у того, кто слишком долго жил на Земле.</p>

    <p>Мальчик вдруг тихо спросил:</p>

    <p>— Мама… а это кто?</p>

    <p>Повисла пауза.</p>

    <p>Ангел быстро вытер глаза ладонью.</p>

    <p>Улыбнулся. Той самой своей невозможной светлой улыбкой.</p>

    <p>И тихо ответил:</p>

    <p>— Я… временно здесь.</p>

    <p>Мальчик серьёзно кивнул.</p>

    <p>Будто понял больше остальных.</p>

    <p>— Тогда посидите немного. Ладно?</p>

    <p>Ангел сел рядом. Очень осторожно.</p>

    <p>Словно боялся сломать что-то ещё, кроме собственного понимания мира.</p>

    <p>И впервые за всё время своего пребывания на Земле он почувствовал себя абсолютно бессильным.</p>

    <p>В этот вечер доктор после тяжёлого дня, уже собирался заехать «на пять минут». Туда, где всегда становилось хуже. Где люди говорили:</p>

    <p>«Да расслабься ты».</p>

    <p>И наливали не потому, что рады видеть, а потому что так всем проще не чувствовать пустоту. Он уже стоял у двери, когда ангел вдруг сказал:</p>

    <p>— Не езжай.</p>

    <p>— Ой, только не начинай.</p>

    <p>— Не езжай.</p>

    <p>— Почему?</p>

    <p>Ангел замолчал.</p>

    <p>Потом тихо ответил:</p>

    <p>— Потому что мне не нравится, как сегодня звучит город.</p>

    <p>Доктор устало закатил глаза.</p>

    <p>— Господи…</p>

    <p>— Не совсем.</p>

    <p>— Да какая разница.</p>

    <p>Он всё равно начал искать ключи.</p>

    <p>Ключей не было.</p>

    <p>Потом зазвонил телефон.</p>

    <p>Потом завис мотор, открывающий металические ворота на выезд.</p>

    <p>Потом соседка попросила набрать  ей воды, оказалось, что уже как три дня подряд тут нет света, но солнечные панели всегда работают, было бы солнце. Через сорок минут доктор психанул и остался дома. А ночью был прилёт.</p>

    <p>Туда. Именно туда.</p>

    <p>Утром доктор молча сидел на кухне.</p>

    <p>Ангел не лез.</p>

    <p>Только тихо пил чай.</p>

    <p>— Это ты сделал? — наконец спросил доктор.</p>

    <p>— Нет.</p>

    <p>— Тогда откуда ты знал?</p>

    <p>Ангел долго молчал.</p>

    <p>Потом  сказал:</p>

    <p>— Иногда пространство начинает… плохо звучать.</p>

    <p>Доктор посмотрел на него внимательно. Впервые без иронии.</p>

    <p>И впервые ему стало страшно от мысли, сколько раз этот молодой парень уже видел вещи, которые не хотел видеть.</p>

    <p>Но хуже всего для ангела оказалась больница. Туда он напросился сам.</p>

    <p>Сказал:</p>

    <p>— Я должен понимать, как вы тут живёте. После первого же дежурства он замолчал почти на сутки.</p>

    <p>Не шутил. Не спорил. Даже докторскую не ел. Просто сидел ночью на кухне в кроксах и смотрел в одну точку. Доктор поставил перед ним чай.</p>

    <p>Ангел тихо спросил:</p>

    <p>— Почему дети болеют?</p>

    <p>Доктор молчал.</p>

    <p>— Почему хорошие люди умирают так рано?</p>

    <p>Тишина.</p>

    <p>— Почему те, кого нужно изолировать от общества, иногда пытаются его возглавить?</p>

    <p>Доктор тяжело выдохнул.</p>

    <p>— Потому что это Земля.</p>

    <p>— Но это несправедливо.</p>

    <p>— Конечно.</p>

    <p>— Тогда почему вы тут вообще не сойдёте с ума?</p>

    <p>Доктор усмехнулся.</p>

    <p>— А мы периодически и сходим. Просто не все одновременно.</p>

    <p>Ангел опустил голову.</p>

    <p>И вдруг тихо сказал:</p>

    <p>— Я думал, что самое страшное — это Ад.</p>

    <p>Доктор долго смотрел в окно.</p>

    <p>На зимний сад. Сосны, подаренные ему соседом покрылись снегом и тяжело опустили свои пушистые ветки под его весом.</p>

    <p>А там дальше, где то за ними были люди, которые завтра снова поедут на работу, будут шутить, покупать хлеб, влюбляться и жить так, будто впереди ещё целая вечность.</p>

    <p>И потом очень спокойно ответил:</p>

    <p>— Нет. Самое страшное, когда человек перестаёт быть человеком.</p>

    <p>На кухне стало еще тише.</p>

    <p>Только печка слегка потрескивала от жара, а Лаврентий сидел и смотрел на них, как будто что то хотел сказать, но молчал.</p>

    <p>И где-то очень высоко, далеко за облаками, два архивариуса молча отложили свои бумаги.</p>

    <p>Высоко над всем этим, там, где не было ни времени, ни нормального кофе, они открыли дежурный сектор наблюдения.</p>

    <p>Большой голубой шар медленно крутился в темноте. Где-то мерцали войны. Где-то люди целовались на вокзалах. Где-то кто-то в три часа ночи ел котлету прямо из сковородки и обещал себе с понедельника начать новую жизнь.</p>

    <p>Обычная Земля.</p>

    <p>Сухой архивариус смотрел вниз через свои невидимые очки, а круглый пил чай.</p>

    <p>Очень подозрительный чай.</p>

    <p>От которого иногда шёл пар с запахом вишни и звёздной пыли.</p>

    <p>— Ну что там? — лениво спросил круглый. Сухой перелистнул несколько светящихся листов.</p>

    <p>— Странно.</p>

    <p>— Опять очеловечивает систему?</p>

    <p>— Хуже.</p>

    <p>Круглый перестал жевать печенье.</p>

    <p>— Что может быть хуже?</p>

    <p>Сухой поднял глаза.</p>

    <p>И впервые за долгое время выглядел растерянным.</p>

    <p>— Кажется… система очеловечивает его.</p>

    <p>Повисла тишина.</p>

    <p>Где-то очень далеко тревожно зазвенел колокольчик экстренных наблюдений. Но никто не обратил на это внимания.</p>

    <p>— Ого… — тихо произнёс круглый. — А вот это уже редкость.</p>

    <p>Сухой медленно кивнул.</p>

    <p>— Он начал сомневаться.</p>

    <p>— В людях?</p>

    <p>— В инструкциях.</p>

    <p>Круглый тяжело выдохнул.</p>

    <p>— Всё. Пропал парень.</p>

    <p>Он подошёл ближе к шару.</p>

    <p>Внутри медленно двигался зимний Киев. Кухня. Доктор. Чай. Сирены. Усталость. Лаврентий и ангел в кроксах.</p>

    <p>— А ведь хороший был практикант, — неожиданно сказал круглый. — Перспективный. Три звезды на полях. С огоньком.</p>

    <p>— Слишком с огоньком.</p>

    <p>— Это да…</p>

    <p>Сухой снова посмотрел в бумаги.</p>

    <p>— Он уже трижды нарушил протокол эмоционального дистанцирования.</p>

    <p>— А это много?</p>

    <p>— После второго обычно начинают понимать людей.</p>

    <p>Круглый поморщился.</p>

    <p>— Ох… это заразно.</p>

    <p>Они ещё немного помолчали, потом круглый вдруг тихо спросил:</p>

    <p>— А доктор?</p>

    <p>Сухой перевернул страницу.</p>

    <p>И неожиданно улыбнулся.</p>

    <p>— А что доктор? Доктор впервые за долгое время начал жить не на автопилоте.</p>

    <p>— Это ангел его вытаскивает?</p>

    <p>— Не совсем.</p>

    <p>— А кто кого тогда?</p>

    <p>Сухой задумался.</p>

    <p>— Пока непонятно.</p>

    <p>А внизу, значительно ниже небесной канцелярии и существенно выше уровня здравого смысла, в Аду проходило экстренное производственное совещание.</p>

    <p>Начальник отдела котлов и сопутствующих мучений нервно ходил вдоль длинного стола.</p>

    <p>Липнуть к предметам после истории с шампанским он почти перестал, но иногда документы всё ещё прилипали к его локтю.</p>

    <p>Черти молча слушали доклад.</p>

    <p>— То есть… — мрачно уточнил главный, — он всё ещё на Земле?</p>

    <p>— Да.</p>

    <p>— И возвращать его пока не собираются?</p>

    <p>— Нет.</p>

    <p>Главный черт медленно сел.</p>

    <p>— У меня плохое предчувствие.</p>

    <p>Из дальнего угла осторожно поднялся один старый черт.</p>

    <p>Очень старый.</p>

    <p>С потёртыми рогами и взглядом уставшего сантехника ЖЭКа.</p>

    <p>— А доктор как?</p>

    <p>Все обернулись.</p>

    <p>Докладчик пожал плечами.</p>

    <p>— Пока держится.</p>

    <p>Старый черт уважительно присвистнул.</p>

    <p>— Силен.</p>

    <p>— В смысле?</p>

    <p>— Ну вы вспомните этого ангела. Он же невыносимый.</p>

    <p>Несколько чертей согласно закивали.</p>

    <p>Один нервно перекрестился по привычке, потом испуганно оглянулся и сделал вид, что просто чесал шею.</p>

    <p>— Если этот врач выдержит его полгода… — задумчиво произнёс старый черт, — я бы ему грехи скостил.</p>

    <p>Повисла тишина.</p>

    <p>— На сколько? — осторожно спросил кто-то. Старый черт тяжело вздохнул.</p>

    <p>— Процентов на тридцать.</p>

    <p>В дальнем конце стола кто-то ахнул.</p>

    <p>— Тридцать?!</p>

    <p>— Да вы с ума сошли!</p>

    <p>— Это прецедент! Всегда было не больше двух с половиной.</p>

    <p>Старый черт мрачно посмотрел на остальных.</p>

    <p>— А вы сами попробуйте поживите с существом, которое по утрам открывает окно для свежего воздуха и запрещает жаловаться на жизнь.</p>

    <p>Черти притихли.</p>

    <p>— Вот именно, — буркнул кто-то.</p>

    <p>Главный черт устало потёр переносицу.</p>

    <p>— Ладно… наблюдаем дальше.</p>

    <p>Он помолчал.</p>

    <p>И вдруг очень тихо добавил:</p>

    <p>— Но если честно… я начинаю переживать не за доктора.</p>

    <p>— А за кого?</p>

    <p>Главный посмотрел куда-то вверх.</p>

    <p>Туда, где далеко-далеко среди зимнего человеческого города молодой ангел впервые учился понимать, почему люди иногда плачут не от боли, а от того, что слишком долго держались.</p>

    <p>Ночь была длинной.</p>

    <p>Из тех ночей, которые не запоминаются событиями, но почему-то остаются внутри навсегда. Город снова выл сиренами.</p>

    <p>Где-то далеко работало ПВО.</p>

    <p>Где-то горели окна. Где-то люди, вздрагивая от взрывов, Он смотрел в окно на тёмный город, на людей, которые всё равно живут.</p>

    <p>Любят. Рожают детей. Пекут хлеб.</p>

    <p>Шутят. Обнимаются. И отвечают на сообщения:</p>

    <p>«Ты как?»</p>

    <p>На этот таз доктор и ангел сидели на кухне молча. Без нравоучений. Без философии. Между ними стояла бутылочка сингулярного напитка.</p>

    <p>Почти пустая. Ангел задумчиво крутил её пальцами.</p>

    <p>— Знаешь, — тихо сказал он, — а архивариусы были правы.</p>

    <p>Доктор усмехнулся.</p>

    <p>— В чём именно?</p>

    <p>Ангел смотрел в окно. На снег. На далёкие вспышки над горизонтом.</p>

    <p>— Ад действительно не здесь.</p>

    <p>Доктор медленно кивнул.</p>

    <p>— Конечно не здесь. Здесь всё намного сложнее.</p>

    <p>Ангел улыбнулся. Совсем по-человечески. Потом вдруг спросил:</p>

    <p>— А как вы тут вообще не ломаетесь?</p>

    <p>Доктор долго молчал.</p>

    <p>Потом пожал плечами.</p>

    <p>— Ломаемся.</p>

    <p>— Но продолжаете жить.</p>

    <p>— А что делать?</p>

    <p>Тишина.</p>

    <p>Только печь тихо потрескивала от жара, а за окном падал холодный снег.</p>

    <p>Ангел смотрел на город так внимательно, будто пытался запомнить его навсегда.</p>

    <p>— Знаешь… — наконец тихо сказал он. — У вас тут есть вещи, которых нет ни у нас… ни у них.</p>

    <p>— Какие?</p>

    <p>Ангел улыбнулся.</p>

    <p>— Упрямство жить.</p>

    <p>Доктор хотел что-то ответить.</p>

    <p>Но не успел. Потому что именно в этот момент где-то очень высоко, над городом, над облаками, над войной, над человеческой болью, едва слышно щёлкнула невидимая печать. ТУК. Срок временного пребывания закончился.</p>

    <p>Ангел почувствовал это сразу. И доктор, кажется, тоже.</p>

    <p>Потому что вдруг стало очень тихо.</p>

    <p>Так тихо, как бывает только перед расставанием.</p>

    <p>— Тебе пора? — спросил доктор.</p>

    <p>Ангел кивнул.</p>

    <p>Еще несколько секунд они сидели молча. Потом доктор тяжело выдохнул.</p>

    <p>— Слушай… а там… наверху… вообще понимают, что здесь происходит?</p>

    <p>Ангел улыбнулся уголком губ.</p>

    <p>— Теперь — чуть больше.</p>

    <p>Он поднялся. Подошёл к окну.</p>

    <p>За стеклом медленно падал снег.</p>

    <p>Самый обычный земной снег.</p>

    <p>— Ты изменился, — тихо сказал доктор. Ангел долго молчал.</p>

    <p>Потом ответил:</p>

    <p>— Это опасная планета.</p>

    <p>— В смысле?</p>

    <p>Он обернулся.</p>

    <p>И в глазах его впервые не было ни света, ни мистики.</p>

    <p>Только тёплая человеческая грусть.</p>

    <p>— Здесь очень легко начать любить людей.</p>

    <p>Доктор усмехнулся.</p>

    <p>— Даже после всего этого?</p>

    <p>— Особенно после всего этого.</p>

    <p>Они ещё немного помолчали.</p>

    <p>Потом ангел вдруг подошёл ближе и неожиданно крепко обнял доктора.</p>

    <p>Совсем не по-ангельски.</p>

    <p>По-человечески.</p>

    <p>И тихо сказал:</p>

    <p>— Спасибо.</p>

    <p>— За что?</p>

    <p>— За то, что не дал мне разочароваться в вас.</p>

    <p>Доктор хотел ответить что-то колкое.</p>

    <p>По привычке, но почему-то не смог.</p>

    <p>А потом ангел исчез.</p>

    <p>Без вспышек. Без грома. И без музыки. Просто в какой-то момент его не стало. Будто кто-то аккуратно вырезал силуэт из воздуха.</p>

    <p>Только снег за окном продолжал идти. Доктор ещё долго сидел на кухне. Молча. Потом сам не заметил, как уснул прямо за столом.</p>

    <p>Утром он проснулся резко. По привычке. Первые секунды лежал неподвижно. И почти убедил себя, что всё это было сном.</p>

    <p>Странным. Хорошим. Невозможным.</p>

    <p>Он медленно встал. Прошёл на кухню.</p>

    <p>И замер.</p>

    <p>В прихожей стояли кроксы. Те самые.</p>

    <p>Потёртые. Нелепые.</p>

    <p>Возле холодильника лежала записка.</p>

    <p>А на столе стояла бутылочка сингулярного напитка.</p>

    <p>На дне оставалось всего несколько серебристых капель.</p>

    <p>Доктор медленно взял записку.</p>

    <p>Развернул. И невольно улыбнулся.</p>

    <p>Там было написано:</p>

    <p>«Не сваливайся к чертям.</p>

    <p>Они просили тебя не присылать к ним»</p>

    <p>Доктор тихо рассмеялся.</p>

    <p>Впервые за очень долгое время по-настоящему.</p>

    <p>Потом подошёл к окну.</p>

    <p>За стеклом просыпался город.</p>

    <p>Уставший. Раненый. Странный, но живой.</p>

    <p>И где-то очень высоко два архивариуса молча закрыли личное дело. На обложке мягко светилась печать:</p>

    <p>«Командировка завершена.</p>

    <p>Оба выжили…»</p>
