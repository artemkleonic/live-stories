    <p>Дом на краю обрыва</p>

    <p>Коль есть проклятие в судьбе,</p>
    <p>потребность в изреканьи истин,</p>
    <p>тогда пиши шальные письма,</p>
    <p>но только самому себе.</p>

    <h2>Пролог</h2>

    <p>Мир переполнен людьми, которые не умеют молчать внутри себя.</p>

    <p>И потому говорят наружу все подряд. Они называют это искренностью, свободой слова, поиском правды. На деле это чаще всего просто шум. Непереработанный, неосмысленный, не дожитый до конца. Страхи, обиды, комплексы, случайно подхваченные идеи, чужие лозунги, личные трагедии, выданные за убеждения.</p>

    <p>Само по себе это не зло. Зло начинается тогда, когда человек тащит все это к другим. К тем, кто его внутренний склад старых вещей не арендовал и экскурсию туда не заказывал.</p>

    <p>Иногда такой человек молчит. И тогда он, в худшем случае, производит только углекислый газ. Ни пользы, ни смысла, ни вреда. Уже неплохо. Но гораздо чаще он начинает вещать. И вот тут начинаются настоящие неудобства.</p>

    <p>Посмотрите на людей после алкоголя. Чуть выше той дозы, которая им нужна. Один тихо уходит спать, и утром ему стыдно разве что за пустую бутылку. Другого же тянет на подвиги, разговоры и внезапную честность, которой никто не просил. Он становится смелым, принципиальным, прямым. Всплывают старые обиды, несказанные претензии, забытые комплексы. Он или она звонит бывшим. Пишет длинные сообщения. Требует понимания, участия, справедливости, любви, а иногда всего сразу.</p>

    <p>И спирт тут ни при чем. Он просто снимает крышку с того, что и так давно бродило внутри.</p>

    <p>Почему звонят бывшим?</p>

    <p>Потому что внутри слишком много несказанного, а сказать некому. Потому что проще нарушить чужие границы, чем навести порядок в собственных. Потому что молчать внутри себя, это навык. А ему почти никто не учит.</p>

    <h2>Основная часть</h2>

    <p>Фанатики, крикуны, люди с горящими глазами и готовыми ответами, это далеко не сильные личности. Это дома, построенные на краю обрыва. Пока почва держит, они выглядят внушительно. Даже эффектно. Но стоит сделать один неверный шаг, и рушиться начинает все сразу.</p>

    <p>Иногда такие люди приходят за помощью. Не потому, что хотят понять себя. А потому, что хотят, чтобы их услышали. Пожалели. Поддержали. Помогли деньгами. Или хотя бы вниманием. Чтобы самим себе доказать, что они существуют и все еще имеют вес в этом мире.</p>

    <p>Им кажется, что если говорить долго, громко и убедительно, боль внутри сама рассосется. Это фатальная ошибка. Особенно часто такое случается, когда нервы уже на пределе. Когда времени нет, а ждать нужно. И неизвестно еще сколько.</p>

    <p>Обратите внимание на очередь.</p>

    <p>Очередь, это удивительное место. Почти лаборатория. Там наружу выползает все, что человек годами аккуратно прятал под воспитанием, должностью и вежливой улыбкой. Спокойный пройдет мимо, даже не заметив напряжения. А может, и в такую очередь не станет. Но если внутри уже давно пошла трещина, она обязательно даст о себе знать.</p>

    <p>В банках, в аэропортах, в магазинах, на заправках. Там, где у всех мало времени и еще меньше информации. Прекрасные места для изучения человеческой природы. Платные, бесплатные, круглосуточные, с кондиционером и без. Но суть у них одна.</p>

    <p>Однажды я разнимал драку в центре МРТ.</p>

    <p>Сначала услышал возню. Подумал, что кто-то поскользнулся и не удержался в выражениях. Бывает. Но голоса не стихали. Наоборот, страсть только накалялась. Пришлось выйти.</p>

    <p>Сцепились администратор и пациент. Пожилой мужчина, отставной военный, пришел с внуком. Внук участия в битве не принимал. Он стоял и наблюдал, как его дед мужественно сражается с девушкой лет на пятьдесят его моложе. Вторая мировая робко, сгорбившись, прошла вдоль стены к кухне и поставила там чайник.</p>

    <p>Дрались всерьез. Без театра. Почти валяясь по полу.</p>

    <p>МРТ делали даже не ему. Конфликт был не про обследование. И не про очередь. Он был про то, что почти всегда всплывает первым. Про страх и обиду.</p>

    <p>Она имела неосторожность высказать свое мнение вслух. Не ему, своей коллеге. Что, мол, дед пришел отмазывать внука от армии. А он услышал. И не смог проглотить. Внук был призывного возраста. Как и ее сын. Дед вскипел. Обозвал ее, не стесняясь выражений. А она оказалась не из тех, кто проглатывает. Ответила. И понеслось.</p>

    <p>Слова полетели одно за другим. Все это происходило на глазах у очереди. Остановиться уже было невозможно. Потом в ход пошли руки.</p>

    <p>В такие моменты нет никакого желания бросаться между ними, мирить, утешать и играть в благородного посредника. Жалко только невольных зрителей. Людей, которые тихо сидят в холле и ждут своего заключения. Они ведь не выбирали ни это место, ни этот спектакль. Им просто выдали направление.</p>

    <p>Самое интересное, что если бы там не было зрителей, скорее всего, не было бы и драки. Их взаимные «любезности» растворились бы в воздухе и остались обычной словесной гнильцой. Но когда есть публика, у внутреннего цирка всегда больше шансов на гастроли.</p>

    <p>Они были неправы оба. Но дело не в правоте.</p>

    <p>Эмоция породила действие. А действие не возникает на пустом месте. Значит, урок, который нужно было пройти, остался непройденным у обоих.</p>

    <p>Я не люблю засиживаться на корпоративах. Коллективу нужно расслабиться и почувствовать себя без начальства. Тогда люди выдыхают по-настоящему. Поздравить и уйти, вот лучший подарок.</p>

    <p>Но однажды я задержался.</p>

    <p>Все начиналось душевно. А потом наступила та самая фаза опьянения, когда глаз еще не залит, а мозг еще не переключился на одни рефлексы. В этот момент люди особенно разговорчивы. И особенно честны. Не в смысле правдивы, а в смысле плохо прикрыты.</p>

    <p>Кто-то начинает острить.</p>

    <p>Кто-то, и особенно странно это выглядит у взрослых женщин, вдруг берет на себя роль тамады низкого пошива. Без вкуса, без такта, без чувства меры. Пошлость и примитивные шутки идут рука об руку, как давние подельники. Все работает на зрителя. Нужна его оценка, реакция, поддержка. Нужно, чтобы кто-то снаружи подтвердил: да, ты существуешь, ты интересен, ты свой.</p>

    <p>Остановиться уже нельзя. Слова льются сами.</p>

    <p>А утром она это забудет. Но еще вечером, если смотреть не в тарелку, а на человека, понимаешь: с ним тебе дальше не по пути. Не из-за шуток. Из-за того, что они показали. Эмоция на мгновение проявила рентгеновский снимок личности. И человек его даже не заметил.</p>

    <p>Позже те двое, администратор и ее коллега, неожиданно нашли общий язык.</p>

    <p>Так бывает. Людей часто сближает не примирение, а общий интерес.</p>

    <p>Они объединились. Спокойно, без лишнего шума, и придумали схему. Пациенты, уже оплатившие диагностику, переводились в разряд страховых. Бумаги, дело гибкое. Страховые компании платят позже, а деньги вот они, уже здесь. А фамилии пациентов потом сотрутся в цифровом поле, там, где всем удобно ничего не помнить. Ничего личного. Просто немного увеличили личный доход.</p>

    <p>Снаружи все выглядело прилично. Очереди. Улыбки. Стандартные фразы. Ни криков, ни истерик. Только аккуратно выстроенная система.</p>

    <p>Конечно, все это вылезло. Такие вещи всегда вылезают. Документы легли на стол. Факты стали упрямыми. И вот тогда началось самое интересное.</p>

    <p>Слова.</p>

    <p>Не очередь. Не конфликт. Не алкоголь.</p>

    <p>Слова, когда стало ясно, что дальше прятаться некуда. Пока разговор шел в кабинете, там было тихо. Но потом, уже за его стенами, дед с внуком на их фоне давно бы выкинул белый флаг и капитулировал. Они говорили много. Громко. Уверенно. Обвиняли всех: руководство, систему, пациентов, страну, время. Только не себя.</p>

    <p>В их словах было все. Обида. Праведный гнев. Чувство несправедливости. Попытка выставить себя жертвами обстоятельств.</p>

    <p>Не было только одного. Раскаяния.</p>

    <p>Не было паузы. Не было тишины. Не было попытки остановиться и хотя бы раз услышать самих себя.</p>

    <p>И тогда стало окончательно ясно: та драка в очереди не была случайностью. Это была репетиция. Тогда вырвалось слово. Потом действие. Потом схема. Потом крах.</p>

    <p>Конечно, мы расстались. Спокойно. Без крика. Так даже правильнее.</p>

    <p>Иногда люди приходят не сами. Их приводят обстоятельства. И уходят они часто так же, под руку с ними.</p>

    <p>Дом доктора стоял на краю села.</p>

    <p>Да и доктором он был когда-то очень давно. Еще до войны.</p>

    <p>Потом он ушел из медицины. Не хлопнув дверью и не проклиная профессию. Просто однажды понял: лечить тело он умеет, но все чаще к нему приходят с тем, что не видно ни на снимках, ни в анализах. И тогда он занялся тем, к чему, как оказалось, шел всю жизнь.</p>

    <p>Дом он строил сам. Не один, конечно, помогали люди. Но все, что заработал за большую часть жизни, он вложил именно сюда.</p>

    <p>С этим домом была связана своя история. Если бы не цепочка почти случайных обстоятельств и редкая удача, его бы здесь не было.</p>

    <p>Когда-то, еще в браке, они купили старый деревянный домик. Потом был развод. Тяжелый, как все разводы. В таких историях обычно проигрывают оба. Но он сумел сохранить трезвый рассудок. Не дал волю эмоциям. Вернул бывшей супруге ее часть честно, до последней копейки. И оставил за собой только этот кусочек земли и дерева.</p>

    <p>Тогда дом действительно висел над обрывом. Почти буквально. Казалось, еще немного, и все рассыплется. Но он устоял. И со временем стал крепким, теплым и основательным. Не в центре села, а на окраине. В стороне от накатанных дорог. Там, где тише. Там, где меньше суеты и больше правды.</p>

    <p>Он сохранил его. А потом приумножил.</p>

    <p>К нему начали приходить люди. Не по объявлению. Не по рекомендации. Просто кто-то однажды сказал: там можно поговорить. За советом. За помощью. За возможностью выговориться.</p>

    <p>Он всегда слушал долго. Почти не задавал вопросов. Человек иногда произносит вслух то, чего боится сказать даже самому себе. А доктор тем временем подливал из своей темной бутылки что-то простое, теплое, сделанное его руками. Не для опьянения. Для снятия защиты.</p>

    <p>Разговор шел сам собой.</p>

    <p>И уже от этого человеку становилось легче.</p>

    <p>Но в конце он всегда задавал один и тот же вопрос:</p>

    <p>Что же вы хотите от меня? Чем я могу помочь?</p>

    <p>И почти всегда слышал в ответ:</p>

    <p>— Я правильно поступаю?</p>
    <p>— А как мне быть?</p>
    <p>— Что мне делать?</p>

    <p>Тогда он задавал еще один вопрос. Всего один:</p>

    <p>— А как бы ты сам хотел поступить?</p>

    <p>И вот тут человеку становилось трудно. Сознание начинало оправдываться, юлить, защищаться, уходить в туман. Оно мешало. Но глубже ответ уже был. Организм знал. Душа знала. Просто человеку страшно было услышать собственную правду без свидетелей и аплодисментов.</p>

    <p>Нужно было только дать этому ответу выйти.</p>

    <p>Если это удавалось, жизнь менялась. Не сразу, но необратимо. Человек понимал, где именно получает урок. И проходил его быстрее и менее болезненно, чем если бы снова делал вид, что проблема где-то снаружи.</p>

    <p>Сложно сделать себе самому нейрохирургическую операцию.</p>

    <p>Сложно самому вырезать себе аппендицит.</p>

    <p>Нужен специалист. Так и тут.</p>

    <p>Проблемы, как правило, оказывались не снаружи. Они почти всегда жили внутри. И задача была не спрятать их глубже, не залить бальзамом от боли и воспоминаний, не накрыть красивой философией, а наоборот: найти, рассмотреть, вынуть и понять, что дальше с этим делать. А ту пустоту, что образуется после честной работы, заполнить чем-то живым.</p>

    <p>В этом он и помогал.</p>

    <p>Одна его знакомая долго не отвечала на сообщения. А он иногда позволял себе шалость: отправить ей шутку, картинку, короткую историю. Она, как и он, любила природу, грибы, простые радости. Но на этот раз была тишина.</p>

    <p>Он спросил, что случилось.</p>

    <p>Ответ пришел не сразу. Короткий. Грубый. Настолько, что он не стал переспрашивать. Выдержал паузу.</p>

    <p>Потом задал вопрос еще раз. И ответ был тем же.</p>

    <p>А потом она заговорила.</p>

    <p>Жизнь у нее была непростая. Муж с тремя судимостями. Первую она пережила честно: передачи, ожидание, вера в то, что человек выйдет и изменится. Восемь лет от звонка до звонка. Потом усталость. Потом развод. Потом повтор. Рецидив. Слово сухое, но за ним всегда стоит одно и то же: человек не захотел менять себя.</p>

    <p>У них есть общий сын. Ему двадцать три. И он игрок. Лудоман. Охотник за легкими деньгами и тяжелыми последствиями.</p>

    <p>Он тайком брал кредиты. Не у банков. У тех, кто не пишет договоров и не любит бумагу. Долги росли, как грибы после дождя, только радости в этом было значительно меньше. На словах, но с процентами, от которых перехватывает дыхание. Говорят, карточный долг свят. Никто не знает, откуда это взялось, но люди вообще с удивительным азартом верят в любую чушь, если она звучит достаточно уверенно.</p>

    <p>Мать тянула. Платила. Искала деньги. А он брал снова.</p>

    <p>Когда она рассказывала, голос сорвался. Было слышно, как тяжело ей вообще об этом говорить.</p>

    <p>Но хуже всего было другое.</p>

    <p>Долги теперь выбивают не так, как раньше. Никого не везут в лес. Никого не бьют. И даже не арестовывают счета. Теперь бьют репутацией.</p>

    <p>Через социальные сети. Через фейки. Через истории о больной матери, которой срочно нужны деньги на операцию. Будто это пишет он сам.</p>

    <p>Так формируется ненависть там, где раньше было доверие.</p>

    <p>Она искала средства, чтобы закрыть хотя бы часть долга. Не чтобы спасти сына. А чтобы прекратились гонения. Чтобы стало тише. Чтобы хотя бы на время перестало ползти это липкое унижение по знакомым лицам, чатам и телефонам.</p>

    <p>И вот тут начиналось самое неприятное.</p>

    <p>Если разбираться честно, проблема была не в сыне.</p>

    <p>Проблема была в ней.</p>

    <p>Как в любой трагедии, где любовь перепутали с ответственностью, а жалость с самопожертвованием.</p>

    <p>Она говорила ему:</p>

    <p>— Как ты мог снова ударить меня ножом в спину?</p>

    <p>Но действовала так же, как и раньше.</p>

    <p>Закрывала. Спасала. Платила.</p>

    <p>Дом, в котором она жила, уже давно стоял на краю обрыва и трещал по швам. Но она продолжала подпирать его собственными руками, искренне считая это добродетелью.</p>

    <p>Лечить нужно было не сына.</p>

    <p>Лечить нужно было ее.</p>

    <p>Потому что разрушительные эмоции, это не только крик и не только слезы. Это еще и действия, которые повторяются снова и снова под видом заботы, любви и благородства.</p>

    <p>Она все еще искала себе мужчину.</p>

    <p>Но такого же, как и раньше.</p>

    <p>Те же эмоции. Тот же сценарий. Тот же нерв. Те же провалы.</p>

    <p>И именно эти эмоции снова и снова подталкивали ее к действиям. Не к спасению сына. К разрушению себя.</p>

    <p>Сын давно был взрослым. А нужно ведь не так много: уметь отвечать за свои слова и поступки. Но ответственность, это единственное, чему нельзя научить человека, если постоянно забирать ее на себя и носить, как чужой мешок с цементом.</p>

    <p>У любого человека есть чувства.</p>

    <p>И у любого человека есть органы чувств.</p>

    <p>Но кроме этого у него есть эмоции. И вот с ними все куда сложнее.</p>

    <p>С точки зрения физиологии чувства, вещь понятная и полезная. Они помогают нам адаптироваться к миру. Мы видим опасность и отходим. Видим закат и замираем. Слышим тревожный звук и поворачиваем голову. Слышим красивую музыку и хотим, чтобы она длилась дольше.</p>

    <p>Мы различаем прикосновение змеи и прикосновение любимого человека.</p>

    <p>Мы отличаем плач ребенка от плача своего ребенка.</p>

    <p>Так устроена природа. Чтобы мы выживали.</p>

    <p>Органы чувств заботятся о теле.</p>

    <p>А эмоции пытаются заботиться о душе.</p>

    <p>Если эмоция приятная, мы остаемся.</p>

    <p>Если тревожная, готовимся к действию.</p>

    <p>И в этом нет ничего плохого. Страх, гнев, раздражение, зависть, жадность, это не пороки. Это сигналы. Они всегда возникают не просто так. Они говорят: что-то угрожает твоей целостности. Иногда внешне. Но чаще изнутри.</p>

    <p>Гнев может подтолкнуть поднять камень. А может заставить убежать. Но в любом случае он пытается защитить.</p>

    <p>Проблема начинается там, где человек пытается заглушить сигнал, а не понять его источник.</p>

    <p>Он оправдывается. Говорит много слов. Строит защиту не против причины, а против самого факта, что эмоция возникла. Он мажет рану зеленкой, не вытаскивая занозу, и делает вид, что все прошло.</p>

    <p>Но не проходит.</p>

    <p>Урок будет повторяться. В другой очереди. С другим человеком. В другой форме. С большей болью.</p>

    <p>Пока не будет выполнен.</p>

    <p>Проработка, это не когда стало тише. А когда прежний раздражитель больше не вызывает той же эмоции. Не потому, что человек научился терпеть и красиво улыбаться. А потому, что внутри больше нечему болеть.</p>

    <p>Вот только тогда можно сказать, что ситуация завершена.</p>

    <p>Бывают гостиницы, в которых, побывав однажды, никогда больше не хочешь оказаться.</p>

    <p>А бывают другие. С виду невзрачные, даже простые. Но в них что-то тянет. Не сразу. Не логикой. Какая-то сила, которую трудно объяснить словами.</p>

    <p>Может быть, это уют. А может, ощущение дома. Может, спокойное радушие без показной важности. Продуманные мелочи. Столик внизу. Простая еда. Тишина. А может, просто то редкое чувство, когда пространство не пытается тебе понравиться, а просто позволяет быть.</p>

    <p>Я всегда говорил: есть намоленные места. Как церкви. В одной есть благодать, в другой нет, хотя стены и иконы похожи.</p>

    <p>Возможно, пример не самый точный, но у дома доктора была именно такая внутренняя аура. Не внешняя. Внутренняя.</p>

    <p>К нему нужно было свернуть с асфальта и немного проехать по грунтовке. Но стоило въехать за ворота, и когда они закрывались за спиной, происходило что-то едва уловимое. Будто менялось само понимание жизни.</p>

    <p>Возникало ощущение, что у дома есть свой дух. Он встречал, смотрел внимательнее, чем люди, и будто сканировал самые тонкие материи. Не биографию, а состояние. И уже знал о тебе больше, чем ты был готов признать.</p>

    <p>В этот момент человек вдруг понимал: он пришел именно туда, куда шел очень долго. Даже если сам этого до конца не осознавал.</p>

    <p>Потом появлялось другое чувство. Желание вернуться. Не у всех.</p>

    <p>Я замечал, что некоторые, побывав здесь однажды, больше не появлялись. Обходили дом стороной. Говорили, что им здесь не по себе.</p>

    <p>А он никогда не пытался понять почему. Не всех нужно удерживать.</p>

    <p>Его всегда больше интересовали другие. Те, кому это место давало уверенность в завтрашнем дне. Будто на территории стоял невидимый страж. Он пускал всех, но принимал не каждого.</p>

    <p>Тех, кто воспринимал происходящее как угрозу своим привычным оправданиям, он мягко отталкивал.</p>

    <p>А тех, кто приходил по зову, без четкой формулировки, но с внутренней готовностью, встречал радушно.</p>

    <p>Дом никого не лечил.</p>

    <p>Он просто не позволял врать.</p>

    <p>Бывают дни, когда людей много.</p>

    <p>Бывают недели тишины.</p>

    <p>А бывает так, словно сам дом говорит своему хозяину: остановись. Отдохни. Набери сил. Я побуду за тебя.</p>

    <p>В такие периоды пространство вокруг будто сгущается. Покой становится почти осязаемым. Не пустота. Именно покой. То состояние, когда ничего не требует немедленного ответа, а мир, впервые за долгое время, не лезет к тебе в душу грязными ботинками.</p>

    <p>И вот однажды, в такой тишине, листая ленту новостей, он наткнулся на пост своего коллеги, врача-нейрохирурга.</p>

    <p>Тот написал эмоционально. Слишком.</p>

    <p>Это был не текст. Это был крик. Громкий, обнаженный, без запроса и без цели.</p>

    <p>Зачем он это сделал, было непонятно.</p>

    <p>Но эмоция была настолько сильной, что социальная сеть отреагировала мгновенно. Одни начали поддерживать, не вчитываясь и не разбираясь. Другие прошли мимо. Эмоция, которую он транслировал, цепляла. Тянула. Хотелось либо встать рядом, либо отвернуться.</p>

    <p>Если же остановиться и посмотреть внимательнее, становилось ясно: это были не мысли. Это были порывы. Состояние, в котором психика ищет не решения, а подтверждения собственной правоты.</p>

    <p>И тогда мне пришло простое понимание.</p>

    <p>Когда с психикой не все в порядке, человек идет не внутрь. Он идет наружу. В социальные сети. В комментарии. В виртуальное пространство. Не чтобы разобраться. А чтобы защититься. Он оправдывается заранее.</p>

    <p>Выстраивает щит из слов.</p>

    <p>И забрасывает крючок, даже сам этого не понимая.</p>

    <p>Самое опасное в этом не для него.</p>

    <p>А для тех, кто читает.</p>

    <p>Потому что эмоция заразна.</p>

    <p>Ее можно подхватить, даже не заметив. И вот ты уже готов бежать рядом, говорить теми же словами, защищать чужую боль как свою. Хотя еще минуту назад у тебя была собственная жизнь, собственная голова и, казалось бы, хотя бы минимальный иммунитет.</p>

    <p>Именно в этот момент важно остановиться. Не спорить. Не поддерживать. Не осуждать.</p>

    <p>А задать себе один-единственный вопрос:</p>

    <p>Это мое?</p>

    <p>Или я просто оказался рядом с чужим внутренним шумом?</p>

    <p>Но если ты оказался рядом, значит, тебе это зачем-то нужно.</p>

    <p>И тогда, как ни странно, вспоминается простая формула. Та, с которой все началось. Не как совет. Как правило выживания.</p>

    <p>Коль есть проклятие в судьбе, потребность в изреканьи истин, тогда пиши шальные письма, но только самому себе.</p>

    <p>И дом в этот момент молчит.</p>

    <p>Потому что все нужное уже сказано не вслух.</p>

    <h2>Эпилог</h2>

    <p>Дом стоял на своем месте.</p>

    <p>Как стоял и вчера. И год назад. И тогда, когда в нем еще не было ни разговоров, ни темных бутылок, ни людей, ищущих ответы.</p>

    <p>Он никуда не звал.</p>

    <p>И никого не удерживал.</p>

    <p>Иногда по вечерам доктор выходил на крыльцо. Садился. Смотрел, как медленно гаснет свет за деревьями, как туман ложится на землю, будто стараясь укрыть ее от лишних взглядов.</p>

    <p>В такие моменты не хотелось ни говорить, ни думать. Все нужное уже было прожито.</p>

    <p>Он знал: не все уроки даются сразу. Некоторые возвращаются. Некоторые ждут годами. А некоторые человек так и не решается пройти.</p>

    <p>Но это уже не его выбор.</p>

    <p>Его задача была простой: создать место, где можно услышать себя. Без оправданий. Без зрителей. Без необходимости играть роль перед теми, кто завтра и имени твоего не вспомнит.</p>

    <p>Кто-то приезжал один раз.</p>

    <p>Кто-то возвращался.</p>

    <p>Кто-то так и не решался войти за ворота.</p>

    <p>И это было правильно.</p>

    <p>Потому что дом, как и человек, принимает не всех. А только тех, кто готов смотреть внутрь, а не искать подтверждений снаружи.</p>

    <p>А шальные письма…</p>

    <p>Они так и оставались без адресата.</p>

    <p>Иногда на бумаге.</p>

    <p>Иногда в голове.</p>

    <p>И, пожалуй, в этом и было самое точное лечение. Без рецептов. Без диагнозов. И без необходимости кому-то что-то доказывать.</p>

    <p>Дом стоял.</p>

    <p>Доктор жил.</p>

    <p>А жизнь шла дальше.</p>

    <p>Тихо.</p>

    <p>Как и должно быть.</p>
