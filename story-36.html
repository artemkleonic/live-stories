<h2>Мысли обрывки о крафте</h2>
<p>В отличие от роскошных ресторанов с дресс-кодом, швейцаром на входе и изысканным меню, тут все намного проще. Это мир простых радостей, где нет ни стресса, ни пафоса. Здесь всегда шумно, пахнет дымом, жареным мясом, специями, а в воздухе смешиваются запахи, от которых моментально бурчит в животе. Как правило, такой еды всегда много, она вполне доступна, не очень дорога и при этом может оказаться весьма недурна собой.  Правда, это как лотерея: один раз вы сорвёте джекпот, а в другой - расплатитесь сполна. Выбор ее так велик, а последствия вашего мимолетного с ней знакомства так непредсказуемы, что впечатления от встречи могут быть самыми разнообразными. И они всегда остаются в памяти надолго. Для одних это новые вкусы, рецепты и формы подачи блюд, для других, бессонные ночи, боли в животе и долгие изнуряющие диеты.</p>
<p>В идеале, тот час наслаждения ею должен быть прекрасен с первого мгновения и до салфетки, впитывающей в себя все остатки вашей радости от ее обладания. С трепетом и любовью к ней должна пройти каждая минута вашего короткого свидания.</p>
<p>Уличная еда должна радовать с первого взгляда, с первого прикосновения к ней. В этот короткий час она должна стать вашей любовницей, разжигающей аппетит и погружающей в абсолютное наслаждение.</p>
<p>Она пахнет приятно, слюна выделяется обильно, думать о чем то другом сложно, но овладеть ею прямо сейчас хочется неудержимо. Это, как длинные стройные ноги в коротких шортах на которые, свернув шею, оглядываются все без исключения. Они прямые, как струны гитары, а вы тысячу лет до этого не слышали даже звуков губной гармошки.</p>
<p>Чего же вам хочется прямо сейчас в холодный, но освещенный яркими городскими огнями вечер? Наверняка, чего-то горячего? В меру острого и пикантного, что будоражит аппетит, и тут же его умело удовлетворяет. После такой порции одним хочется спать, другим, наполненным уже энергий через край, совершать подвиги.</p>
<p>Борщ? Деруны в сметане? Или плов? Где все рисовые зернышки в казане лежат как близняшки, но при этом каждая из них по отдельности находится в предвкушении ощущения близости от обладания только ею одной.</p>
<p>А может это шашлык с такой густой красной аджикой или горячий жирный стейк с рюмкой кристально чистой водки?</p>
<p>Невероятные запахи сводят с ума, голову кружит глинтвейн и вишневая настойка. В воздухе витает аромат кофе, жареного мяса и праздника. Креветки в аквариуме еще трепыхают своими хвостиками, филе из красной рыбы томиться на углях, а маленькие бутербродики с красной икрой так аппетитны и подзывают вас подойти к ним поближе, что вы теряете самообладание и верность своим домашним вареникам.</p>
<p>Не думая особо о цене, у вас в руках уже горячая со всех сторон, белая, как кружева или разовая, как рассвет, бумажная тарелочка с кусочками жареного мяса и свежими маленькими листочками зелени. В свете уличных фонарей - они божественно прекрасны. А с рюмочкой холодной перцовки неразлучны. Ноги отказываются идти дальше. Глаза, ищут свободное местечко подальше от шарящих взглядов зевак и небольшой столик, за который достаточно присесть и на миг забыть обо всем, чтобы овладеть наконец всей этой вкуснятиной.</p>
<p>Все лавочки в городском парке предательски заняты. Вход туда для вас закрыт. Там своя атмосфера гуляющих с колясками мамаш, то и дело бросающих свои строгие взгляды на все, что мешает сну их колясочных малышей. Да и законы, запрещающие получать удовольствия такого рода в общественных местах, тут не на вашей стороне.</p>
<p>Конечно, уличная еда без напитков, это как чай без заварки. Но при этом она по праву может оставаться таковой не переходя в статус закусок.</p>
<p>Отец ведет своего сына между дымящимися мангалами, казанами, шаурмичными и стеллажами крафтовых водок. Двенадцать лет - это тот возраст, когда уже ты знаком с пикником на природе, но Макдональдз еще по прежнему тебя манит с невероятной силой. Противоречия внутри борются между собой. Привычное Big Mac иеню из заведения с большой буквой «М».  Что то волшебное и магическое тут и сейчас, к чему хочется прикоснуться мгновенно.</p>
<p>К чему то взрослому и неизвестному, но такому восхваленному заранее отцом, а потому еще более интригующему и заветному тянется рука. И вот тут очень важно не сделать той роковой ошибки, от которой будет зависеть отношение к такому виду еды на всю дальнейшую жизнь.</p>
<p>Примерно в десять лет я впервые в жизни попробовал сушеную рыбу. Именно ту, которую с таким старанием разбирали мужики за кружками пива на крошечных и крашеных синей масляной краской железных столиках. Тогда этот столик был похож на длинный вкопанный в землю столб с большой круглой крышкой сверху. За ним могли стоять два-три человека и развернув газетенку, отщипывать кусочки мяса от рыбьего хребта. Отряхивая остатки чешуи и запивая все это янтарно-пенным напитком, в глазах у них читалось несказанное удовольствие. Мне достался тогда хвостик от плоской и деревянной как табуретка небольшой рыбки. Соленый, жесткий и сухой. Я съел его достойно как мог, не морщась и не выплевывая, но до взрослых лет я осознанно не прикасался больше к такому «деликатесу». Одесский привоз со всем своим изобилием и разнообразием от камбалы до дунайки так и не смог уговорить меня на что-то схожее. Более двадцати лет прошло с того момента, как мне удалось попробовать мясо правильно приготовленной тарани, вынув одну за одной реберные косточки из ее тела, как из масла, и под это еще насладится вкусом ее замечательной вяленой икры. Тогда мне повезло. И детский негативный опыт сменил тот другой, который и есть единственно верный.</p>
<p>Но двадцать лет я не только не ел сушеную рыбу, я даже не пил пиво.</p>
<p>А что , если бы у меня не было второго шанса?</p>
<p>Так вышло, что я вырос на красной икре. Нет, я не жил на Сахалине, но моя бабушка была врачом небольшой районной поликлиники в Одессе. Было это в те далекие времена, когда пациенты свою благодарность измеряли еще духами, туалетным мылом и красной икрой. Кое что из этого мне перепадало. Красная икра была сделана по ГОСТу того советского времени, по видимому, как и духи, носившие название красная Москва. Хоть они и не были выходцами из знаменитых французских фабрик, но из всех прелестей у них был очень стойкий штын, сохраняющийся несколько дней. Такая редкая стойкость духов в красной картонной коробочке конечно определяла их стоимость, но запах, ароматом это назвать было сложно, на века остался в моей памяти. Так пахли учительницы в школе, продавцы галантереи и врачи того времени.</p>
<p>Но вот красная икра, в маленьких зеленых баночках была венцом творения доведенного до совершенства. На нарезаный поперек белый батон, смазанный маслом ее помещалось мало. Икринки были размером с крупную виноградину и их можно было пересчитать. Вкус того белого хлеба, масла и икры был незабываем. Гарик Кричевский в своей песне не даром поднимал тост за музыкантов и врачей, упоминая такой бутерброд. Воспоминания живы и поныне. Как говорил классик - вкус божественный - цена безбожная.</p>
<p>Его ни с чем нельзя спутать. Сегодня технологии производства продуктов питания позволяют имитировать хлеб, масло и красную икру, а правила торговли не запрещают ее продавать как натуральную и ничем не отличимую от оригинала.</p>
<p>За лишь одним расхождением - подделка. Молодой человек двенадцати лет, так бодро шагающий за руку с отцом, принявший сегодня непростое решение в пользу уличной еды вопреки любимому макДональдсу, обязательно попробует прямо тут и сейчас этот бутерброд с икрой, намазанный на ломоть хлеба, смазанного сливочным маслом. Белый хлеб окажется тостовым, с предельно высоким содержанием ацетата кальция, ведь именно это не дает размножаться плесневым грибкам, а хлебу цвести. Масло окажется неплохим по качеству маргарином, а красная икра - имитированным пищевым продуктом по форме, цвету и содержанию очень схожей с оригинальной. Но сделана она будет из рыбьего бульона лососевых рыб и желатина с использованием современных пищевых технологий. Отцовский авторитет, как и его крепкая рука, приведшая сюда малыша, не вызовет у него сомнения в подлинности этих продуктов, но все дальнейшие бутерброды с ней будут теперь ему конечно казаться не такими вкусными, как этот.</p>
<p>Будет ли возможность через лет двадцать попробовать то, что возможно так кардинально изменит его представление о красной икре, потомкам нашим еще предстоит узнать.</p>
<p>В свете гирлянд крафтовая водка отражается синими и желтыми огоньками. Длинная узкая бутылка с неразборчивым первым словом, но четко читающимся за ним вторым - гуральня, напоминает дорогой флакон духов и не вызывает никаких сомнений в подлинности этого крафтового напитка. Вкус деревенской самогонки чувствуется с первым глотком, но кто же будет на это обращать внимание, когда над деревянным домиком с дубовыми бочками вместо стен, большими светящимися буквами читается слово Крафт.  Кто знает? Но, возможно, пройдет 20 лет и этот маленький сухой рыбий хвостик, в виде рюмки крафтовой уличной водки с запахом деревенского самогона, доставшийся уже отцу двенадцатилетнего пацана сегодня, еще обернется для него по истине достойным крафтовым напитком.</p>
<p>Крафт - понятие весьма странное. Сегодня им называют почти всё подряд. Достаточно повесить над деревянным прилавком гирлянду, вкрутить лампочки Эдисона, написать мелом на черной доске «handmade» и поставить на полку длинную бутылку с сургучом на горлышке. После этого даже вчерашний спирт из промышленной цистерны внезапно начинает считаться «ремесленным».</p>
<p>Хотя настоящий ремесленник никогда спирт не покупает. Он делает его сам. От начала и до конца. Своими руками. И если уж быть совсем честным, то у настоящего ремесленника вообще не должно быть ни покупного спирта, ни наемных сотрудников. Пока тебе помогают только собственные руки, семья и люди, которым не все равно, это еще ремесло. Но как только появляется человек, которому ты платишь зарплату за производство души, начинается пусть маленький, но уже завод.</p>
<p>И в этом нет ничего плохого. Просто это уже другой мир. Мир стандартов, регламентов и повторяемости.</p>
<p>Настоящий промышленный продукт обязан быть одинаковым всегда. Именно поэтому чизбургер в Макдональдсе пахнет одинаково в любой стране мира. Именно поэтому пломбир, наггетсы и газировка имеют тот вкус, который человек должен узнать с первого укуса даже спустя десять лет.</p>
<p>Корпорации тратят миллионы, чтобы победить случайность.</p>
<p>Ремесло же живет именно благодаря ей.</p>
<p>Борщ у одной и той же хозяйки никогда не бывает одинаковым. Сегодня помидоры оказались слаще. Завтра перец острее. Осенью сметана гуще. Весной укроп пахнет иначе. Да и сама хозяйка сегодня счастлива, а через неделю устала и молчалива.</p>
<p>И человек, пробующий этот борщ, тоже уже другой.</p>
<p>Поэтому настоящий ремесленный напиток не может быть идентичным прошлогоднему. Именно это многие ошибочно считают недостатком, хотя на самом деле в этом его главное достоинство.</p>
<p>Наверное, именно поэтому мне всегда хотелось заменить слово «крафт» другим. Более подходящим словом, и я его нашел.</p>
<p>Сингулярный напиток.</p>
<p>Тот, который невозможно подогнать под технические условия. Невозможно повторить с математической точностью. Невозможно сделать вечным и стабильным.</p>
<p>Потому что там, где начинается настоящая сингулярность, привычные законы больше не работают. Ни в физике. Ни во времени. Ни в человеческой душе.</p>
<h2>Эпилог</h2>
<p>Наверное, именно поэтому мы так любим уличную еду.</p>
<p>Не потому, что она дешевле ресторанов или вкуснее домашнего ужина.</p>
<p>А потому, что в ней еще осталось право на ошибку.</p>
<p>Право быть неидеальной.</p>
<p>Чуть пересоленной.</p>
<p>Слишком острой.</p>
<p>С дымком сильнее обычного.</p>
<p>С мясом, которое сегодня получилось лучше, чем вчера.</p>
<p>В ней еще жив человек.</p>
<p>Тот самый, который устал, не выспался, влюбился, поссорился, замерз или, наоборот, был бесконечно счастлив в тот вечер, когда готовил вам этот плов, шашлык или вишневую настойку.</p>
<p>И, возможно, именно поэтому самые сильные вкусы нашей жизни невозможно повторить.</p>
<p>Ни первую сушеную рыбу из детства.</p>
<p>Ни тот бутерброд с настоящей красной икрой.</p>
<p>Ни запах дыма в холодном вечернем парке.</p>
<p>Ни ту самую рюмку сингулярного напитка, случайно выпитую однажды где-то между шумом гирлянд, зимним воздухом и разговорами незнакомых людей.</p>
<p>Потому что настоящая сингулярность рождается не в бутылке.</p>
