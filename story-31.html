<p>О-Сознание. (Исповедь)</p>
<p>Пролог</p>
<p>У любого врача есть профессиональная деформация: мы перестаём видеть мир как набор событий. Для нас это всегда симптомы.</p>
<p>Неважно, перед тобой пациент или целое государство, механизм один и тот же: сначала хаос, потом наблюдение, а уже только потом диагноз, прогнозы и лист назначений.</p>
<p>Когда я впервые увидел эту войну, она выглядела как внезапный приступ, резкое нарушение здоровья, прямая полоса по кардиограмме судьбы.</p>
<p>Всё было непонятно, абсурдно, как у пациента, который поступает без сознания: ты чувствуешь, что беда огромна, но не понимаешь её происхождения.</p>
<p>Шум, паника, неполные данные, никакой истории болезни, лишь боль и скорость, с которой вокруг тебя разворачиваются события.</p>
<p>На первом году войны невозможно было составить прогноз.</p>
<p>На втором - невозможно было принять реальность.</p>
<p>На третьем - невозможно было поверить, что человек, стоящий по другую сторону, действительно решил уничтожить тебя, хотя это чувство возникало уже с первых дней.</p>
<p>Но вот четвёртый год… И картина начала проясняться.</p>
<p>Как в медицине: когда хаос уходит, остаются закономерности.</p>
<p>А закономерности всегда честнее любых эмоций.</p>
<p>Я ловил себя на том, что чувствую знакомое: это похоже на то, как мы когда-то в нашем диагностическом центре наблюдали за сложными случаями на МРТ.</p>
<p>Есть такие пациенты, что видишь как внешне человек ещё держится, ещё пытается шутить, ещё рассказывает, что «пройдёт само», но ты уже понимаешь: процесс идёт давно, глубоко, и поражение затронуло больше, чем кажется.</p>
<p>Но бывает и все иначе.</p>
<p>Злокачественная опухоль исчезает бесследно.</p>
<p>Чего мы только не насмотрелись тогда.</p>
<p>В мирное время.</p>
<p>И вот тогда-то приходит на помощь интуиция врача.</p>
<p>Она не мистическая, это просто опыт.</p>
<p>Осознание.</p>
<p>Ты видишь то, что не видно глазу.</p>
<p>Ты чувствуешь динамику.</p>
<p>Ты читаешь болезнь не по снимку, а по общей логике её развития.</p>
<p>Так же и здесь.</p>
<p>Сначала мне казалось, что между Украиной и Россией идёт обычный конфликт двух государств.</p>
<p>Но чем дольше я наблюдал, тем отчётливее понимал: эта «болезнь» давно вышла за пределы двух стран.</p>
<p>Она начала затрагивать соседей, союзников, рынки и мировые алгоритмы.</p>
<p>Как онкология, которая метастазирует туда, где ткани слабее и защита хуже.</p>
<p>И тогда я впервые увидел эту войну как диагноз.</p>
<p>Не политический, а человеческий.</p>
<p>Не про армии.</p>
<p>Я сейчас говорю про систему.</p>
<p>И главное, то, что я увидел роли.</p>
<p>Кто в этой истории врач.</p>
<p>Кто пациент.</p>
<p>Кто санитар, который таскает носилки, но не задаёт вопросов.</p>
<p>Кто родственник, пришедший подписывать согласие на операцию.</p>
<p>Кто сосед по палате, который просто хочет тишины и покоя, и чтобы его не трогали.</p>
<p>И я решил сформулировать свою версию этой картины.</p>
<p>Не как политолог и не как историк.</p>
<p>А как врач, который слишком долго смотрит на одно и то же поражение и наконец понимает, что оно значит.</p>
<p>Фурункул он и на заднице фурункул, и между лопаток фурункул и даже на лице.</p>
<p>Не внешне, но по структуре.</p>
<p>Два человека, которые двигаются только вместе.</p>
<p>Два человека, чьи полномочия переплетены так, что уже невозможно понять, кто думает, а кто говорит.</p>
<p>Две фигуры, стоящие во главе системы, где власть всегда концентрируется в одном узле, как в двуглавом российском орле: одна голова смотрит в прошлое, вторая, надеется, что в будущее, но обе срастаются шеями в одно и то же тело.</p>
<p>Они управляли сетью именно так, как Россия управляет сейчас собой: тихо, жестко, без лишних слов и без необходимости объяснять причины.</p>
<p>В каждом крупном областном центре России был свой директор.</p>
<p>Такой себе местный «губернатор», который управлял своим маленьким медицинским округом.</p>
<p>У кого-то был один МРТ, у кого-то два, а в некоторых городах и три.</p>
<p>В Нижнем Новгороде, например, работали сразу три точки.</p>
<p>В СПБ их было ещё больше.</p>
<p>Структура была простая как сатиновые трусы и жёсткая как волчья пасть:</p>
<p>каждый директор отвечал только за свой город, но подчинялся напрямую штаб-квартире в СПБ.</p>
<p>Все были коллегами, но только формально.</p>
<p>В реальности все директора, как губернаторы, которых даже не выбирали, а назначили, зависели от центра, как регионы зависят от Москвы: зарабатывали и переводили туда деньги, сдавали отчёты, выполняли распоряжения, не задавали лишних вопросов.</p>
<p>Раз в год всех собирали на шабаш - саммит директоров.</p>
<p>Это культовое собрание сродни параду на 9 мая.</p>
<p>Большой слет, смесь партийного съезда и школьной линейки.</p>
<p>Там подводили итоги, рассказывали о стратегии, публично хвалили «лояльных» и так же публично казнили тех, кто выбивался из колеи.</p>
<p>Кого-то увольняли прямо на сцене, показательно, громко, чтобы другим было ясно, чем заканчиваются любые попытки идти не в ногу.</p>
<p>Другим раздавали «плюшки»: премии, подарки, новые полномочия.</p>
<p>Особенно тем, кто умел красиво отчитываться, правильно кивать и демонстрировать нужную степень преданности.</p>
<p>Эта вертикаль чувствовалось сразу.</p>
<p>Даже я, будучи директором центра в соседней стране, увидел её с первых минут.</p>
<p>Когда я впервые приехал в Питер, в центр, меня представили под аплодисменты всех.</p>
<p>Как директора киевского филиала.</p>
<p>Это была не просто должность, это был политический жест.</p>
<p>Сеть медицинских центров ЛДЦ МИБС теперь официально стала международной.</p>
<p>Правда, не на долго.</p>
<p>После событий 2014 года, когда сам путин собирался перерезать ленточку в пахнущем свежей краской центре протонной терапии, название быстро изменили.</p>
<p>Международный Институт Биологических Систем имени Березина сменил свое название на Медицинский Институт Березина Сергея.</p>
<p>МИБС был.</p>
<p>МИБСом он и остался.</p>
<p>Но в 2008 году этого еще не знали.</p>
<p>Вскоре к этому списку международности добавилась Армения.</p>
<p>Там также открыли центр, назначили директора - талантливого, энергичного, яркого человека.</p>
<p>Позже он стал министром здравоохранения Армении, а затем и депутатом, выбрав тишину вместо ответственности министерского кресла.</p>
<p>Несколько слов хочется сказать о директорах филиалов.</p>
<p>Люди там были самые разные.</p>
<p>Как правило, без медицинского образования.</p>
<p>Встречались врачи, но их было удивительно мало.</p>
<p>Доктор по своей старой школе думал больше о пациенте, а не о том, как наполнять казну.</p>
<p>А здесь всё строилось именно на бизнесе.</p>
<p>Ну это и понятно.</p>
<p>Структура то коммерческая.</p>
<p>Все на цифрах, графиках, выручке, KPI.</p>
<p>Старый врачебный подход этому сильно мешал.</p>
<p>По возрасту разброс тоже был огромный: от совсем молодых, ещё прыщавых юньцов, до довольно взрослых, скорее даже престарелых тетушек, которых я бы уже назвал пенсионерами со стажем.</p>
<p>Мужчины и женщины примерно пополам.</p>
<p>И, как в любом коллективе, были те, кто чётко понимали, что они тут делают, почему они здесь и какую роль играют.</p>
<p>Но были и те, кто вообще ничего не понимал, но умудрялся как-то петлять, таинственно держаться в тени, изображать бурную деятельность и при этом оставаться незаметным.</p>
<p>А были и такие, что выпрыгивали из штанов так рьяно, что это вызывало хохот и удивление.</p>
<p>Только бы приблизиться к короне его императорского величества, Аркадию или Виктору - людям, которые могли и щедро наградить, и уничтожить одним решением.</p>
<p>На саммит директоров, по традиции раз в год, нас собирали в самых разных местах, но конечно в пределах рф.</p>
<p>У врачей был свой сбор.</p>
<p>Их любили и баловали Турцией или Египтом.</p>
<p>Как говорили - это мозг нашей компании, а он нуждается в преференциях.</p>
<p>Билеты на самолёт оплачивали, причём схема была такая, что при большом желании можно было даже немного «подзаработать», выбрав хитрый маршрут, но приехав на перекладных.</p>
<p>Думаю, многие так и делали, и никто не замечал.</p>
<p>Да и вообще много чего никто не замечал, а может делали вид, чтобы потом в ходе следствия не выйти самим на себя.</p>
<p>Формально саммит назывался научной конференцией, но по факту всё сводилось к одному.</p>
<p>К пьянке.</p>
<p>Ради которой съезжались с дальний регионов Росиии не только наемные сотрудники, но и инвесторы в долях.</p>
<p>После всех этих «конференций» и во время их, директоров конечно возили на экскурсии: показывали, как развивается МИБС, строится и цветет Санкт-Петербург, какие тут красивые места и клевая жизнь.</p>
<p>Нас даже возили в резиденцию путина, и демонстрировали зачем- то, как он там редко живёт.</p>
<p>Но, всё и всегда было одинаковым: огромная пьянка в каком-нибудь пафосном питерском ресторане, типа Астории с портретами знаменитостей вдоль лестниц, с дорогим и невкусным алкоголем и посредственными закусками.</p>
<p>Ты поднимаешься вверх по мраморным ступеням с очумевшими от увиденного директорами росийских центров и мысленно представляешь, что тебе могут подсунуть тарелку из которой ел сам Михалков, Боярский, Газманов, Собчак а потом будто приходит другая мысль.</p>
<p>А что если туда плевал официант?</p>
<p>Особенно хорошо я помню один год, когда нас собрали не в самом Петербурге, а недалеко от Комарово, на берегу Финского залива.</p>
<p>База отдыха, яхт-клуб Терийоки.</p>
<p>Красивое и очень недешевое даже по питерским меркам место, заимствующее свое название явно из Финляндии.</p>
<p>Там, вдали от городской суеты, происходили наши корпоративные оргии.</p>
<p>Директора нажирались до состояния полной невменяемости.</p>
<p>Я жил как раз в одном номере с тем самым братом Софьи - Димкой.</p>
<p>Одноместные номера были не у всех, а размещение по два практиковалось, наверно, в целях экономии и безопасности.</p>
<p>Такого я не видел даже в свои самые бесславные юношеские годы: он спал, храпел и при этом блевал.</p>
<p>Одновременно.</p>
<p>На ковёр, на постель, на себя.</p>
<p>Во сне.</p>
<p>Я до сих пор не понимаю физиологию этого процесса.</p>
<p>Почему он не просыпался?</p>
<p>Запах стоял такой, что глаза выедало.</p>
<p>Женская половина не отставала: напивались «в ноль».</p>
<p>Не все.</p>
<p>Но яркие моменты запоминались многим.</p>
<p>Я уходил в автобус первым и очень рано, он транспортировал наши тела в Питер, и тут входит она - ночная фея из Курска.</p>
<p>Она держа в одной руке бутылку средней паршивости французского коньяка, в другой какое то португальское вино, и пила из обеих горлышек одновременно, горланя несуразицу так, что дрожал весь салон.</p>
<p>По правде говоря, мне хотелось её придушить.</p>
<p>А водитель, серьезный такой мужик был совершенно спокоен.</p>
<p>Видимо, он и не такое видел.</p>
<p>Я сидел там, в самом заднем ряду это красавца Неоплана, где уже нет прохода между сидениями, и вспоминал свои первые дни знакомства с Питером.</p>
<p>Эх, бандитский Петербург, смотрел я на всё это, и мне было стыдно.</p>
<p>По-настоящему, глубоко, физически стыдно.</p>
<p>Потому что передо мной была «элита» частной медицины.</p>
<p>Люди, которые должны были бы лечить, помогать, быть примером.</p>
<p>А вместо этого - цирк, ярмарка тщеславия и бесстыдства.</p>
<p>Мне было тогда очень не по себе.</p>
<p>И, наверное, именно в такие моменты впервые закрадывалась мысль: если это вершина системы, то что же творится внизу?</p>
<p>Я, наверное, повторюсь, но мне эти директора всегда напоминали не менеджеров медицинской структуры, а губернаторов российских областей.</p>
<p>Точнее, таких маленьких князьков на местах, каждый со своей вотчиной, амбициями и карманными законами.</p>
<p>А я в этой системе был чем-то вроде посла, человеком, который представляет целую страну.</p>
<p>В буквальном смысле: на меня смотрели как на миниатюрного президента в рамках огромной, раздутой структуры.</p>
<p>Структуры, которая издалека напоминала бывший совок, только сильно урезанный, но с амбициями возрождения.</p>
<p>Да и Европа тогда уже рассматривалась не под увеличительным стеклом.</p>
<p>Поначалу отношения между нами строились очень дружелюбные.</p>
<p>К Украине относились как к чему-то близкому, но всё же непонятному.</p>
<p>Словно родня, похожая лицами, но совершенно другая по характеру.</p>
<p>В их глазах украинец - это такой себе человек с хитринкой, зажиточный, у которого всегда найдётся кусок сала, горилочка и заначка «на чёрный день».</p>
<p>Русские же в те времена жили по-другому: могли разгуляться на широкую ногу и просадить весь годовой доход за одну ночь, за одну пьянку.</p>
<p>По традиции или по финансовым соображениям нас селили в гостиницу Октябрьская.</p>
<p>Там было много китайцев и граждан РФ.</p>
<p>Другие национальности встречались там крайне редко.</p>
<p>Каждый номер был с высокими потолками, тяжелыми шторами и табличкой у форточки курить в номере запрещено.</p>
<p>Но штын табака тут стоял вековой.</p>
<p>От беломора до тонких дамских сигарет с золотым ободком на фильтре.</p>
<p>Юля из Омска.</p>
<p>Она грациозно могла стоять на подоконнике, и стряхивать пепел в форточку, пить егерьмейстер с горла литровой бутылки из дюти фри своего родного города и заигрывать с директором Смоленского филиала.</p>
<p>Пили они все как в последний день жизни.</p>
<p>Да и я пил, чего уж лукавить.</p>
<p>Но как то у меня всегда получалось держать форму.</p>
<p>Армейская привычка?</p>
<p>Всегда трезвый.</p>
<p>Сначала это вызывало уважение, мол, человек сдержанный, культурный.</p>
<p>А потом их стало это пугать.</p>
<p>«А чего это он не как все?</p>
<p>Что он о себе думает?»</p>
<p>И вот тут началось недоверие.</p>
<p>Если все одинаковые, то всё просто.</p>
<p>А если кто-то выбивается, значит, он подозрительный.</p>
<p>С руководством отношения поначалу были великолепными.</p>
<p>А потом стали тихо портиться, как рыба, заброшенная далеко в холодильник.</p>
<p>Где-то в этот момент, Гетман Мазепа шептал мне на ухо свои соображения об государе императоре и крутил свой ус.</p>
<p>Но всё изменилось резко, когда я начал задавать вопросы, которые для них были слишком… логичными.</p>
<p>И, следовательно, неудобными.</p>
<p>Вот, например.</p>
<p>Нас постоянно сравнивали по количеству проведенных нашими центрами исследований: кто сделал больше, тот молодец, тот на вершине славы и списка в икс-еле.</p>
<p>Кто сделал мало - тот негодяй, мерзавец и предатель.</p>
<p>Ну, как бы все логично.</p>
<p>Делай больше, делай как я.</p>
<p>А я говорил:</p>
<p>— Но ведь важно же не количество исследований, а прибыль центра.</p>
<p>Можно сделать много, заработать много, и тут же всё спустить, потратить на дорогую аренду или бестолковую рекламу.</p>
<p>Сравнивать то нужно центры по чистой прибыли, которую они приносят.</p>
<p>И вот в такие моменты я видел в их глазах тревожное мерцание:</p>
<p>«Чересчур умный.</p>
<p>Значит, опасный.</p>
<p>Делай как сказано.</p>
<p>И не задавай глупых вопросов».</p>
<p>Но они были не дураки.</p>
<p>Поднять такой бизнес - это не торговля русским стандартом и красной икрой в Гостином дворе.</p>
<p>Это куда больше.</p>
<p>Статус умный - присваивался в ЛДЦ МИБС лишь «членам семьи» и то не всем.</p>
<p>Всё это и всё больше напоминало мне Российскую Федерацию в её привычной красе: вертикаль, показуха, страх перед самостоятельностью мышления и нетерпимость к тем, кто не вписывается в строй.</p>
<p>В тот момент, когда ты вышел из общего строя, система тебя уже отметила.</p>
<p>И уже не могла не реагировать.</p>
<p>Схемы, по которым работал украинский филиал, были на 100% российскими.</p>
<p>Ничего своего нам не позволяли вырастить.</p>
<p>Всё же империя не любит чужой самодеятельности.</p>
<p>Простой пример.</p>
<p>Главврачу больницы, у которой мы арендовали помещение, сразу предложили откат.</p>
<p>Но, как водится, в “цивилизованной” форме, это был не только конверт с хрустящими купюрами, а пакет бесплатных исследований.</p>
<p>Пять талонов в месяц железно, и можно делать с ними всё, что душе будет угодно: дарить, продавать, обменивать, передавать родственникам, жечь в печи.</p>
<p>Но устная договорённость гласила:</p>
<p>500 долларов в конверте каждый месяц.</p>
<p>Всегда и стабильно.</p>
<p>Покупалась лояльность, смазывались рабочие шестерёнки.</p>
<p>И когда курс прыгнул, вернуться назад было уже невозможно, имперские условия всегда фиксируются в валюте, как залог вечной зависимости.</p>
<p>Другой пример - электричество.</p>
<p>Старые МРТ-томографы жрут киловатты так, будто у них внутри не магниты, а вакуумная бомба крутится.</p>
<p>Европейцы давно научились делать экономичные машины, но россияне предпочитали не экономить, а “оптимизировать” систему учёта.</p>
<p>Меняли автоматы.</p>
<p>Ставили трансформаторы тока с другой - нужной им трансформацией.</p>
<p>По документам всё чисто, а фактически киловатты утекали в чёрную дыру, в которой растворяется российская логика:</p>
<p>всё вокруг колхозное, а значит всё вокруг моё.</p>
<p>Дальше еще круче.</p>
<p>Бонусы для врачей.</p>
<p>50 гривен за направление, фиксированно, без индексации, без логики.</p>
<p>Цены росли, но бонус стоял на месте, как памятник прошлой эпохе.</p>
<p>Империя, конечно, умела считать то, что ей выгодно.</p>
<p>Когда приезжал проверяющий, он как цербер смотрел баланс:</p>
<p>• если 85% пациентов по направлениям от врачей, всё хорошо; система горит зеленым светом.</p>
<p>• если меньше, то плохо, менеджеры “не дорабатывают”; стрелка в красной зоне манометра.</p>
<p>• но если процент выше, это тоже плохо: значит, кто-то приписывает несуществующих врачей и ворует бонусы.</p>
<p>Это уже тревога.</p>
<p>Стрелка манометра в красной зоне и выпуск пара из системы.</p>
<p>Трагедия?</p>
<p>Вовсе нет, воровство для империи явление свойственное.</p>
<p>И вот мы жили между этими числами, как между жерновами.</p>
<p>Нужно было удерживать абсурдный баланс, которого в Украине в принципе не могло быть, потому что у нас работало куда лучше сарафанное радио, интернет, пациенты приходили сами, без посредников, без схем.</p>
<p>Но империя не верила в реальность.</p>
<p>Она верила только в схемы, потому что схемы были её религией.</p>
<p>Президент нашего маленького филиала, тот самый “президент страны в миниатюре” тоже взрослел.</p>
<p>И всё, что когда-то казалось ему хитрым, сложным, экзотическим, постепенно превращалось в обыденную бухгалтерию власти.</p>
<p>Он обрастал связями, ресурсами.</p>
<p>Появлялись новые знакомые, новые возможности и новые силы.</p>
<p>К нему тянулись, шептали, просили: “Помоги”.</p>
<p>А взамен что-то предлагали: услуги, знакомства, влияние.</p>
<p>И если в начале он ничего этого не понимал, то со временем, хотел он того или нет, становился профессионалом.</p>
<p>Есть теория, чтобы стать мастером, нужно отработать 10 тысяч часов.</p>
<p>Так вот, в рамках такой имперской машины это вообще не срок, тут ты взрослеешь быстрее.</p>
<p>Потому что система учит тебя не профессии.</p>
<p>Она учит тебя правилам выживания внутри чужой вертикали власти.</p>
<p>И чем дальше он шёл, тем отчётливее видел:</p>
<p>не он подстраивается под систему, это система подбирает к нему ключи.</p>
<p>И вдруг однажды пришло предложение, которое могло всё изменить.</p>
<p>В мой кабинет зашёл инвестор.</p>
<p>Настоящий западный.</p>
<p>Не тот «по методичке», не тот «по понятиям», а человек другой культуры управления.</p>
<p>Он хотел открыть новый центр.</p>
<p>Новый центр МРТ.</p>
<p>У него был миллион долларов живой и чистый.</p>
<p>И ему казалось, что этого достаточно.</p>
<p>И он сказал простую фразу, которую невозможно услышать в имперской системе:</p>
<p>«Я не хочу давать поводы для воровства.</p>
<p>Мне нужны прозрачные отношения».</p>
<p>Это было сказано так, как если бы в деревню, где веками лечили зубы щипцами, приехал стоматолог с анестезией и бормашиной в прицепе своего пикапа.</p>
<p>Люди смотрят и не верят, что так можно.</p>
<p>Он предлагал:</p>
<p>— прозрачность вместо серых схем,</p>
<p>— законность вместо «договорённостей»,</p>
<p>— 30% вместо 2,5%,</p>
<p>— ответственность вместо авось,</p>
<p>— сотрудничество вместо зависимости.</p>
<p>Это был тот самый шанс, которого империи всегда боятся.</p>
<p>Потому что честные правила ломают систему, построенную на хитрости.</p>
<p>Но чтобы принять его предложение, нужно было сделать шаг в неизвестность.</p>
<p>А противоположная система держала тебя привязанным своими механизмами как хитрыми рыболовными крючками:</p>
<p>— старые томографы, которые «оживали» только благодаря инженерам-хакерам;</p>
<p>— сервисные коды, добытые бог знает как;</p>
<p>— возможность «завести» аппарат, который по всем правилам должен был быть мёртв;</p>
<p>— привычка жить «через проволочку между контактами вместо предохранителя»;</p>
<p>— зависимость от техники, на которой строилась вся экономика центра.</p>
<p>В новом центре таких трюков бы не было.</p>
<p>Не потому что запад хуже, а потому что там не взламывают системы, а соблюдают правила.</p>
<p>И я честно сказал инвестору:</p>
<p>— «У меня нет сервисных кодов.</p>
<p>Я не смогу повторить эту магию сам сейчас с чистого листа.</p>
<p>Времени мало.</p>
<p>Новый центр - да.</p>
```html id="a8w2cf"
<p>Но такой продуктивности - нет».</p>
<p>И он пожал мне руку.</p>
<p>«Вы только что сберегли мне миллион».</p>
<p>Это был момент истины.</p>
<p>Чистый, светлый, правильный.</p>
<p>Но система осталась прежней.</p>
<p>ТЕ, КТО СМОТРЯТ ВНУТРЬ ЧЕЛОВЕКА</p>
<p>Если у директоров центров был свой парад тщеславия - саммит, где каждый демонстрировал влияние, то у рентгенологов существовал собственный клуб.</p>
<p>Полузакрытый, почти масонский.</p>
<p>Попадали туда не все, а только «избранные».</p>
<p>Критерии были просты: либо ты действительно умный доктор и привёз интересный доклад по какой-нибудь хитрой патологии, либо… просто понравился жене Аркадия Наташе Березиной и её лучшей подруге Даше Куплевацкой.</p>
<p>А это, как мы понимаем, в медицине иногда важнее, чем томографы.</p>
<p>База находилась на Невском проспекте.</p>
<p>Это была огромная коммуналка, переделанная под общежитие курсантов.</p>
<p>А на Шестой Советской стоял главный учебный центр с аудиторией, где будущих специалистов «прокачивали» по протоколам.</p>
<p>Обучение длилось две недели.</p>
<p>Потом экзамен.</p>
<p>Не сдал, едешь домой, к своим облупленным стенам.</p>
<p>Сдал - добро пожаловать в будущую карьеру, но сначала будешь идти под ручку со старшим врачом.</p>
<p>Все твои заключения проверит питерский наставник и поставит рядом свою подпись.</p>
<p>Снаружи это выглядело как консилиум, как подтверждение высокого уровня сети ЛДЦ МИБС.</p>
<p>Два врача, две подписи, научная строгая традиция.</p>
<p>А на деле это была простая «ходунковая терапия» для стажёра, которому пока нельзя доверять самостоятельность.</p>
<p>Особым вниманием пользовались украинские врачи.</p>
<p>Им не вполне доверяли, но любили.</p>
<p>Украинцы приезжали умные, внимательные, с характером, и всегда с собой везли сало, домашние закуски и кусочек своей теплотой пахнущей земли.</p>
<p>С ними было о чём поговорить: про жизнь, про страну, про то, как всё у них тут иначе.</p>
<p>Но была и обратная сторона, уволить такого специалиста без согласования с Питером было почти нереально.</p>
<p>А пройдя через местную систему, многие перенимали «имперские замашки» да так активно, что корона вырастала прочно, как кость.</p>
<p>Парадокс.</p>
<p>Рентгенолог ведь не клиницист.</p>
<p>Он не ставит диагноз.</p>
<p>Он лишь описывает картинку и ее дописывает фразой: «рекомендуется консультация узкого специалиста».</p>
<p>Он глаза, но не руки медицины.</p>
<p>И именно из-за такой функции в будущем их и начали постепенно заменять алгоритмы искусственного интеллекта.</p>
<p>Но тогда об этом никто даже не думал.</p>
<p>Наоборот, многие рентгенологи воспринимали своё ремесло как высшую ступень медицинской касты и пользовались этим статусом до последнего вздоха чавкающего гелиевым насосом томографа.</p>
<p>Система учила их рентген-анатомии, но закрывала глаза на клиническое мышление.</p>
<p>Хорошо, если оно было от природы - такие становились мастерами.</p>
<p>Но у большинства оно отсутствовало напрочь, и это упущение не только не исправлялось, но и поощрялось.</p>
<p>Главное было тут описать все быстро.</p>
<p>По протоколу.</p>
<p>И побольше, побольше.</p>
<p>Поток важнее качества.</p>
<p>Рынок диктовал правила куда жёстче, чем патоморология.</p>
<p>Потом обучение и вовсе перевели онлайн.</p>
<p>Видео, тесты, автоматизированные экзамены.</p>
<p>Фабрика по производству рентгенологов уменьшенного калибра.</p>
<p>Но удивительное: те, кто смог устоять и не скатился в этот поток стали действительно сильными врачами.</p>
<p>Кто думал, кто сомневался, кто задавал вопросы, те выросли.</p>
<p>Кто адаптировался и смирился вылетал рано или поздно.</p>
<p>В 2018 году Аркадий и Виктор, почувствовав, что украинский филиал растёт слишком быстро, начали бить тревогу.</p>
<p>На их саммитах я рассказывал о подходах, которые мы внедряли у себя и видел, как часть директоров внимательно слушает и даже конспектирует.</p>
<p>Но большинство задавало один и тот же вопрос:</p>
<p>«А Аркадий знает?»</p>
<p>«А Виктор дал добро?»</p>
<p>И тогда я впервые подумал:</p>
<p>а зачем я вообще приезжаю на эти саммиты?</p>
<p>МИБС разросся.</p>
<p>Директоров стало столько, что я многих уже не узнавал.</p>
<p>А косые взгляды становились всё чаще.</p>
<p>Меня хотели «обратно настроить», вернуть в общую массу, сделать удобным.</p>
<p>Однажды мне позвонила помощница Виктора и предложила приехать в Томск «просто попариться в баньке, отдохнуть».</p>
<p>До Томска без прямых рейсов уже не добраться — Минск, Москва, Томск пересадки, абсурд.</p>
<p>Я не стал подбирать слова:</p>
<p>«У меня тут своя баня.</p>
<p>Зачем мне ваша?</p>
<p>Хотите - сами приезжайте, встречу в аэропорту, если доберётесь».</p>
<p>После этого решение было найдено быстро:</p>
<p>центр решили продать.</p>
<p>Это был единственный способ для них сохранить своё лицо.</p>
<p>Чтобы сохранить монополию, если невозможно подчинить, нужно было уничтожить то, что её опровергало.</p>
<p>Но просто бросить украинский филиал жадность не позволяла.</p>
<p>Нужен был покупатель.</p>
<p>И мне предложили его купить.</p>
<p>Сумма была настолько абсурдна, что её даже обсуждать было смешно.</p>
<p>Три цены от адекватной стоимости.</p>
<p>Даже найти человека, который согласится переплатить втрое, это как искать добровольца выкинуть деньги в Дунай.</p>
<p>За месяц до ковида, когда самолёты ещё летали, Виктор вошёл ко мне в кабинет без стука, как обычно, а за ним зашел какой-то совершенно невзрачный человек.</p>
<p>— «Это новый хозяин», — сказал Виктор.</p>
<p>Формально он уже давно не был инвестором:</p>
<p>после 2014-го проводить лицензионную деятельность с бенефициарами-гражданами РФ стало невозможно.</p>
<p>Но по факту он всё равно вёл себя как хозяин.</p>
<p>Через полчаса меня познакомили с новым директором.</p>
<p>Бывший охранник супермаркета, служака до мозга костей.</p>
<p>Идеальный человек, чтобы поставить галочку: «контроль установлен».</p>
<p>Через месяц начался ковидный карантин.</p>
<p>А ещё через три года по Украине из России полетели первые ракеты.</p>
<p>Наш центр прожил свою жизнь честно и честно завершил её старую главу.</p>
<p>Не было ни драмы, ни битвы, ни расколов.</p>
<p>Просто наступил момент, когда стало ясно:</p>
<p>мы выросли в разные стороны.</p>
<p>Активы были смешными.</p>
<p>Магнит жутко старый.</p>
<p>Техника, пережившая три эпохи Windows.</p>
<p>Но дело было не в железе.</p>
<p>Продали не оборудование.</p>
<p>Продали историю.</p>
<p>Продали отношения.</p>
<p>Продали ту культурную связку, которая уже давно скрипела, но держалась на старых болтах.</p>
<p>И, как это часто бывает в реальной жизни, никакой героической развязки не случилось.</p>
<p>Старый коллектив выбирал не идею, а стабильность, расписание и привычный хлеб.</p>
<p>Люди выбрали гарантированное «сегодня», а не риск «завтра».</p>
<p>И это тоже выбор.</p>
<p>По-человечески понятный.</p>
<p>Я не имел права тянуть их за собой туда, куда хотел идти я.</p>
<p>Потому что любой путь имеет смысл только тогда, когда он добровольный.</p>
<p>И когда центр продали, я не потерял ребёнка, хотя мне это и казалось по началу.</p>
<p>Я просто отпустил взрослого человека, который решил жить своей жизнью.</p>
<p>Понял: невозможно спасать тех, кто не хочет спасаться.</p>
<p>Невозможно вести туда, куда человек идти не собирается.</p>
<p>И невозможно «воевать» за тех, кто предпочитает мир любой ценой, даже ценой развития.</p>
<p>В итоге каждый получил своё:</p>
<p>• центр своего нового хозяина и привычный ритм,</p>
<p>• коллектив - стабильность,</p>
<p>• инвестор - свой кусок,</p>
<p>• а я свободу.</p>
<p>И именно эта свобода стала дверью в новую реальность.</p>
<p>Потому что через полгода мне предложили создать центр,</p>
<p>который будет построен не из компромиссов, а из принципов.</p>
<p>Не из советских рефлексов, а из современных стандартов.</p>
<p>Не «как получится», а «как должно быть».</p>
<p>Так появился «Нейромед», тот</p>
<p>центр, который не нужно было переделывать, спасать, выкорчёвывать из-под старой системы.</p>
<p>Центр, который можно было строить сразу правильно.</p>
<p>Нейромед оказался удивительно живым медицинским проектом, не очередным кабинетом с заезженными стенами и бюджетными табуретами, а настоящим организмом, который мы вырастили с нуля.</p>
<p>Когда всё начиналось, в стране было всего несколько центров подобного уровня.</p>
<p>Да, в Виннице концентрация диагностических и реабилитационных учреждений зашкаливала, но это были островки старой школы: стены, пропитанные традициями, очередями, схемами и медленным дыханием советской медицины.</p>
<p>В Киеве существовал мощный центр при институте нейрохирургии уже с трёхтесловым МРТ, строгими врачами и правильной наукой.</p>
<p>Но он был не для людей, он был для системы.</p>
<p>Он работал по старым правилам, где главная ценность не пациент, а порядок: всё чинно, всё правильно, но холодно.</p>
<p>Мы же пошли другим путем.</p>
<p>Построили свой центр с нуля, выбрали место так, как выбирают точку опоры, чтобы удобно, и близко к метро.</p>
<p>И сразу же попали под удар старой гвардии таких же пожилых тетушек, но уже с ОСББ — армии тёток, которые десятилетиями жили по принципу «кто пришёл, тот и платит».</p>
<p>Их логика была проста: если кто-то на их территории хочет развиваться, значит, он им что-то должен.</p>
<p>Деньгами, услугами, поклонами.</p>
<p>Но мы пришли с другой философией.</p>
<p>Мы пришли без схем, и это было для них куда страшнее, чем любые ракеты.</p>
<p>Спасла ситуация не хитрость, а закон.</p>
<p>Мы нашли сильную адвокатскую команду, и когда не знаешь, как правильно, то нужно делать по закону.</p>
<p>Это, как оказалось, гораздо страшнее для тех, кто привык брать «за воздух».</p>
<p>Их аппетиты быстро остудились, и мы начали работать так, как работает европейская медицинская система: прозрачно, через банк и без откатов.</p>
<p>Все деньги на счёт, все исследования официально, вся бухгалтерия чистая.</p>
<p>Банкомат стоял в двадцати метрах, жизнь была простой и спокойной.</p>
<p>Но затем началась война.</p>
<p>К нам летели ракеты.</p>
<p>И одна из них не единственная, но достаточно точная попала в винницкий центр.</p>
<p>Там погибли пациенты и почти весь наш персонал.</p>
<p>Погибли те, кто открывал центр в Киеве, кто делился опытом, кто помогал нам стать на ноги.</p>
<p>Трагедия, которая выглядела как жестокий символ: будто старая тёмная система, не справившись с нами в мирной жизни, решила ударить там, где больнее всего.</p>
<p>Все дороги в то время превратились в пустые ленты.</p>
<p>Мой дом был в пятидесяти километрах от центра.</p>
<p>Раньше это было меньше часа дороги: кофе, мысли о новых идеях.</p>
<p>А в феврале 2022-го путь стал почти невозможным.</p>
<p>Российские войска подошли вплотную к Киеву, мосты взорвали, объездов почти не было.</p>
<p>Добраться до центра было не просто тяжело, было почти смертельно.</p>
<p>Центр временно закрылся, но уже в мае он возобновил свою работу, как и страна.</p>
<p>Мне предложили снова его курировать.</p>
<p>Но я понял, что сыграл свою партию.</p>
<p>Время пришло жить для себя, реализовать то, что откладывал годами, то, что всё время стояло в тени чужих диагнозов, чужих историй и чужих судеб.</p>
<p>Сегодня Нейромед - один из лидеров Украины.</p>
<p>Он растёт, как растёт и наша страна: медленно, преодолевая сопротивление старого мира, но уверенно.</p>
<p>Появились клиницисты, новые отделения, реабилитации, расширилась сеть.</p>
<p>Территория старой железнодорожной больницы, где мы когда-то приняли первого пациента от МИБС, тоже живёт и, я надеюсь, работает на благо людей.</p>
<p>И главное, всё это происходит в свободной стране, на нашей земле, которую мы отстояли.</p>
<p>Эпилог.</p>
<p>Мы часто думаем, что проекты рушатся из-за денег, плохих решений или неудачных партнёров.</p>
<p>Но правда в другом: системы рушатся изнутри, когда люди перестают играть по навязанным правилам.</p>
<p>Мы с самого начала выбрали путь, который не нравился старому укладу.</p>
<p>Путь, где честность не переговорная позиция, а основа.</p>
<p>Путь, где развитие важнее откатов, а закон сильнее знакомых.</p>
<p>И именно поэтому мы стали неугодными.</p>
<p>Неугодными, потому что хотели большего.</p>
<p>Неугодными, потому что понимали, как этого достичь.</p>
<p>Неугодными, потому что готовы были менять систему, а не подстраиваться под неё.</p>
<p>И если что-то и заслуживает отдельной главы, то это тот момент, когда человек впервые понимает:</p>
<p>быть неугодным системе это не слабость.</p>
<p>Это эволюция.</p>
<p>И, знаешь, дорогой мой читатель, пока идет война, я бы предложил на этом закончить мое повествование.</p>
<p>Многое еще можно рассказать, и о путях, и о людях, и об идеях, что рождали новые центры и рушили старые уклады.</p>
<p>Но, пожалуй, хватит.</p>
<p>Пусть дальше читатель делает выводы сам.</p>
<p>Он уже услышал достаточно, чтобы понять, где мы были честны, где ошибались, где стояли на своем, и почему иногда единственный правильный шаг, это перестать бороться за то, что уже не твое.</p>
<p>Подрастают наши дети.</p>
<p>И нам не должно быть стыдно смотреть им в глаза.</p>
<p>Мы не выбирали эпоху, в которую родились, но мы выбираем, как проживаем свой путь.</p>
<p>И это единственное, что передается дальше без искажений.</p>
<p>Где будут жить они?</p>
<p>Тут или в Европе - решать им.</p>
<p>Наш путь уже пройден.</p>
<p>Он был непростой, но он был наш, с выбором, сделанным осознанно, с попыткой не согнуться и не раствориться в системе, которая давно устала меняться.</p>
<p>Время расставит все по местам.</p>
<p>А наша задача это передать им главное: смысл существования, ощущение собственного хребта и ту тихую внутреннюю свободу, которая никогда не приходит извне.</p>
