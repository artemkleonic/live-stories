<p>Мешок картошки.</p>
<p>Эту историю мне рассказал мой старый хороший друг.</p>
<p>И, как это часто бывает с такого рода историями, чем дальше они от нас во времени, тем ярче они светятся. Словно лампа под старым абажуром. Немного света, тепла, немного иронии и обязательно вкус жизни.</p>
<p>Произошло это лет сорок назад. Тогда Киев был другим. Чуть медленнее и чуть спокойнее. Но дома… дома уже тогда были старыми, и с облупленными от времени фасадами. И вот именно этими домами занимались мой друг Сергей и его отец.</p>
<p>Они были строителями. Но не теми, что кладут кирпичи. Нет. Они и кирпичи могли класть на яичный раствор, как в храмах. Но в этот раз они приводили в порядок фасады старинных киевских зданий. Ту самую лепнину, те самые балконы, те самые карнизы, на которые сейчас смотришь и думаешь: «Как же красиво делали раньше».</p>
<p>Работа была адская. С утра до вечера на лесах. Солнце жарит в спину, потом в лицо. Рубашки от пота можно было менять по три раза в день. Руки в растворе, плечи гудят, ноги ватные. Но платили хорошо. Очень хорошо. И главное - они были командой. Настоящей. Слаженной, как хороший механизм. Ворчали друг на друга конечно, но процесс реставрации шел.</p>
<p>И вот в этот идеальный мужской союз внезапно врывается любовь по имени Валентина.</p>
<p>Сергей решил жениться.</p>
<p>А если Сергей что-то решил - всё. Это уже не обсуждается. Это как кирпич, который уже лег в кладку и его не вынешь.</p>
<p>Отец, конечно, был против. Не потому что он был злой. Нет. Просто он понимал: всё. Конец их тандему. Конец этим заработкам, этой свободе, этому ритму. Женитьба это уже совсем другая жизнь. Там не до фасадов. Там нужен фундамент.</p>
<p>Но Сергей стоял на своём.</p>
<p>Он со своей будущей женой снял небольшую квартиру в центре Киева. Скромную, но уютную. Ближе к работе. Ближе к новой жизни. Ближе к неизбежному.</p>
<p>И вот однажды, после особенно тяжелого дня, когда солнце буквально выжгло из них последние силы, когда раствор казался тяжелее камня, а леса бесконечными, Сергей предложил отцу:</p>
<p>— Давай переночуем у меня. Не поедем домой. Сил нет вообще.</p>
<p>Отец поворчал. Сказал, что всё это неправильно. Что он вообще против всей этой затеи с ранней свадьбой. Да и Валентина у тебя же ночует. Но усталость штука серьезная. Она не спорит. Она просто давит.</p>
<p>— Есть-то у тебя хоть пожрать что-нибудь? — спросил он с сомнением.</p>
<p>— Есть, — уверенно ответил Сергей. — Целый мешок картошки.</p>
<p>Где он его раздобыл  история умалчивает. Но в тот момент это звучало как гастрономическая роскошь.</p>
<p>Ночь опустилась тихо. Дом затих. Всё, казалось, должно было закончиться обычным сном уставших людей.</p>
<p>Но нет.</p>
<p>Сергей выходит из ванной. Свежий после душа. Абсолютно голый. В те времена к таким мелочам относились проще. Да и дома тепло.</p>
<p>И вдруг… что-то мелькнуло.</p>
<p>Между коридором и кухней.</p>
<p>Мелькнуло быстро. Как мысль, которую не успел поймать.</p>
<p>Серега был человеком наблюдательным. Очень. Он такие вещи не игнорировал.</p>
<p>«Показалось», — подумал он.</p>
<p>Но остался стоять. Ждать.</p>
<p>И не зря. И мелькнуло снова.</p>
<p>Мышь.</p>
<p>Самая настоящая. Маленькая. Наглая. Сидит на кухне и будто чего-то ждёт. Откуда? В этой квартире никогда не было мышей.</p>
<p>Он не стал долго размышлять. Он был человеком действия. Берёт воздушку. Ту самую, из тех былых времён. Переломка. С характерным коричневым прикладом, с тем самым лёгким фиолетовым  отливом. Такие стояли в тирах, которые делали из списанных автобусов ЗИЛ.</p>
<p>Садится на пуфик. Даже не садится, а вскарабкивается на него, как гриф.</p>
<p>Голый.</p>
<p>С воздушкой.</p>
<p>И начинает караулить.</p>
<p>Первый выстрел. Чёткий и уверенный.</p>
<p>Минус одна мышь.</p>
<p>Не проходит и минуты, появляется вторая. Вторая тоже не задержалась.</p>
<p>Третья.</p>
<p>Четвёртая.</p>
<p>И тут включается азарт. Тот самый, древний, охотничий. Когда уже не важно зачем. Важно процесс.</p>
<p>В этот момент из комнаты выходит его будущая жена Валентина.</p>
<p>Смотрит.</p>
<p>На мгновение замирает.</p>
<p>Перед ней картина, достойная какого-нибудь сюрреалиста. Её будущий муж. Абсолютно голый. С воздушкой. На пуфике. В засаде.</p>
<p>Она моргает.</p>
<p>Подходит ближе.</p>
<p>Нет. Это не галлюцинация.</p>
<p>Это он.</p>
<p>— Тихо, — шепчет Сергей. — Здесь охота.</p>
<p>И вот тут начинается самое интересное.</p>
<p>Она не кричит.</p>
<p>Не включает свет. Не устраивает сцену.</p>
<p>Она… садится рядом.</p>
<p>И вот они уже вдвоём. В полной тишине и почти в полной темноте. Как опытные напарники. Начинают охоту.</p>
<p>Ещё одна мышь.</p>
<p>Ещё. И ещё.</p>
<p>Азарт захватывает их обоих. Время теряет смысл. Мир сужается до кухни, пуфика и маленьких теней, мелькающих в темноте.</p>
<p>И именно в этот момент из соседней комнаты выходит отец.</p>
<p>Смотрит.</p>
<p>Замирает.</p>
<p>Закрывает глаза.</p>
<p>Открывает их</p>
<p>Снова смотрит.</p>
<p>Нет. Не исчезло.</p>
<p>Показалось?</p>
<p>Перед ним сидит молодая пара. Его сын. Голый. Совершенно голый. С воздушкой. И девушка в ночной сорочке. Рядом. В засаде.</p>
<p>Тишина.</p>
<p>Та самая, в которой рождаются судьбоносные решения.</p>
<p>Он делает паузу. Длинную. Почти философскую.</p>
<p>И говорит:</p>
<p>— Знаете, ребята… я, пожалуй, соглашусь, чтобы вы поженились в самое ближайшее время. Не стоит меня караулить. Не нужно.</p>
<p>И уходит обратно.</p>
<p>А теперь самое главное.</p>
<p>Причина.</p>
<p>Оказалось, что в том самом мешке картошки, который Сергей так гордо принёс, приехала одна мышь.</p>
<p>Но беременная.</p>
<p>Она устроилась там, среди клубней, как в уютной родильной палате. Родила двенадцать мышат. Выкормила их. Подняла. И выпустила в большой мир.</p>
<p>В ту ночь десять из них были добыты трофейным способом.</p>
<p>Две оставшиеся попались уже на следующий день в мышеловки.</p>
<p>Вот так один мешок картошки.</p>
<p>Одна предприимчивая мышь.</p>
<p>И немного охотничьего азарта помогли Сергею получить благословение отца на брак.</p>
<p>Жизнь иногда устраивает такие спектакли, что никакой режиссёр не придумает.</p>
<h2>Эпилог.</h2>
<p>Защитникам мышей можно выдохнуть. История старая, времена были другие, а сама природа, как ни крути, всегда балансирует свои счёты без нашего участия. Да и, если уж совсем откровенно, именно эта мышиная эпопея дала жизнь одной очень крепкой человеческой семье. Так что вклад у них, можно сказать, исторический.</p>
<p>А наш внимательный читатель, я надеюсь, уловил главное.</p>
<p>Сильный союз - это не про идеальные фотографии и правильные слова. Это когда он сидит в темноте с винтовкой, не совсем одет, мягко говоря, а она не устраивает сцен, не читает лекций о приличиях, а спокойно садится рядом и подаёт ему… пусть даже не патроны, а взгляд, поддержку и участие.</p>
<p>И в этот момент они становятся командой.</p>
<p>Настоящей. А всё остальное это уже дело техники.</p>
<p>Даже если ты совершенно голый.</p>
