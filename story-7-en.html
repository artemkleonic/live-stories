<h2>Prologue</h2>
<p>It was late November.</p>
<p>Not truly cold yet — around five degrees above freezing — but the rain fell with such relentless force it felt as though the sky had decided to empty an entire year’s worth of water in a single night.</p>
<p>Another two degrees lower, and the whole city would have disappeared beneath snow. But instead, billions of heavy drops hammered rooftops and windows, dragging that familiar autumn melancholy behind them — the feeling that winter still hadn’t fully claimed its place.</p>
<p>Across the country, rolling blackouts continued day after day. People now spent more time in darkness than in ordinary electrical comfort.</p>
<p>But our house remained warm and bright.</p>
<p>Back in spring, we had installed solar panels and a powerful backup battery system. During these dim months it kept the house floating calmly against the surrounding gloom. Soft light rested on the walls, making the room feel even warmer, safer, quieter.</p>
<p>The main character — meaning me — poured a little of my own homemade peated whisky into a heavy glass.</p>
<p>The kind that smells of campfire smoke, wet earth, and freedom.</p>
<p>Then I sprayed a few bursts of expensive cologne into the room — the kind of scent that instantly pulls you into the atmosphere of a Duty Free store somewhere between countries: travel, anticipation, unfamiliar routes, the faint promise of adventure.</p>
<p>After that, I turned on airport ambience through a JBL speaker:</p>
<p>boarding announcements,</p>
<p>rolling suitcases,</p>
<p>distant conversations,</p>
<p>that strange organized chaos airports always breathe with.</p>
<p>And somewhere inside that absurd but oddly comforting mixture — home warmth and distant departure — I slowly disappeared into thought.</p>
<p>There is something about sitting near a fireplace that changes the way a person thinks.</p>
<p>Especially if you don’t force the thoughts.</p>
<p>The first ten or fifteen minutes are only adaptation. You simply merge with the atmosphere:</p>
<p>the fire,</p>
<p>the whisky,</p>
<p>the rain,</p>
<p>the distant sounds of airplanes carrying strangers toward other lives.</p>
<p>And only then does the real movement inside you begin.</p>
<p>You suddenly start sorting through your life:</p>
<p>what you achieved,</p>
<p>what you failed to do,</p>
<p>where you were honest with yourself,</p>
<p>and where you wasted years for absolutely nothing.</p>
<p>Recently, I found myself speaking to people drowning in despair.</p>
<p>Not because they had lost everything.</p>
<p>But because the world they believed in had collapsed.</p>
<p>Entire systems of meaning had fallen apart inside them.</p>
<p>And the reason, strangely enough, was simple:</p>
<p>they no longer lived in the present.</p>
<p>They clung desperately to the past — to that imagined version of life that now seemed warm, safe, and somehow more “real.”</p>
<p>But if we are honest, much of that “beautiful past” only appeared beautiful because we ourselves were younger then.</p>
<p>Healthier.</p>
<p>Stronger.</p>
<p>More naive.</p>
<p>We simply did not notice the cracks yet.</p>
<p>These are the kinds of thoughts that arrive while firewood crackles in the dark.</p>
<p>People often ask:</p>
<p>Were those times really better?</p>
<p>Yes, there were no missiles overhead. No drones. No nightly sirens.</p>
<p>That part is true.</p>
<p>But life was never truly safe.</p>
<p>Statistically speaking, ordinary car accidents kill more people every year than many wars do. We simply stopped fearing them because danger becomes invisible once it turns familiar.</p>
<p>And sometimes I think war itself resembles traffic.</p>
<p>Imagine hundreds of uncontrolled cars racing through a city at night while ordinary people continue driving home, crossing streets, buying groceries, trying to live their lives.</p>
<p>Nobody knows where disaster will strike.</p>
<p>Life has always been fragile.</p>
<p>The earlier you understand this, the fewer illusions remain about some mythical “golden past.”</p>
<h2>The Story of That Night</h2>
<p>That evening, I was flipping through an old photo album.</p>
<p>Heavy pages. Faded photographs over thirty years old.</p>
<p>On some pictures — nature trips from our youth.</p>
<p>On others — myself:</p>
<p>a student,</p>
<p>a soldier,</p>
<p>a young man awkwardly trying on adulthood for the first time.</p>
<p>You look at those photographs and think:</p>
<p>My God… how young we were.</p>
<p>Nothing hurt back then. Everything still seemed ahead of us.</p>
<p>And together with the album, you somehow slip backward through time itself.</p>
<p>Then suddenly I found the photograph.</p>
<p>The one that always pulls the same memory behind it.</p>
<p>I remember that night in perfect detail.</p>
<p>My friend Vitalik — who is now, by the way, a rather successful proctologist — and I once missed the last train home after a hunting trip near the estuary.</p>
<p>Walking back to the city was impossible. Catching a ride at night out there belonged more to fantasy than reality.</p>
<p>So we stayed.</p>
<p>At first the frost came lightly, almost politely.</p>
<p>Then harder.</p>
<p>And suddenly ice began forming around our rubber boat.</p>
<p>Thin at first — transparent, delicate like glass. Then thicker and thicker until the estuary itself seemed to freeze shut around us.</p>
<p>The boat was inflatable.</p>
<p>The ice was sharp.</p>
<p>The water was black and deadly cold.</p>
<p>We completely forgot why we had gone there in the first place.</p>
<p>There remained only one objective:</p>
<p>reach shore before the ice tore the boat apart beneath us.</p>
<p>Vitalik rowed until exhaustion.</p>
<p>Meanwhile I knelt at the front of the boat smashing ice with my bare fists, pushing the shards aside so they would not cut through the rubber.</p>
<p>Meter by meter we forced our way forward.</p>
<p>Eventually we reached shore.</p>
<p>Night had fully fallen by then.</p>
<p>Minus eight degrees.</p>
<p>No firewood.</p>
<p>No equipment.</p>
<p>No backup plan.</p>
<p>We climbed toward nearby summer cottages and found stacks of old parquet flooring someone had left outside during renovations.</p>
<p>Funny thing, really.</p>
<p>What saved us from freezing that night turned out to be somebody else’s discarded past.</p>
<p>We dragged the boards down to shore and built something resembling a bed from reeds, branches, and scraps of wood.</p>
<p>Then we lit a fire.</p>
<p>And slept beneath the open sky.</p>
<p>It was one of the coldest nights of my life.</p>
<p>We woke every thirty minutes.</p>
<p>Not metaphorically. Literally.</p>
<p>You closed your eyes for what felt like seconds — and suddenly half an hour had passed. The fire that had burned brightly moments ago became dying embers.</p>
<p>You threw more parquet into the flames. Warmth returned.</p>
<p>Then the cycle repeated itself all night long.</p>
<p>Vitalik slept sitting upright on an inflatable boat cushion.</p>
<p>Every time the fire flared up, the heat pushed him backward. And each time the flames weakened, he unconsciously slid closer toward the fire again.</p>
<p>I spent the entire night making sure he didn’t accidentally fall directly into it.</p>
<p>And strangely enough, years later we both remembered that night as one of the happiest periods of our lives.</p>
<p>We even returned there more than once, almost trying to relive it.</p>
<p>But now?</p>
<p>Now I realize I would gladly spend that exact same night in a warm hotel room beside a fireplace instead.</p>
<p>And eventually, we actually did.</p>
<p>And there is nothing wrong with that.</p>
<p>In fact, it is wonderful.</p>
<p>Because growing older sometimes means finally understanding that comfort is not weakness.</p>
<p>A hot shower.</p>
<p>A clean bed.</p>
<p>A quiet hotel room at twenty-one degrees Celsius instead of minus eight beside frozen reeds.</p>
<p>You worked for that comfort.</p>
<p>You earned it.</p>
<p>And perhaps that is what adulthood really is:</p>
<p>not losing the ability to remember difficult nights fondly,</p>
<p>but no longer needing suffering to feel alive.</p>
<h2>Epilogue</h2>
<p>As we grow older, we begin understanding something both simple and enormous:</p>
<p>The past is a warm attic full of memories.</p>
<p>But nobody is meant to live in the attic forever.</p>
<p>People often stare backward for so long that they stop noticing life still unfolding in front of them.</p>
<p>They convince themselves everything important already happened.</p>
<p>That the best years are over.</p>
<p>But memory has a dangerous habit:</p>
<p>it edits reality.</p>
<p>Youth makes even concrete walls feel warmer than they truly were.</p>
<p>The modern world is imperfect, frightening, unstable.</p>
<p>But it also offers more freedom, more choices, more possibility than many people before us could even imagine.</p>
<p>The past deserves gratitude.</p>
<p>Not worship.</p>
<p>Because the present is still alive.</p>
<p>Like this evening beside the fireplace:</p>
<p>rain behind the windows,</p>
<p>the smell of smoky whisky,</p>
<p>airport announcements echoing softly through the room,</p>
<p>the feeling that somewhere ahead another chapter still waits to begin.</p>
<p>And perhaps true wisdom is simply this:</p>
<p>to remember the past warmly,</p>
<p>without trying to move back into it forever.</p>
