<h2>Пролог</h2>
<p>
        Эта история началась задолго до того, как я понял, где именно нахожусь.
        В конце девяностых я оказался в Ужгороде. Служба, форма, утренние
        построения, которые быстро перестают иметь смысл. Там я довольно рано
        понял простую вещь: если тут задержаться еще на год, потом будет сложнее
        вернуться обратно в жизнь.
      </p>
<p>
        Но был один эпизод, который остался со мной навсегда. Я тогда
        подрабатывал массажем. Среди моих пациентов был военный прокурор
        ужгородского гарнизона. Он приходил рано утром, до построения. Пока
        остальные шли на плац, я разминал ему спину.
      </p>
<p>Пять гривен за сеанс. По тем временам - нормально.</p>
<p>
        Через десять сеансов он встал на ноги, мы пожали руки и разошлись, как
        старые добрые знакомые.
      </p>
<p>Я не думал, что это когда-нибудь мне пригодится.</p>
<p>Спустя время меня вызвал к себе командир.</p>
<p>
        — Собирайся. Поедешь в Перечин. Начальником медпункта. Я тут-то не так
        давно. Невролог, семья, планы. А там?
      </p>
<p>
        Я был там всего один раз. Этого хватило. Там не живут. Там доживают.
      </p>
<p>
        Я не знаю, правильно ли тогда поступил, но внутри что-то щёлкнуло и я
        пошёл к прокурору. К тому самому моему пациенту.
      </p>
<p>— Что случилось? — спросил он.</p>
<p>— Переводят.</p>
<p>— Куда?</p>
<p>— Перечин.</p>
<p>Он кивнул.</p>
<p>— Понял. Спасибо.</p>
<p>Разговор весь занял секунд двадцать.</p>
<p>
        Я вышел из его кабинета даже не понимая, что произойдет прямо сейчас.
      </p>
<p>
        На следующий день командир на построение не вышел. А уже к обеду знали
        все: в Перечин уехал он. А я остался, но через какое-то время я ушёл из
        армии.
      </p>
<p>Это был 2001 год. Четверть века тому назад.</p>
<p>
        Интернета почти не было. Мобильная связь ловила через раз. Всё решалось
        по стационарному проводному телефону. Факс от фирмы Panasonic был
        роскошным дополнением к скудной на тот момент офисной технике.
      </p>
<p>
        На гражданке я нашёл себе кабинет. Если это вообще можно было назвать
        кабинетом.
      </p>
<p>
        Двенадцать квадратных метров на первом этаже психоневрологического
        диспансера.
      </p>
<p>
        С облупленной краской. С запахом старых лекарств. И ещё чего-то, что не
        сразу понимаешь, но потом узнаёшь из тысячи.
      </p>
<p>
        Главврач был человек своеобразный. Но мы быстро нашли общий язык. Он
        посмотрел на меня, на мою идею и просто дал ключ.
      </p>
<p>
        Мы сами сделали там ремонт. Поставили столы. Протянули телефонные линии.
        И начали отвечать на звонки. Кто-то спрашивал, к какому врачу идти,
        какие и когда таблетки лучше пить. Кто-то спрашивал нас, а что делать
        прямо сейчас, когда укусила пчела или обжег кипящим маслом руку.
      </p>
<p>
        Иногда достаточно было просто сказать пару слов, чтобы человек не сделал
        себе хуже.
      </p>
<p>Это было странное место.</p>
<p>
        Большое здание со своими правилами, своими маршрутами, своими людьми. И
        где-то внутри мы, маленькая точка, куда звонили те, кто ещё не понимал,
        куда идти и где искать своего лечащего врача.
      </p>
<p>С четвертого этажа он спускался почти всегда в одно и то же время.</p>
<p>Ближе к вечеру. Доктор-психиатр.</p>
<p>
        Он никогда не приходил просто так. Всегда предупреждал. И к его приходу
        на первом этаже уже знали, что делать. И это были не девочки из
        пищеблока, нет. Это были охранники на вертушке при входе. А в их
        подсобке на сковородке шкворчала картошка с луком.
      </p>
<p>Обычная. Без изысков.</p>
<p>Он заходил, закрывал за собой дверь.</p>
<p>
        Иногда приносил с собой бутылку. Иногда нет. Охранники накрывали стол.
        Они садились втроём, когда уже никого не было в здании. Ели, иногда
        пили. Иногда молча. Иногда с короткими фразами.
      </p>
<p>
        И в этот момент он становился другим человеком. Не врачом. Как будто в
        голове у него переустанавливалась система
      </p>
<p>Windows.</p>
<p>
        Не тем, кто весь день разбирает чужие сломанные головы, а просто
        человеком.
      </p>
<p>
        Мне рассказывали они об этом, как о его странной привычке, а я слушал и
        не до конца понимал.
      </p>
<p>Зачем ему это? Почему именно так?</p>
<p>Я тогда не пошёл к ним.</p>
<p>Может мне казалось, что у меня ещё есть время, запас.</p>
<p>
        Потом всё закончилось. Не сразу. Но быстро. Старый главврач ушёл. На его
        место пришёл новый. Молодой. Перспективный. Он посмотрел на всё это
        иначе. Наш кабинет, наши телефоны, наши разговоры, всё это вдруг
        оказалось лишним. Слишком бесполезным. На его месте можно было сделать
        что-то более… выгодное. Нам прямо не сказали. Намекнули. Вы здесь без
        договоров? На птичьих правах? Лучше вам отсюда уйти.
      </p>
<p>Я приехал вечером. Уже было темно.</p>
<p>
        Здание было почти пустым. Только охранники на вертушке при входе и еще
        теплая, но уже пустая сковородка.
      </p>
<p>
        Они молча открыли дверь. Я зашёл в наш кабинет в последний раз. И начал
        выносить всё. Просто всё. Компьютеры. Папки. Столы. Я даже снял
        линолеум. Скрутил его. Тот самый. Синий. До сих пор лежит у меня в
        гараже. Я делал это один. Медленно. Спокойно.
      </p>
<p>
        Они иногда помогали мне что-то донести до машины. Но никто ничего не
        спрашивал. Всё поместилось в багажник с разложенными задними сиденьями.
        Мой легендарный красный «Опель Фронтера».
      </p>
<p>Я закрыл дверь навсегла. И уехал.</p>
<p>Больше я туда никогда не возвращался.</p>
<h2>Эпилог</h2>
<p>Иногда я проезжал мимо этого здания. Смотрел на него со стороны.</p>
<p>
        И ловил себя на мысли, что это было как будто не со мной. Как будто это
        была чья-то чужая жизнь. Прошло много лет. И сейчас я всё чаще вспоминаю
        того врача-психиатра и его любимое блюдо. Который раз в неделю спускался
        вниз. Чтобы просто поесть картошечку с луком, приготовленную даже не им,
        а охранниками на вертушке при входе.
      </p>
<p>Теперь я понимаю.</p>
<p>
        Иногда, чтобы не сойти с ума, нужно совсем немного. Тарелка простой еды.
        Закрытая дверь. И люди рядом, которым от тебя ничего не нужно. Я тогда к
        ним не присоединился. И, если честно, иногда об этом жалею.
      </p>
<p>Потому что со временем начинаешь лучше понимать, где ты находишься.</p>
<p>
        И не всегда это место с синей табличкой на входе. И трезубцем в центре.
      </p>
<p>Иногда это просто здание, в котором ты живёшь.</p>
<p>
        И если в какой-то момент ты перестаёшь отличать, кто здесь врач, а кто
        пациент, возможно, стоит подняться на этаж выше и постучать в кабинет
        главврача. Тут прямо напротив него оформляют истории болезней для
        пациентов дневного стационара.
      </p>
