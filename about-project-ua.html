<h2>Кілька слів про проєкт</h2>
<p>Іноді книжки з’являються не на папері. Вони народжуються значно раніше: у розмовах біля вогню, в дорозі, у випадкових зустрічах, у чужих долях, які на певний час перетинаються з твоєю. З роками таких історій стає багато. Спершу це просто спогади. Потім нотатки. А потім раптом розумієш, що вони починають жити окремим життям.</p>
<p>Так і з’явився цей проєкт.</p>
<p>Це не зовсім книжка у звичному сенсі. Радше збірка живих історій, які поступово складаються в одну дорогу.</p>
<p>Деякі з них сталися насправді. Деякі майже насправді. А деякі просто народилися зі спостережень за людьми й життям.</p>
<p>Я вирішив публікувати їх тут, в інтернеті, у міру того, як вони згадуються або трапляються.</p>
<p>Без поспіху і без жорсткого плану. Саме так, як це зазвичай буває в житті.</p>
<p>Якщо ви випадково опинилися на цьому сайті, значить, одна з цих історій уже знайшла свого читача.</p>
<p>А якщо вам захочеться час від часу повертатися сюди й читати нові історії, значить, Рой продовжує жити.</p>
<p>Ласкаво прошу.</p>
<h2>Чому Рой?</h2>
<p>У житті кожної людини іноді бувають складні періоди. Звісно, у кожного вони свої. Для когось трагедією може стати дім, що згорів ущент, а для когось відсутність пармезану в піці.</p>
<p>У мене це був період переосмислення.</p>
<p>Тоді я працював в одній страховій компанії. Усе моє майно на той момент поміщалося в багажник моєї машини. Це був вишневого кольору майже-джип на ім’я Opel Frontera.</p>
<p>У багажнику лежав спальник, з ним узагалі пов’язана окрема історія. Дві банки тушонки. Складна туристична лопатка. Газова туристична плитка. І ще одна річ, яка вибивалася з цього похідного набору: відріз тканини для пальта з дуже якісного габардину. Колись його купив мій дідусь, ще в повоєнні роки. Він збирався змінити свою офіцерську шинель на щось більш пристойне. Але пальто так і не пошили. Тканина лишилася лежати. А потім якимось природним родинним шляхом перейшла до мене. Так і подорожувала разом зі мною.</p>
<p>Роботу в компанії я виконував досить швидко. Свого житла в мене не було. Родини тоді теж. Поспішати додому було нікуди. Тому вечорами я просто шукав, чим себе зайняти.</p>
<p>Одного разу я відкрив Google і ввів простий запит:</p>
<p><strong>«клуб любителів позашляховиків».</strong></p>
<p>Серед результатів з’явився сайт із живим і доволі галасливим форумом. Називався він Offroadmaster.</p>
<p>Оскільки мій Opel усе ж був майже джипом, то і я відчув себе майже джипером.</p>
<p>Щоб зареєструватися, потрібно було вигадати собі нік. Кличку. Ім’я, під яким ти житимеш на форумі. Я трохи подумав і раптом згадав сцену з фільму «Міцний горішок». Ту саму, де Брюс Вілліс босоніж бігає хмарочосом, воює з терористами й представляється:</p>
<p><strong>Рой.</strong></p>
<p>Щось у той момент у мені було з ним схоже. Так я і написав.</p>
<p><strong>ROY.</strong></p>
<p>Нік прижився.</p>
<p>Спершу це було просто ім’я на форумі. Потім кличка серед знайомих. Потім псевдонім.</p>
<p>І тільки через роки я зрозумів, що це слово виявилося дивовижно точним.</p>
<p>Рой, у нашому розумінні, це ж не просто купа бджіл. Це стан.</p>
<p>У рої немає одного видимого центру управління. Але він рухається як єдиний організм. Кожна бджола робить свою справу, а разом виходить система.</p>
<p>Подібно влаштоване і людське життя. Думки, спогади, розмови, випадкові зустрічі, книжки, дороги, друзі, полювання, помилки, відкриття; усе це поступово збирається в рій історій.</p>
<p>Іноді цей рій гуде тихо і спокійно. Іноді тривожно й голосно. Але саме з нього народжуються тексти. Кожне оповідання, як окрема бджола. А вся книжка, як вулик. І якщо прислухатися, всередині нього завжди чути один і той самий звук.</p>
<p><strong>Гул життя.</strong></p>
<p>Тож тепер «Рой» це вже не просто старий нік з інтернету. Це спосіб дивитися на світ.</p>
<h2>Історія одного спальника</h2>
<p>У багажнику мого вишневого Opel Frontera лежав спальник. Купив я його в Одесі, на Сьомому кілометрі. Камуфляжний, добротний. Головна його перевага була в тому, що він легко перетворювався на двоспальну ковдру. Купувався він для цілком зрозумілих речей: полювання, риболовлі, сирих прохолодних осінніх ночей біля вогнища.</p>
<p>Він не був особливо товстим чи важким, але свою справу робив чесно.</p>
<p>І ось одного разу в моєму житті стався доволі серйозний поворот. Мені запропонували з нуля відкрити центр МРТ у Києві. Коли перед людиною постає таке завдання, вона насамперед думає не про стіни й не про апарати. Вона думає про людей.</p>
<p>І я одразу згадав Ірину Леонідівну Вороніну. Вона тоді курувала херсонське відділення страхової компанії, де ми працювали разом. Щоразу, коли ми зустрічалися, вона казала мені майже одними й тими самими словами:</p>
<p><strong>«Заберіть мене до Києва. На будь-яку посаду, на будь-яку роботу».</strong></p>
<p>Історія в неї була, м’яко кажучи, незвичайна. Вона була попадя. Справжня.</p>
<p>Її чоловік був батюшкою, священником із невеликою парафією десь в околицях Херсона. Окрім служіння, він ще ловив рибу і доволі успішно її солив.</p>
<p>Жили вони дуже скромно. Грошей було небагато. Страхова компанія теж не балувала великими доходами. Тому Ірина Леонідівна була готова на будь-яку підробітку. Коли мені запропонували запускати центр МРТ, я одразу згадав про неї.</p>
<p>Вона приїхала до Києва першим же поїздом. Я зустрів її на вокзалі. Перше, що ми зробили, купили їй розкладачку.</p>
<p>Оселилася вона просто в приміщенні майбутнього центру. Там щойно закінчився ремонт, пахло свіжою фарбою і штукатуркою. Ірина Леонідівна зайняла кабінет, де в майбутньому мало бути УЗД. Там у неї з’явилася маленька келія. На стіні невеличкий іконостас. У кутку акуратно застелена розкладачка. На підвіконні чайник і кілька чашок. І свічка.</p>
<p>Усе було дивовижно чисто, спокійно і якось одразу правильно.</p>
<p>Це була найкраща співробітниця, яку я коли-небудь зустрічав. Такої світлої й чистої душі людини я більше в житті не бачив. Вона буквально випромінювала добрий настрій. Працювала за трьох: була адміністраторкою, поки ще нікого не найняли, моєю помічницею, сторожем і навіть кухаркою. Готувала вона, до речі, прекрасно.</p>
<p>Через деякий час до Києва приїхав батюшка. І тут виникла невелика побутова проблема. На розкладачці вдвох їм розміститися було вже неможливо.</p>
<p>Одного разу Ірина Леонідівна дуже обережно підійшла до мене й сказала:</p>
<p><strong>«Може, у вас знайдеться щось… двоспальне?»</strong></p>
<p>І тут я, звісно, згадав про свій спальник.</p>
<p>Той самий. Одеський. Камуфляжний. Який легко перетворювався на двоспальну ковдру.</p>
<p>Так він і перекочував із багажника моєї Фронтери в маленьку келію в кабінеті майбутнього УЗД.</p>
<p>Іноді я думаю, що мій спальник прожив доволі цікаве життя.</p>
<p>Спершу він мав гріти мене біля вогнищ на полюванні й риболовлі. А врешті став сімейним ложем священника.</p>
<p>Тож тепер цей спальник, можна сказати, майже святий.</p>
<p>Майже як плащаниця. І щоразу, коли я тепер бачу цей спальник, я думаю: деякі речі стають святими зовсім несподівано.</p>
<h2>Про речі та історії</h2>
<p>Іноді найзвичайніші предмети проживають разом із людиною ціле життя. Спершу вони з’являються випадково: куплені на ринку, подаровані друзями або просто опиняються під рукою в потрібний момент.</p>
<p>Спершу це просто річ. Але минає час, і вона починає вбирати в себе події, людей, дороги, розмови й спогади.</p>
<p>Так поступово звичайний камуфляжний спальник, куплений колись на одеському Сьомому кілометрі для полювання й риболовлі, може раптом стати сімейним ложем священника.</p>
<p>І тоді розумієш, що деякі предмети стають майже святими не тому, що так було задумано, а тому що крізь них пройшло життя.</p>
<p>З часом я почав помічати, що схожа доля буває не лише у речей. Іноді так відбувається і з історіями. Спершу це просто випадковий епізод із життя. Потім спогад. Потім оповідання, яке ти одного разу переказуєш друзям. А через якийсь час таких історій стає багато. Вони починають збиратися разом, як бджоли у вулик.</p>
<p>Так і з’явився цей проєкт.</p>
<p>Тут зібрані прості життєві історії: іноді смішні, іноді дивні, іноді зовсім тихі. Але кожна з них має одну спільну властивість: вона прожита по-справжньому.</p>
<p>І якщо з часом якась із цих історій стане для когось таким самим теплим і справжнім спогадом, як мій старий спальник, значить, цей Рой з’явився недаремно.</p>
