<p>— Вот скажи мне, Сереженька, ну зачем тебе отпуск? Что ты там будешь делать? — Береговой что-то усердно искал в телефоне, как хирург в кишечнике, и даже не поднимал взгляд. — Ты же без работы жить не можешь, а на диване валяться — это то же самое, что тут, на маяке у станка. Только там скука смертная, а тут — развитие, общение, деньги, в конце концов. Штаны себе новые купишь, — покосился полковник на брюки и обувь Сергея, пережившие две войны и один пожар.</p>
<p>— Я на плоту по реке сплавляться решил. Засиделся на берегу. Там ни людей, ни общения, ни денег. Только река и тишина. Рыбаки иногда, но с ними разговор короткий: за общение можно и отгрести, — оправдывался Сергей.</p>
<p>— Как это — на плоту? Где ты его возьмешь? — наконец оторвался от экрана шеф.</p>
<p>— Так я уже его… взял. В смысле — построил.</p>
<p>— То есть вот прям построил? Сам?</p>
<p>— Ага, — показал Серега ладони со следами от свежевыловленных заноз. — Отдохнуть от всех хочу. Другого способа не придумал.</p>
<p>Директор долго молча, с выражением «да что ж за кадры нынче», смотрел на подчиненного, затем развернул заявление и поставил подпись.</p>
<p>— Серега, ну ты что удумал? Какой еще плот? Тоже мне, блин, Юрий Лоза нашелся! Ты отпуск-то по уму используй! Нам баню конопатить надо! — хрипел по телефону отец.</p>
<p>— Там еще гараж, насос надо починить.</p>
<p>— Пап, да какая баня? Я и париться-то не люблю.</p>
<p>— Да ты не парься, но конопатить помоги! Там и дядя Миша будет, и Андрюха приедет.</p>
<p>— Я тебе в прошлый отпуск уже яму под туалет копал, а позапрошлым мы втроем ставили тот проклятый забор, который вы сами же и сломали, когда скучно стало без соседских лиц. Дай хоть раз в жизни в одиночестве побыть, шашлыком обожраться и позагорать без предварительного насилия над моим позвоночником и печенью. Пап, я устал от людей!</p>
<p>— Да ты что… Да где это видано… Да… — окончательно запутавшись в «да», отец издал тарахтение и сбросил звонок.</p>
<p>— Сергей Иваныч! — встретил его у магазина Андрюха, светясь, как китайский фонарик с алиэкспресса. — Мы тут с Лехой узнали от бати твоего, что у тебя отпуск, и тоже решили отпуска взять. Так что жди гостей!</p>
<p>— Какие отпуска? Вы оба без работы уже два года.</p>
<p>— Это неважно. Главное — отгулы отгуливать надо в компании друзей!</p>
<p>— Не, Андрюха, у вас жены есть. Вот с ними и отгуливайте. А я в тишине хочу побыть. Познать внутренний дзен. Книжку прочесть, которую три года откладывал. Я там все оборудовал: навес, свет на батарейках, скамейка, стол, место под палатку…</p>
<p>— Ну, у тебя тоже Валюха есть!</p>
<p>— Ничего, она дома, погуляет с таксами. Пока я перезагружусь.</p>
<p>— Ого! Да ты прям подготовился!</p>
<p>— Два месяца готовился. Так что извини.</p>
<p>В день отплытия Иваныч стоял на берегу возле своего гордо сколоченного плота и сверялся со списком. Так, вроде все взял. Одиночество было уже почти физически ощутимым, как и запах шашлыка, который кто-то жарил на соседнем берегу.</p>
<p>Он загрузил последнюю сумку, уже хотел отчаливать — и тут из кустов, как рыбная инспекция на одинокого браконьера, вынырнул отец.</p>
<p>— Я подумал: ты был прав. Надо иногда просто отдыхать в отпусках! — заявил тот и сбросил с плеч рюкзак размером с холодильник. — Кстати, дядя Миша и Олег, ну тот с Барановки, тоже поддержали твой выбор.</p>
<p>Как по команде, из камышей выползли и они — довольные, хитрые, с поклажей. У дяди Миши в руках был огромный пакет, в котором что-то многообещающе звенело. У Олега распустилась гармошка, на которой он любил раздуть меха и издать характерный протяжный стон.</p>
<p>— Можно мы с тобой? — спросили они хором.</p>
<p>Иваныч посмотрел на них так, будто именно они в детстве съели его собаку, мечту и отпуск одновременно.</p>
<p>— Добро пожаловать… — улыбнулся он, как человек, получивший в подарок в третий раз подряд один и тот же набор носков.</p>
<p>Не успели друзья погрузить вещи, как к берегу притормозил огромный черный джип. Из него, вывалившись, как вареник из кастрюли, показался Береговой — в камуфляжном костюме-тройке и с портфельчиком, набитым тревогами, кремами от загара и от комаров.</p>
<p>— Сухенко! Ты так вдохновил меня идеей с плотом, тишиной и одиночеством, что я тоже взял отпуск! Дядя Миша еле сдал твою геолокацию — чуть не уволил его. Мне плот строить некогда, а твой — огонь. Возьмешь меня в рамках производственной необходимости?</p>
<p>Последняя фраза не предполагала вариантов ответа.</p>
<p>— К тому же у плота должен быть свой полковник, — погладил он портфельчик. — Я и работу взял! По дороге обсудим новый формат твоего гопака… О, а у тебя тут и люди! — подозрительно осмотрел он компанию.</p>
<p>— Иван Иваныч, папа этого социофоба, — представился отец.</p>
<p>Директор вжал голову в плечи, но руки не убрал.</p>
<p>И тут…</p>
<p>С ревом подъехало ОНО — агрегат, похожий на бронированный курятник на колесах с эмблемой «Ниссана» где-то на участке бывшего бампера. Из салона вылетели четыре тела, ругаясь, пыхтя и объясняя всему миру, что тишина и уединение — это важно!</p>
<p>— Брат! Мы пытались уйти без жен, но они настояли поехать с нами постигать дзен!</p>
<p>— Я должен был постигать дзен! ОДИН! — взвыл Иваныч.</p>
<p>— Кто ж постигает дзен в одиночестве? Мы и радио взяли! — радостно сообщил Андрюха, выдергивая жену с заднего сиденья, как чемодан без ручки.</p>
<p>А потом пришли еще двое — те самые, кому Сережа неделю назад рассказывал, как прекрасно провести отпуск в тишине и одиночестве.</p>
<p>И вот — на плоту уже десять человек. Они пьют за уединение, шумят, обсуждают, как плохо продуманы сидушки, и спорят о маршруте.</p>
<p>Иваныч тем временем уже отталкивает плот большим бревном.</p>
<p>Течение подхватило «ноев ковчег им. Сухенко» и понесло в сторону соседней области.</p>
<p>— Подождите! Иваныча забыли! Давайте к берегу! У кого весла?! — орали с плота.</p>
<p>Сергей Иванович стоял на берегу, улыбался, держал в руках оба весла и смотрел на удаляющуюся толпу.</p>
<p>Прощайте! Ихтиандры хуевы!</p>
<p>— Сережа, выведи собак, я уже на работу опаздываю. И там папа звонил, он будет ехать на дачу, тебя сможет подвезти. Я уже не стала тебя будить, ну все, пока, я ушла.</p>
<p>Валентина закрыла за собой дверь, и три таксы перебежали, цокотя коготками, из коридора в спальню. Солнце сквозь штору заливало рабочий стол Сергея Иваныча светом и как будто говорило: вставай, бездельник. Сегодня был первый день долгожданного отпуска.</p>
